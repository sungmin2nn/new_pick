<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>News Trading Bot — Hybrid Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        mono: ['JetBrains Mono', 'monospace'],
        display: ['Outfit', 'sans-serif'],
        sans: ['Pretendard', 'sans-serif'],
      },
      colors: {
        bg: '#0a0a0a',
        surface: '#111111',
        border: '#1e1e1e',
        muted: '#666666',
        accent: '#00ff87',
        profit: '#00ff87',
        loss: '#ff4757',
        gold: '#ffd700',
        silver: '#c0c0c0',
        bronze: '#cd7f32',
      }
    }
  }
}
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Pretendard', sans-serif;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .glass {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .glass-accent {
    background: linear-gradient(135deg, rgba(0,255,135,0.08) 0%, rgba(0,200,255,0.04) 100%);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(0,255,135,0.15);
  }

  .pill-profit {
    background: rgba(0,255,135,0.15);
    color: #00ff87;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }
  .pill-loss {
    background: rgba(255,71,87,0.15);
    color: #ff4757;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }

  .elo-badge {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 2px 8px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #aaa;
  }

  .progress-track {
    background: rgba(255,255,255,0.06);
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .score-bar-track {
    background: rgba(255,255,255,0.06);
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    flex: 1;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, #00ff87, #00c8ff);
  }

  .trade-table { width: 100%; border-collapse: collapse; }
  .trade-table th {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #666;
    font-weight: 500;
    padding: 8px 6px;
    text-align: left;
    border-bottom: 1px solid #1e1e1e;
  }
  .trade-table td {
    padding: 7px 6px;
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    white-space: nowrap;
  }
  .trade-table tr:last-child td { border-bottom: none; }

  .medal-1 { text-shadow: 0 0 12px rgba(255,215,0,0.5); }
  .medal-2 { text-shadow: 0 0 12px rgba(192,192,192,0.4); }
  .medal-3 { text-shadow: 0 0 12px rgba(205,127,50,0.4); }

  .team-card {
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .team-card:active {
    transform: scale(0.98);
  }

  .hero-glow {
    box-shadow: 0 0 60px rgba(0,255,135,0.06), 0 0 120px rgba(0,255,135,0.03);
  }
</style>
</head>
<body class="pb-8">

<div id="loading" style="display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:12px;">
  <div style="width:40px;height:40px;border:3px solid #1e1e1e;border-top-color:#00ff87;border-radius:50%;animation:spin 1s linear infinite;"></div>
  <div class="text-sm text-muted">Loading Dashboard...</div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</div>
<div id="content" style="display:none;"></div>

<script>
const BASE = '../';
const TEAMS = ['team_a','team_b','team_c','team_d','team_e'];
const TEAM_NAMES = {team_a:'Alpha Momentum',team_b:'Beta Contrarian',team_c:'Gamma Disclosure',team_d:'Delta Theme',team_e:'Echo Frontier'};
const TEAM_COLORS = {team_a:'#EF4444',team_b:'#3B82F6',team_c:'#10B981',team_d:'#F59E0B',team_e:'#8B5CF6'};
const TEAM_EMOJIS = {team_a:'\u{1F534}',team_b:'\u{1F535}',team_c:'\u{1F7E2}',team_d:'\u{1F7E1}',team_e:'\u{1F7E3}'};
const TEAM_STRATS = {team_a:'momentum',team_b:'largecap_contrarian',team_c:'dart_disclosure',team_d:'theme_policy',team_e:'frontier_gap'};

async function fetchJ(path) {
  try { const r = await fetch(BASE + path); if (!r.ok) return null; return r.json(); } catch { return null; }
}

async function loadData() {
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
  }
  const [leaderboard, bnfPos, bnfCand] = await Promise.all([
    fetchJ('data/arena/leaderboard.json'),
    fetchJ('data/bnf/positions.json'),
    fetchJ('data/bnf/candidates.json'),
  ]);
  let status=null, candidates=null, dataDate=dates[0];
  for (const dt of dates) {
    const s = await fetchJ(`data/paper_trading/status_${dt}.json`);
    if (s) { status = s; dataDate = dt; break; }
  }
  for (const dt of dates) {
    const c = await fetchJ(`data/paper_trading/candidates_${dt}_all.json`);
    if (c) { candidates = c; break; }
  }
  const portfolios = {}, trades = {}, summaries = {};
  await Promise.all(TEAMS.map(async tid => {
    portfolios[tid] = await fetchJ(`data/arena/${tid}/portfolio.json`);
    for (const dt of dates) {
      if (!trades[tid]) { const t = await fetchJ(`data/arena/${tid}/daily/${dt}/trades.json`); if(t) trades[tid]=t; }
      if (!summaries[tid]) { const s = await fetchJ(`data/arena/${tid}/daily/${dt}/summary.json`); if(s) summaries[tid]=s; }
    }
  }));
  return { leaderboard, status, candidates, bnfPos, bnfCand, portfolios, trades, summaries, dataDate };
}

function fmt(n) { return n != null ? Number(n).toLocaleString('ko-KR') : '-'; }
function fmtPct(n) { return n != null ? (n > 0 ? '+' : '') + Number(n).toFixed(2) + '%' : '-'; }

function render(data) {
  const lb = data.leaderboard;
  const teams = lb ? [...(lb.teams || [])].sort((a,b) => (a.rank||99) - (b.rank||99)) : [];
  const history = lb ? (lb.daily_history || []) : [];
  const today = new Date().toISOString().slice(0,10);
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const dayOfWeek = ['SUN','MON','TUE','WED','THU','FRI','SAT'][now.getDay()];

  // Aggregate stats
  let totalCapital = 0, totalTrades = 0, totalWins = 0, totalLosses = 0;
  const initialTotal = TEAMS.length * 10000000;
  TEAMS.forEach(tid => {
    const p = data.portfolios[tid];
    if (p) {
      totalCapital += p.current_capital || 0;
      totalTrades += p.total_trades || 0;
      totalWins += p.total_wins || 0;
      totalLosses += p.total_losses || 0;
    }
  });
  const totalRetPct = initialTotal > 0 ? ((totalCapital - initialTotal) / initialTotal) * 100 : 0;
  const winRate = totalTrades > 0 ? ((totalWins / totalTrades) * 100).toFixed(1) : '0';

  // Aggregate all trades for today
  let allTrades = [];
  let todayPnL = 0;
  TEAMS.forEach(tid => {
    const t = data.trades[tid];
    if (t && t.results) {
      t.results.forEach(r => {
        allTrades.push(r);
        todayPnL += r.return_amount || 0;
      });
    }
  });
  allTrades.sort((a,b) => (b.return_amount||0) - (a.return_amount||0));

  // BNF
  const bnfPositions = data.bnfPos && data.bnfPos.positions ? data.bnfPos.positions : [];
  const bnfStats = data.bnfPos && data.bnfPos.stats ? data.bnfPos.stats : {};

  // Candidates
  let allCandidates = [];
  if (data.candidates && data.candidates.strategies) {
    Object.values(data.candidates.strategies).forEach(s => {
      if (s.candidates) allCandidates.push(...s.candidates);
    });
    allCandidates.sort((a,b) => (b.score||0) - (a.score||0));
  }
  const topCandidates = allCandidates.slice(0, 5);

  // Build team ranking cards
  function buildTeamCards() {
    if (!teams.length) return '<div class="text-center text-muted text-sm py-4">데이터 없음</div>';
    const medals = ['\u{1F947}','\u{1F948}','\u{1F949}'];
    return teams.map((t, i) => {
      const tid = t.team_id || '';
      const elo = t.elo || '-';
      const p = data.portfolios[tid];
      const retPct = p ? p.total_return_pct : 0;
      const wr = p && p.total_trades > 0 ? ((p.total_wins / p.total_trades) * 100) : 0;
      const wrColor = wr >= 60 ? 'text-profit' : wr >= 30 ? 'text-yellow-400' : wr > 0 ? 'text-loss' : 'text-muted';
      const barColor = wr >= 60 ? 'bg-profit' : wr >= 30 ? 'bg-yellow-500' : wr > 0 ? 'bg-loss' : 'bg-[#444]';
      const medalOrRank = i < 3 ? `<span class="text-xl medal-${i+1}">${medals[i]}</span>` : `<span class="text-sm font-bold text-muted w-7 text-center">${i+1}th</span>`;
      return `
      <div class="glass rounded-xl p-3.5 team-card">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2.5">
            ${medalOrRank}
            <div>
              <p class="text-sm font-semibold text-white">${TEAM_NAMES[tid]||tid}</p>
              <div class="flex items-center gap-2 mt-0.5">
                <span class="elo-badge">ELO ${elo}</span>
              </div>
            </div>
          </div>
          <div class="text-right">
            <p class="font-mono text-lg font-bold ${retPct > 0 ? 'text-profit' : retPct < 0 ? 'text-loss' : 'text-muted'}">${fmtPct(retPct)}</p>
          </div>
        </div>
        <div class="mt-2.5 flex items-center gap-2">
          <span class="text-[10px] text-muted w-10">승률</span>
          <div class="progress-track flex-1">
            <div class="progress-fill ${barColor}" style="width:${wr}%"></div>
          </div>
          <span class="font-mono text-[11px] ${wrColor} w-10 text-right">${wr > 0 ? wr.toFixed(0) + '%' : '-'}</span>
        </div>
      </div>`;
    }).join('');
  }

  // Build trades table
  function buildTradesTable() {
    if (!allTrades.length) return '<div class="px-4 py-4 text-center text-muted text-sm">매매 데이터 없음</div>';
    return `
    <div class="overflow-x-auto">
      <table class="trade-table">
        <thead><tr>
          <th class="pl-4">종목</th>
          <th>매수→매도</th>
          <th class="text-right">수익률</th>
          <th class="text-right">손익</th>
          <th class="text-right pr-4">상태</th>
        </tr></thead>
        <tbody>
          ${allTrades.map(t => {
            const ret = t.return_pct || 0;
            const amt = t.return_amount || 0;
            const status = t.exit_type === 'profit' ? '<span class="pill-profit">익절</span>' : t.exit_type === 'loss' ? '<span class="pill-loss">손절</span>' : `<span class="pill-${ret >= 0 ? 'profit' : 'loss'}">${ret >= 0 ? '청산' : '손절'}</span>`;
            return `<tr>
              <td class="pl-4 font-medium text-white">${t.name || t.code || '-'}</td>
              <td class="font-mono text-[11px] text-[#888]">${t.entry_price ? fmt(t.entry_price) : '-'}→${t.exit_price ? fmt(t.exit_price) : '-'}</td>
              <td class="text-right font-mono font-semibold ${ret >= 0 ? 'text-profit' : 'text-loss'}">${fmtPct(ret)}</td>
              <td class="text-right font-mono text-[11px] ${amt >= 0 ? 'text-profit' : 'text-loss'}">${amt >= 0 ? '+' : ''}${fmt(amt)}</td>
              <td class="text-right pr-4">${status}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="flex items-center justify-between px-4 py-3 border-t border-white/5">
      <span class="text-xs text-muted">합계</span>
      <span class="font-mono text-sm font-bold ${todayPnL >= 0 ? 'text-profit' : 'text-loss'}">${todayPnL >= 0 ? '+' : ''}${fmt(todayPnL)}원</span>
    </div>`;
  }

  // Build BNF section
  function buildBNF() {
    return `
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-sm font-semibold text-white">BNF 포트폴리오</h2>
      <div class="flex items-center gap-3">
        <span class="font-mono text-xs ${(bnfStats.total_return||0) >= 0 ? 'text-profit' : 'text-loss'} font-semibold">${fmtPct(bnfStats.total_return)}</span>
        <span class="text-[10px] text-muted">승률 ${bnfStats.win_rate != null ? bnfStats.win_rate + '%' : '-'}</span>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-2">
      ${bnfPositions.length ? bnfPositions.map(pos => {
        const ret = pos.return_pct || pos.unrealized_pnl_pct || 0;
        return `<div class="bg-white/[0.03] rounded-lg p-3">
          <p class="text-xs text-muted mb-0.5">${pos.name || pos.code || '-'}</p>
          <p class="font-mono text-sm font-bold ${ret >= 0 ? 'text-profit' : 'text-loss'}">${fmtPct(ret)}</p>
        </div>`;
      }).join('') : '<div class="col-span-2 text-center text-muted text-sm py-2">보유 종목 없음</div>'}
    </div>`;
  }

  // Build candidates
  function buildCandidates() {
    if (!topCandidates.length) return '<div class="text-center text-muted text-sm py-4">후보 데이터 없음</div>';
    return topCandidates.map((c, i) => {
      const score = c.score || 0;
      const scoreColor = score >= 70 ? '#00ff87' : score >= 50 ? '#00c8ff' : '#888';
      return `
      <div class="glass rounded-xl p-3.5 flex items-center gap-3">
        <span class="font-mono text-xs text-muted w-4">${i+1}</span>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-white truncate">${c.name || c.code || '-'}</p>
          <div class="flex items-center gap-2 mt-1.5">
            <div class="score-bar-track">
              <div class="score-bar-fill" style="width:${Math.min(score / 135 * 100, 100)}%"></div>
            </div>
            <span class="font-mono text-xs w-10 text-right" style="color:${scoreColor}">${score.toFixed(1)}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('content').innerHTML = `
  <!-- 1. STATUS BAR -->
  <div class="sticky top-0 z-50 bg-[#0a0a0a]/90 backdrop-blur-md border-b border-[#1e1e1e]">
    <div class="flex items-center justify-between px-4 py-2.5">
      <div class="flex items-center gap-2">
        <span class="font-mono text-xs text-muted">${today}</span>
        <span class="text-[10px] text-muted">${dayOfWeek}</span>
      </div>
      <div class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-profit animate-pulse"></span>
        <span class="text-xs font-semibold text-profit tracking-wide">LIVE</span>
      </div>
      <div class="flex items-center gap-1">
        <span class="text-[10px] text-muted">갱신</span>
        <span class="font-mono text-xs text-[#888]">${timeStr}</span>
      </div>
    </div>
  </div>

  <!-- 2. HERO KPI -->
  <div class="px-4 mt-4">
    <div class="glass-accent rounded-2xl p-5 hero-glow">
      <div class="text-center">
        <p class="text-xs text-muted mb-1 tracking-wider uppercase">Total Return</p>
        <p class="font-mono font-bold text-5xl ${totalRetPct >= 0 ? 'text-profit' : 'text-loss'} leading-none">${fmtPct(totalRetPct)}</p>
      </div>
      <div class="grid grid-cols-3 gap-3 mt-5">
        <div class="text-center">
          <p class="text-[10px] text-muted mb-0.5">총 자산</p>
          <p class="font-mono text-sm font-semibold text-white">${fmt(totalCapital)}</p>
        </div>
        <div class="text-center border-x border-white/5">
          <p class="text-[10px] text-muted mb-0.5">매매</p>
          <p class="text-sm font-semibold">
            <span class="text-white">${totalTrades}건</span>
            <span class="text-muted text-xs ml-0.5">${totalWins}<span class="text-profit">W</span> ${totalLosses}<span class="text-loss">L</span></span>
          </p>
        </div>
        <div class="text-center">
          <p class="text-[10px] text-muted mb-0.5">승률</p>
          <p class="font-mono text-sm font-semibold text-white">${winRate}%</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 3. CHART -->
  <div class="px-4 mt-5">
    <div class="glass rounded-2xl p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-white">누적 수익률</h2>
        <span class="text-[10px] text-muted">최근 ${history.length}일</span>
      </div>
      <div style="height:160px;">
        <canvas id="cumChart"></canvas>
      </div>
      <div class="mt-3 pt-3 border-t border-white/5">
        <p class="text-[10px] text-muted mb-2">일별 수익</p>
        <div style="height:50px;">
          <canvas id="dailyBar"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- 4. TEAM RANKING -->
  <div class="px-4 mt-5">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-sm font-semibold text-white">팀 랭킹</h2>
      <span class="text-[10px] text-muted">ELO 기준</span>
    </div>
    <div class="space-y-2.5" id="teamRanking">
      ${buildTeamCards()}
    </div>
  </div>

  <!-- 5. TODAY TRADES -->
  <div class="px-4 mt-5">
    <div class="glass rounded-2xl overflow-hidden">
      <div class="flex items-center justify-between px-4 pt-4 pb-2">
        <h2 class="text-sm font-semibold text-white">오늘 매매 결과</h2>
        <span class="text-[10px] text-muted">${allTrades.length}건</span>
      </div>
      ${buildTradesTable()}
    </div>
  </div>

  <!-- 6. BNF PORTFOLIO -->
  <div class="px-4 mt-5">
    <div class="glass rounded-2xl p-4">
      ${buildBNF()}
    </div>
  </div>

  <!-- 7. TOMORROW CANDIDATES -->
  <div class="px-4 mt-5 mb-8">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-sm font-semibold text-white">내일 후보</h2>
      <span class="text-[10px] text-muted">135점 기준</span>
    </div>
    <div class="space-y-2">
      ${buildCandidates()}
    </div>
  </div>
  `;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  // Build charts from daily_history
  buildCharts(history);
}

function buildCharts(history) {
  if (!history.length) return;

  Chart.defaults.color = '#666';
  Chart.defaults.borderColor = 'rgba(255,255,255,0.04)';
  Chart.defaults.font.family = "'JetBrains Mono', monospace";
  Chart.defaults.font.size = 11;

  // Compute cumulative returns from daily_history
  // Each day has a ranking array; we compute average total_return across teams
  const labels = history.map((d, i) => `Day ${i+1}`);
  const cumData = [];
  const dailyData = [];
  let prevCum = 0;
  history.forEach((day, i) => {
    if (!day.ranking || !day.ranking.length) {
      cumData.push(prevCum);
      dailyData.push(0);
      return;
    }
    const avgRet = day.ranking.reduce((s, r) => s + (r.total_return || 0), 0) / day.ranking.length;
    cumData.push(avgRet);
    dailyData.push(avgRet - prevCum);
    prevCum = avgRet;
  });

  const cumCtx = document.getElementById('cumChart').getContext('2d');
  new Chart(cumCtx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: cumData,
        borderColor: '#00ff87',
        backgroundColor: (ctx) => {
          const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 160);
          g.addColorStop(0, 'rgba(0,255,135,0.15)');
          g.addColorStop(1, 'rgba(0,255,135,0)');
          return g;
        },
        fill: true,
        tension: 0.4,
        borderWidth: 2.5,
        pointRadius: 4,
        pointBackgroundColor: '#0a0a0a',
        pointBorderColor: '#00ff87',
        pointBorderWidth: 2,
        pointHoverRadius: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a1a',
          borderColor: '#333',
          borderWidth: 1,
          titleColor: '#888',
          bodyColor: '#00ff87',
          bodyFont: { weight: 'bold' },
          callbacks: {
            label: (c) => (c.parsed.y >= 0 ? '+' : '') + c.parsed.y.toFixed(2) + '%'
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 10 } }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.03)' },
          ticks: {
            callback: (v) => v + '%',
            font: { size: 10 }
          }
        }
      }
    }
  });

  const barCtx = document.getElementById('dailyBar').getContext('2d');
  new Chart(barCtx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: dailyData,
        backgroundColor: dailyData.map(v => v >= 0 ? 'rgba(0,255,135,0.6)' : 'rgba(255,71,87,0.6)'),
        borderRadius: 4,
        barPercentage: 0.5,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a1a',
          borderColor: '#333',
          borderWidth: 1,
          callbacks: {
            label: (c) => (c.parsed.y > 0 ? '+' : '') + c.parsed.y.toFixed(2) + '%'
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 9 } }
        },
        y: {
          display: false,
          grid: { display: false }
        }
      }
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {
  loadData().then(render).catch(e => {
    console.error(e);
    document.getElementById('loading').innerHTML = '<div class="text-loss text-sm">데이터 로딩 실패</div>';
  });
});
</script>

<!-- Style Switcher FAB -->
<div id="style-fab" onclick="document.getElementById('style-modal').classList.toggle('hidden')" style="position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:#fbbf24;color:#000;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(251,191,36,.4);z-index:9999;">\u{1F3A8}</div>
<div id="style-modal" class="hidden" style="position:fixed;inset:0;z-index:10000;display:flex;align-items:flex-end;justify-content:center;">
  <div onclick="document.getElementById('style-modal').classList.add('hidden')" style="position:absolute;inset:0;background:rgba(0,0,0,.5);"></div>
  <div style="position:relative;width:100%;max-width:430px;max-height:70vh;overflow-y:auto;background:#1a1a1a;border-radius:20px 20px 0 0;padding:20px;">
    <div style="text-align:center;margin-bottom:16px;"><div style="width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 12px;"></div><div style="font-weight:700;font-size:16px;color:#fff;">스타일 변경</div></div>
    <div id="style-list" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"></div>
  </div>
</div>
<script>
const STYLES = [
  {id:'style1_terminal',name:'Terminal',icon:'\u{1F4BB}'},
  {id:'style2_card',name:'Card',icon:'\u{1F0CF}'},
  {id:'style3_glass',name:'Glass',icon:'\u{1F52E}'},
  {id:'style4_table',name:'Table+',icon:'\u{1F4CA}'},
  {id:'style5_chart',name:'Chart',icon:'\u{1F4C8}'},
  {id:'style6_kanban',name:'Kanban',icon:'\u{1F4CB}'},
  {id:'style7_sports',name:'Sports',icon:'\u{1F3DF}'},
  {id:'style8_hybrid',name:'Hybrid',icon:'\u26A1'},
  {id:'style9_stockapp',name:'MTS',icon:'\u{1F4F1}'},
];
const currentFile = location.pathname.split('/').pop().replace('.html','');
const list = document.getElementById('style-list');
STYLES.forEach(s => {
  const active = currentFile === s.id;
  const btn = document.createElement('div');
  btn.style.cssText = `padding:12px 8px;border-radius:12px;text-align:center;cursor:pointer;border:2px solid ${active?'#fbbf24':'rgba(255,255,255,.1)'};background:${active?'rgba(251,191,36,.15)':'rgba(255,255,255,.03)'};`;
  btn.innerHTML = `<div style="font-size:24px;">${s.icon}</div><div style="font-size:11px;margin-top:4px;color:${active?'#fbbf24':'rgba(255,255,255,.6)'};">${s.name}</div>`;
  if (!active) btn.onclick = () => location.href = s.id + '.html';
  list.appendChild(btn);
});
document.head.insertAdjacentHTML('beforeend','<style>.hidden{display:none!important;}</style>');
</script>
</body>
