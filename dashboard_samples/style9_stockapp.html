<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arena Trading</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        up: '#FF3B30',
        down: '#007AFF',
        bg: '#111111',
        card: '#1C1C1E',
        border: '#2C2C2E',
        sub: '#8E8E93',
        label: '#AEAEB2',
      },
      fontFamily: {
        sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
      }
    }
  }
}
</script>
<style>
* { -webkit-tap-highlight-color: transparent; }
body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: #111111; }
::-webkit-scrollbar { display: none; }
.tab-active { color: #FF3B30; }
.tab-inactive { color: #8E8E93; }
</style>
</head>
<body class="bg-bg text-white max-w-[430px] mx-auto min-h-screen pb-24 select-none">

  <div id="loading" style="display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:12px;">
    <div style="width:40px;height:40px;border:3px solid #2C2C2E;border-top-color:#FF3B30;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <div class="text-sm text-sub">Loading...</div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>
  <div id="content" style="display:none;"></div>

  <!-- Bottom Tab Bar -->
  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-card/95 backdrop-blur-lg border-t border-border z-50">
    <div class="flex items-center justify-around pb-7 pt-2">
      <button class="flex flex-col items-center gap-0.5 tab-active" onclick="switchTab('home')">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3l-10 9h3v9h6v-6h2v6h6v-9h3L12 3z"/></svg>
        <span class="text-[10px] font-medium">홈</span>
      </button>
      <button class="flex flex-col items-center gap-0.5 tab-inactive" onclick="switchTab('stocks')">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8M14 7h7v7"/></svg>
        <span class="text-[10px] font-medium">종목</span>
      </button>
      <button class="flex flex-col items-center gap-0.5 tab-inactive" onclick="switchTab('trades')">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M8 7h12M8 12h12M8 17h12M4 7h.01M4 12h.01M4 17h.01"/></svg>
        <span class="text-[10px] font-medium">매매</span>
      </button>
      <button class="flex flex-col items-center gap-0.5 tab-inactive" onclick="switchTab('bnf')">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        <span class="text-[10px] font-medium">BNF</span>
      </button>
      <button class="flex flex-col items-center gap-0.5 tab-inactive" onclick="switchTab('arena')">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span class="text-[10px] font-medium">아레나</span>
      </button>
    </div>
  </nav>

<script>
const BASE = '../';
const TEAMS = ['team_a','team_b','team_c','team_d','team_e'];
const TEAM_NAMES = {team_a:'Alpha Momentum',team_b:'Beta Contrarian',team_c:'Gamma Disclosure',team_d:'Delta Theme',team_e:'Echo Frontier'};
const TEAM_SHORT = {team_a:'Alpha',team_b:'Beta',team_c:'Gamma',team_d:'Delta',team_e:'Echo'};
const TEAM_COLORS = {team_a:'#EF4444',team_b:'#3B82F6',team_c:'#10B981',team_d:'#F59E0B',team_e:'#8B5CF6'};
const TEAM_EMOJIS = {team_a:'\u{1F534}',team_b:'\u{1F535}',team_c:'\u{1F7E2}',team_d:'\u{1F7E1}',team_e:'\u{1F7E3}'};
const TEAM_STRATS = {team_a:'momentum',team_b:'largecap_contrarian',team_c:'dart_disclosure',team_d:'theme_policy',team_e:'frontier_gap'};

let DATA = null;

async function fetchJ(path) {
  try { const r = await fetch(BASE + path); if (!r.ok) return null; return r.json(); } catch { return null; }
}

async function loadData() {
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
  }
  const [leaderboard, bnfPos, bnfCand] = await Promise.all([
    fetchJ('data/arena/leaderboard.json'),
    fetchJ('data/bnf/positions.json'),
    fetchJ('data/bnf/candidates.json'),
  ]);
  let status=null, candidates=null, dataDate=dates[0];
  for (const dt of dates) {
    const s = await fetchJ(`data/paper_trading/status_${dt}.json`);
    if (s) { status = s; dataDate = dt; break; }
  }
  for (const dt of dates) {
    const c = await fetchJ(`data/paper_trading/candidates_${dt}_all.json`);
    if (c) { candidates = c; break; }
  }
  const portfolios = {}, trades = {}, summaries = {};
  await Promise.all(TEAMS.map(async tid => {
    portfolios[tid] = await fetchJ(`data/arena/${tid}/portfolio.json`);
    for (const dt of dates) {
      if (!trades[tid]) { const t = await fetchJ(`data/arena/${tid}/daily/${dt}/trades.json`); if(t) trades[tid]=t; }
      if (!summaries[tid]) { const s = await fetchJ(`data/arena/${tid}/daily/${dt}/summary.json`); if(s) summaries[tid]=s; }
    }
  }));
  return { leaderboard, status, candidates, bnfPos, bnfCand, portfolios, trades, summaries, dataDate };
}

function fmt(n) { return n != null ? Number(n).toLocaleString('ko-KR') : '-'; }
function fmtPct(n) { return n != null ? (n > 0 ? '+' : '') + Number(n).toFixed(2) + '%' : '-'; }

function switchTab(tab) {
  if (!DATA) return;
  // Update tab bar active state
  const nav = document.querySelector('nav');
  const buttons = nav.querySelectorAll('button');
  const tabNames = ['home','stocks','trades','bnf','arena'];
  buttons.forEach((btn, i) => {
    btn.className = `flex flex-col items-center gap-0.5 ${tabNames[i] === tab ? 'tab-active' : 'tab-inactive'}`;
    const svg = btn.querySelector('svg');
    if (tabNames[i] === tab) {
      svg.setAttribute('fill', 'currentColor');
      svg.removeAttribute('stroke');
    } else if (i > 0) {
      svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', 'currentColor');
    }
  });

  const content = document.getElementById('content');
  if (tab === 'home') renderHome(content);
  else if (tab === 'stocks') renderStocks(content);
  else if (tab === 'trades') renderTrades(content);
  else if (tab === 'bnf') renderBnf(content);
  else if (tab === 'arena') renderArena(content);
}

function renderHome(el) {
  const d = DATA;
  // Aggregate
  let totalCapital = 0, dailyPnL = 0, totalTrades = 0, totalWins = 0;
  const initialTotal = TEAMS.length * 10000000;
  TEAMS.forEach(tid => {
    const p = d.portfolios[tid];
    if (p) {
      totalCapital += p.current_capital || 0;
      totalTrades += p.total_trades || 0;
      totalWins += p.total_wins || 0;
    }
    const t = d.trades[tid];
    if (t && t.results) t.results.forEach(r => dailyPnL += r.return_amount || 0);
  });
  const totalPnL = totalCapital - initialTotal;
  const totalRetPct = initialTotal > 0 ? (totalPnL / initialTotal * 100) : 0;
  const winRate = totalTrades > 0 ? (totalWins / totalTrades * 100).toFixed(1) : '0';

  // BNF positions as holdings
  const bnfPositions = d.bnfPos && d.bnfPos.positions ? d.bnfPos.positions : [];

  // Candidates
  let allCandidates = [];
  if (d.candidates && d.candidates.strategies) {
    Object.values(d.candidates.strategies).forEach(s => {
      if (s.candidates) allCandidates.push(...s.candidates);
    });
    allCandidates.sort((a,b) => (b.score||0) - (a.score||0));
  }

  el.innerHTML = `
  <!-- Header -->
  <header class="flex items-center justify-between px-5 pt-14 pb-3 sticky top-0 bg-bg/95 backdrop-blur-sm z-30">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-up/20 flex items-center justify-center">
        <svg class="w-4 h-4 text-up" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2L2 10h5v8h6v-8h5L10 2z"/></svg>
      </div>
      <span class="text-lg font-bold tracking-tight">Arena Trading</span>
    </div>
    <div class="flex items-center gap-4">
      <div class="relative">
        <svg class="w-6 h-6 text-label" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        <span class="absolute -top-1 -right-1 w-2 h-2 bg-up rounded-full"></span>
      </div>
      <div class="w-8 h-8 rounded-full bg-card border border-border flex items-center justify-center">
        <svg class="w-4 h-4 text-label" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
      </div>
    </div>
  </header>

  <!-- My Asset Card -->
  <section class="mx-4 mt-2 rounded-2xl bg-card p-5">
    <p class="text-sub text-xs mb-1">총 평가금액</p>
    <p class="text-[28px] font-bold tracking-tight leading-tight">${fmt(totalCapital)}<span class="text-base font-medium text-label ml-0.5">원</span></p>
    <div class="flex items-center gap-1.5 mt-1">
      <span class="${totalPnL >= 0 ? 'text-up' : 'text-down'} text-sm font-semibold">${totalPnL >= 0 ? '+' : ''}${fmt(totalPnL)}원</span>
      <span class="${totalPnL >= 0 ? 'text-up bg-up/10' : 'text-down bg-down/10'} text-xs px-1.5 py-0.5 rounded-md font-medium">${fmtPct(totalRetPct)}</span>
    </div>
    <div class="grid grid-cols-3 gap-3 mt-4 pt-4 border-t border-border">
      <div>
        <p class="text-[10px] text-sub mb-1">투자원금</p>
        <p class="text-sm font-semibold">${fmt(initialTotal)}</p>
      </div>
      <div class="text-center">
        <p class="text-[10px] text-sub mb-1">일일손익</p>
        <p class="text-sm font-semibold ${dailyPnL >= 0 ? 'text-up' : 'text-down'}">${dailyPnL >= 0 ? '+' : ''}${fmt(dailyPnL)}</p>
      </div>
      <div class="text-right">
        <p class="text-[10px] text-sub mb-1">승률</p>
        <p class="text-sm font-semibold">${winRate}%</p>
      </div>
    </div>
  </section>

  <!-- Holdings (BNF positions) -->
  <section class="mt-6 px-4">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-base font-bold">보유종목</h2>
      <span class="text-xs text-sub">${bnfPositions.length}종목</span>
    </div>
    <div class="bg-card rounded-xl overflow-hidden divide-y divide-border">
      ${bnfPositions.length ? bnfPositions.map(pos => {
        const ret = pos.return_pct || pos.unrealized_pnl_pct || 0;
        const qty = pos.quantity || pos.shares || '-';
        const price = pos.current_price || pos.price || '-';
        return `<div class="flex items-center justify-between px-4 py-3.5">
          <div>
            <p class="text-sm font-semibold">${pos.name || pos.code || '-'}</p>
            <p class="text-xs text-sub mt-0.5">${qty}주</p>
          </div>
          <div class="text-right">
            <p class="text-sm font-semibold">${typeof price === 'number' ? fmt(price) + '원' : price}</p>
            <p class="text-xs ${ret >= 0 ? 'text-up' : 'text-down'} font-medium mt-0.5">${fmtPct(ret)}</p>
          </div>
        </div>`;
      }).join('') : '<div class="px-4 py-4 text-center text-sub text-sm">보유 종목 없음</div>'}
    </div>
  </section>

  <!-- Watchlist (Candidates) -->
  <section class="mt-6 px-4 pb-6">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-base font-bold">관심종목</h2>
      <span class="text-xs text-sub">내일 후보</span>
    </div>
    <div class="bg-card rounded-xl overflow-hidden divide-y divide-border">
      ${allCandidates.length ? allCandidates.slice(0,5).map(c => {
        const score = c.score || 0;
        return `<div class="flex items-center px-4 py-3.5">
          <div class="flex-1">
            <p class="text-sm font-semibold">${c.name || c.code || '-'}</p>
            ${c.change_pct != null ? `<span class="text-[10px] ${c.change_pct >= 0 ? 'text-up bg-up/10' : 'text-down bg-down/10'} px-1.5 py-0.5 rounded mt-1 inline-block">${fmtPct(c.change_pct)}</span>` : ''}
          </div>
          <div class="text-right">
            <p class="text-sm font-bold">${score.toFixed(1)}</p>
            <p class="text-[10px] text-sub">점</p>
          </div>
        </div>`;
      }).join('') : '<div class="px-4 py-4 text-center text-sub text-sm">후보 데이터 없음</div>'}
    </div>
  </section>`;
}

function renderStocks(el) {
  const d = DATA;
  // Show all team portfolios
  el.innerHTML = `
  <header class="flex items-center justify-between px-5 pt-14 pb-3 sticky top-0 bg-bg/95 backdrop-blur-sm z-30">
    <span class="text-lg font-bold tracking-tight">팀별 포트폴리오</span>
  </header>
  ${TEAMS.map(tid => {
    const p = d.portfolios[tid];
    if (!p) return '';
    const ret = p.total_return_pct || 0;
    const capital = p.current_capital || 0;
    const wr = p.total_trades > 0 ? (p.total_wins / p.total_trades * 100).toFixed(1) : '-';
    return `
    <section class="mx-4 mt-3 rounded-xl bg-card p-4">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <span class="text-base">${TEAM_EMOJIS[tid]}</span>
          <span class="text-sm font-bold">${TEAM_NAMES[tid]}</span>
        </div>
        <span class="text-sm font-semibold ${ret >= 0 ? 'text-up' : 'text-down'}">${fmtPct(ret)}</span>
      </div>
      <div class="grid grid-cols-3 gap-2 text-center">
        <div>
          <p class="text-[10px] text-sub">자본</p>
          <p class="text-xs font-semibold">${fmt(capital)}</p>
        </div>
        <div>
          <p class="text-[10px] text-sub">승률</p>
          <p class="text-xs font-semibold">${wr}%</p>
        </div>
        <div>
          <p class="text-[10px] text-sub">MDD</p>
          <p class="text-xs font-semibold ${(p.max_drawdown_pct||0) < 0 ? 'text-down' : ''}">${p.max_drawdown_pct != null ? fmtPct(p.max_drawdown_pct) : '-'}</p>
        </div>
      </div>
    </section>`;
  }).join('')}
  <div class="h-6"></div>`;
}

function renderTrades(el) {
  const d = DATA;
  // Aggregate all team trades
  let allTrades = [];
  TEAMS.forEach(tid => {
    const t = d.trades[tid];
    if (t && t.results) {
      t.results.forEach(r => allTrades.push({...r, team: tid}));
    }
  });
  allTrades.sort((a,b) => {
    if (a.exit_time && b.exit_time) return a.exit_time > b.exit_time ? -1 : 1;
    return (b.return_amount||0) - (a.return_amount||0);
  });

  el.innerHTML = `
  <header class="flex items-center justify-between px-5 pt-14 pb-3 sticky top-0 bg-bg/95 backdrop-blur-sm z-30">
    <span class="text-lg font-bold tracking-tight">체결내역</span>
    <span class="text-xs text-sub">${allTrades.length}건</span>
  </header>
  <section class="px-4">
    <div class="bg-card rounded-xl overflow-hidden divide-y divide-border">
      ${allTrades.length ? allTrades.map(t => {
        const ret = t.return_pct || 0;
        const amt = t.return_amount || 0;
        const time = t.exit_time ? t.exit_time.slice(11,16) : '';
        const exitLabel = t.exit_type === 'profit' ? '매도(익절)' : t.exit_type === 'loss' ? '매도(손절)' : '매도';
        return `<div class="flex items-center justify-between px-4 py-3">
          <div>
            <p class="text-sm font-semibold">${t.name || t.code || '-'}</p>
            <p class="text-[11px] text-sub mt-0.5">${time} ${exitLabel}</p>
          </div>
          <div class="text-right">
            <p class="text-sm">${t.exit_price ? fmt(t.exit_price) + '원' : '-'}</p>
            <p class="text-xs ${amt >= 0 ? 'text-up' : 'text-down'} font-medium mt-0.5">${amt >= 0 ? '+' : ''}${fmt(amt)}</p>
          </div>
        </div>`;
      }).join('') : '<div class="px-4 py-4 text-center text-sub text-sm">체결 내역 없음</div>'}
    </div>
  </section>
  <div class="h-6"></div>`;
}

function renderBnf(el) {
  const d = DATA;
  const bnfPos = d.bnfPos && d.bnfPos.positions ? d.bnfPos.positions : [];
  const stats = d.bnfPos && d.bnfPos.stats ? d.bnfPos.stats : {};

  el.innerHTML = `
  <header class="flex items-center justify-between px-5 pt-14 pb-3 sticky top-0 bg-bg/95 backdrop-blur-sm z-30">
    <span class="text-lg font-bold tracking-tight">BNF 포트폴리오</span>
  </header>
  <section class="mx-4 mt-2 rounded-2xl bg-card p-5">
    <div class="grid grid-cols-2 gap-3">
      <div>
        <p class="text-[10px] text-sub mb-1">총 수익률</p>
        <p class="text-xl font-bold ${(stats.total_return||0) >= 0 ? 'text-up' : 'text-down'}">${fmtPct(stats.total_return)}</p>
      </div>
      <div>
        <p class="text-[10px] text-sub mb-1">승률</p>
        <p class="text-xl font-bold">${stats.win_rate != null ? stats.win_rate + '%' : '-'}</p>
      </div>
      <div>
        <p class="text-[10px] text-sub mb-1">총 매매</p>
        <p class="text-sm font-semibold">${stats.total_trades || '-'}건</p>
      </div>
      <div>
        <p class="text-[10px] text-sub mb-1">자본금</p>
        <p class="text-sm font-semibold">${stats.current_capital ? fmt(stats.current_capital) : '-'}</p>
      </div>
      <div>
        <p class="text-[10px] text-sub mb-1">실현 손익</p>
        <p class="text-sm font-semibold ${(stats.realized_pnl||0) >= 0 ? 'text-up' : 'text-down'}">${stats.realized_pnl != null ? (stats.realized_pnl >= 0 ? '+' : '') + fmt(stats.realized_pnl) : '-'}</p>
      </div>
      <div>
        <p class="text-[10px] text-sub mb-1">미실현 손익</p>
        <p class="text-sm font-semibold ${(stats.unrealized_pnl||0) >= 0 ? 'text-up' : 'text-down'}">${stats.unrealized_pnl != null ? (stats.unrealized_pnl >= 0 ? '+' : '') + fmt(stats.unrealized_pnl) : '-'}</p>
      </div>
    </div>
  </section>
  <section class="mt-4 px-4">
    <h2 class="text-base font-bold mb-3">보유 종목</h2>
    <div class="bg-card rounded-xl overflow-hidden divide-y divide-border">
      ${bnfPos.length ? bnfPos.map(pos => {
        const ret = pos.return_pct || pos.unrealized_pnl_pct || 0;
        const qty = pos.quantity || pos.shares || '-';
        const price = pos.current_price || pos.price || '-';
        return `<div class="flex items-center justify-between px-4 py-3.5">
          <div>
            <p class="text-sm font-semibold">${pos.name || pos.code || '-'}</p>
            <p class="text-xs text-sub mt-0.5">${qty}주</p>
          </div>
          <div class="text-right">
            <p class="text-sm font-semibold">${typeof price === 'number' ? fmt(price) + '원' : price}</p>
            <p class="text-xs ${ret >= 0 ? 'text-up' : 'text-down'} font-medium mt-0.5">${fmtPct(ret)}</p>
          </div>
        </div>`;
      }).join('') : '<div class="px-4 py-4 text-center text-sub text-sm">보유 종목 없음</div>'}
    </div>
  </section>
  <div class="h-6"></div>`;
}

function renderArena(el) {
  const d = DATA;
  const lb = d.leaderboard;
  const teams = lb ? [...(lb.teams || [])].sort((a,b) => (a.rank||99) - (b.rank||99)) : [];

  el.innerHTML = `
  <header class="flex items-center justify-between px-5 pt-14 pb-3 sticky top-0 bg-bg/95 backdrop-blur-sm z-30">
    <span class="text-lg font-bold tracking-tight">아레나 순위</span>
    <span class="text-xs text-sub">ELO 기준</span>
  </header>
  <section class="px-4">
    <div class="bg-card rounded-xl overflow-hidden divide-y divide-border">
      ${teams.length ? teams.map((t, i) => {
        const tid = t.team_id || '';
        const elo = t.elo || '-';
        const p = d.portfolios[tid];
        const retPct = p ? p.total_return_pct : 0;
        return `<div class="flex items-center px-4 py-3.5">
          <span class="text-sm font-bold ${i === 0 ? 'text-up' : 'text-label'} w-6">${i+1}</span>
          <span class="text-base mr-2">${TEAM_EMOJIS[tid]||''}</span>
          <span class="text-sm font-semibold flex-1">${TEAM_SHORT[tid]||tid}</span>
          <span class="text-sm ${retPct > 0 ? 'text-up' : retPct < 0 ? 'text-down' : 'text-label'} font-semibold mr-4">${fmtPct(retPct)}</span>
          <span class="text-xs text-sub bg-bg px-2 py-1 rounded-md">ELO ${elo}</span>
        </div>`;
      }).join('') : '<div class="px-4 py-4 text-center text-sub text-sm">데이터 없음</div>'}
    </div>
  </section>
  <div class="h-6"></div>`;
}

function render(data) {
  DATA = data;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  renderHome(document.getElementById('content'));
}

document.addEventListener('DOMContentLoaded', () => {
  loadData().then(render).catch(e => {
    console.error(e);
    document.getElementById('loading').innerHTML = '<div class="text-up text-sm">데이터 로딩 실패</div>';
  });
});
</script>

<!-- Style Switcher FAB -->
<div id="style-fab" onclick="document.getElementById('style-modal').classList.toggle('hidden')" style="position:fixed;bottom:80px;right:24px;width:52px;height:52px;border-radius:50%;background:#fbbf24;color:#000;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(251,191,36,.4);z-index:9999;">\u{1F3A8}</div>
<div id="style-modal" class="hidden" style="position:fixed;inset:0;z-index:10000;display:flex;align-items:flex-end;justify-content:center;">
  <div onclick="document.getElementById('style-modal').classList.add('hidden')" style="position:absolute;inset:0;background:rgba(0,0,0,.5);"></div>
  <div style="position:relative;width:100%;max-width:430px;max-height:70vh;overflow-y:auto;background:#1a1a1a;border-radius:20px 20px 0 0;padding:20px;margin-bottom:70px;">
    <div style="text-align:center;margin-bottom:16px;"><div style="width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 12px;"></div><div style="font-weight:700;font-size:16px;color:#fff;">스타일 변경</div></div>
    <div id="style-list" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"></div>
  </div>
</div>
<script>
const STYLES = [
  {id:'style1_terminal',name:'Terminal',icon:'\u{1F4BB}'},
  {id:'style2_card',name:'Card',icon:'\u{1F0CF}'},
  {id:'style3_glass',name:'Glass',icon:'\u{1F52E}'},
  {id:'style4_table',name:'Table+',icon:'\u{1F4CA}'},
  {id:'style5_chart',name:'Chart',icon:'\u{1F4C8}'},
  {id:'style6_kanban',name:'Kanban',icon:'\u{1F4CB}'},
  {id:'style7_sports',name:'Sports',icon:'\u{1F3DF}'},
  {id:'style8_hybrid',name:'Hybrid',icon:'\u26A1'},
  {id:'style9_stockapp',name:'MTS',icon:'\u{1F4F1}'},
];
const currentFile = location.pathname.split('/').pop().replace('.html','');
const list = document.getElementById('style-list');
STYLES.forEach(s => {
  const active = currentFile === s.id;
  const btn = document.createElement('div');
  btn.style.cssText = `padding:12px 8px;border-radius:12px;text-align:center;cursor:pointer;border:2px solid ${active?'#fbbf24':'rgba(255,255,255,.1)'};background:${active?'rgba(251,191,36,.15)':'rgba(255,255,255,.03)'};`;
  btn.innerHTML = `<div style="font-size:24px;">${s.icon}</div><div style="font-size:11px;margin-top:4px;color:${active?'#fbbf24':'rgba(255,255,255,.6)'};">${s.name}</div>`;
  if (!active) btn.onclick = () => location.href = s.id + '.html';
  list.appendChild(btn);
});
document.head.insertAdjacentHTML('beforeend','<style>.hidden{display:none!important;}</style>');
</script>
