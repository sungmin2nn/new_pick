<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARENA LEAGUE</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        display: ['Outfit', 'sans-serif'],
        body: ['Pretendard', 'sans-serif'],
      },
      colors: {
        arena: { bg: '#0a0e17', card: '#111827', border: '#1e293b', accent: '#f59e0b' },
        team: {
          alpha: '#ef4444',
          beta: '#3b82f6',
          gamma: '#22c55e',
          delta: '#eab308',
          echo: '#a855f7',
        }
      }
    }
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', sans-serif;
    background: #0a0e17;
    color: #e2e8f0;
    min-height: 100vh;
  }
  .font-display { font-family: 'Outfit', sans-serif; }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 8px rgba(245, 158, 11, 0.3); }
    50% { box-shadow: 0 0 20px rgba(245, 158, 11, 0.6); }
  }
  .glow-live { animation: pulseGlow 2s ease-in-out infinite; }

  @keyframes slideScore {
    from { transform: translateX(-20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .slide-in { animation: slideScore 0.5s ease-out forwards; }
  .slide-in:nth-child(2) { animation-delay: 0.1s; }
  .slide-in:nth-child(3) { animation-delay: 0.2s; }
  .slide-in:nth-child(4) { animation-delay: 0.3s; }
  .slide-in:nth-child(5) { animation-delay: 0.4s; }

  @keyframes tickerScroll {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }
  .ticker-scroll { animation: tickerScroll 20s linear infinite; }

  .team-stripe-alpha { border-left: 4px solid #ef4444; }
  .team-stripe-beta { border-left: 4px solid #3b82f6; }
  .team-stripe-gamma { border-left: 4px solid #22c55e; }
  .team-stripe-delta { border-left: 4px solid #eab308; }
  .team-stripe-echo { border-left: 4px solid #a855f7; }

  .rank-1 { background: linear-gradient(90deg, rgba(245,158,11,0.15) 0%, transparent 100%); }
  .rank-badge {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    border-radius: 6px;
    font-size: 14px;
  }

  .score-positive { color: #4ade80; }
  .score-negative { color: #f87171; }
  .score-zero { color: #94a3b8; }

  .win-bar {
    height: 6px;
    border-radius: 3px;
    background: #1e293b;
    overflow: hidden;
  }
  .win-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
  }

  .match-card {
    background: #111827;
    border: 1px solid #1e293b;
    border-radius: 12px;
    overflow: hidden;
  }

  .dominant-tag {
    background: linear-gradient(135deg, #ef4444, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
  }

  .trophy-shimmer {
    background: linear-gradient(90deg, #f59e0b, #fbbf24, #f59e0b);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 2s linear infinite;
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .espn-divider {
    height: 3px;
    background: linear-gradient(90deg, transparent, #f59e0b, transparent);
    border: none;
  }
</style>
</head>
<body>
<div id="app" class="max-w-[430px] mx-auto pb-8">
  <div id="loading" style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;">
    <div style="width:40px;height:40px;border:3px solid #1e293b;border-top-color:#f59e0b;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <div class="font-display text-sm text-slate-500">Loading Arena Data...</div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>
  <div id="content" style="display:none;"></div>
</div>

<script>
const BASE = '../';
const TEAMS = ['team_a','team_b','team_c','team_d','team_e'];
const TEAM_NAMES = {team_a:'Alpha Momentum',team_b:'Beta Contrarian',team_c:'Gamma Disclosure',team_d:'Delta Theme',team_e:'Echo Frontier'};
const TEAM_SHORT = {team_a:'Alpha',team_b:'Beta',team_c:'Gamma',team_d:'Delta',team_e:'Echo'};
const TEAM_SUB = {team_a:'Momentum',team_b:'Contrarian',team_c:'Disclosure',team_d:'Theme',team_e:'Frontier'};
const TEAM_COLORS = {team_a:'#EF4444',team_b:'#3B82F6',team_c:'#10B981',team_d:'#F59E0B',team_e:'#8B5CF6'};
const TEAM_EMOJIS = {team_a:'\u{1F534}',team_b:'\u{1F535}',team_c:'\u{1F7E2}',team_d:'\u{1F7E1}',team_e:'\u{1F7E3}'};
const TEAM_STRATS = {team_a:'momentum',team_b:'largecap_contrarian',team_c:'dart_disclosure',team_d:'theme_policy',team_e:'frontier_gap'};
const TEAM_STRIPE = {team_a:'team-stripe-alpha',team_b:'team-stripe-beta',team_c:'team-stripe-gamma',team_d:'team-stripe-delta',team_e:'team-stripe-echo'};
const TEAM_BAR_CLASS = {team_a:'bg-gradient-to-r from-red-500 to-amber-500',team_b:'bg-blue-500',team_c:'bg-green-500',team_d:'bg-yellow-500',team_e:'bg-purple-500'};
const TEAM_BG_CLASS = {team_a:'bg-red-500/20',team_b:'bg-blue-500/20',team_c:'bg-green-500/20',team_d:'bg-yellow-500/20',team_e:'bg-purple-500/20'};

async function fetchJ(path) {
  try { const r = await fetch(BASE + path); if (!r.ok) return null; return r.json(); } catch { return null; }
}

async function loadData() {
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
  }
  const [leaderboard, bnfPos, bnfCand] = await Promise.all([
    fetchJ('data/arena/leaderboard.json'),
    fetchJ('data/bnf/positions.json'),
    fetchJ('data/bnf/candidates.json'),
  ]);
  let status=null, candidates=null, dataDate=dates[0];
  for (const dt of dates) {
    const s = await fetchJ(`data/paper_trading/status_${dt}.json`);
    if (s) { status = s; dataDate = dt; break; }
  }
  for (const dt of dates) {
    const c = await fetchJ(`data/paper_trading/candidates_${dt}_all.json`);
    if (c) { candidates = c; break; }
  }
  const portfolios = {}, trades = {}, summaries = {};
  await Promise.all(TEAMS.map(async tid => {
    portfolios[tid] = await fetchJ(`data/arena/${tid}/portfolio.json`);
    for (const dt of dates) {
      if (!trades[tid]) { const t = await fetchJ(`data/arena/${tid}/daily/${dt}/trades.json`); if(t) trades[tid]=t; }
      if (!summaries[tid]) { const s = await fetchJ(`data/arena/${tid}/daily/${dt}/summary.json`); if(s) summaries[tid]=s; }
    }
  }));
  return { leaderboard, status, candidates, bnfPos, bnfCand, portfolios, trades, summaries, dataDate };
}

function fmt(n) { return n != null ? Number(n).toLocaleString('ko-KR') : '-'; }
function fmtPct(n) { return n != null ? (n > 0 ? '+' : '') + Number(n).toFixed(2) + '%' : '-'; }
function scoreClass(n) { return n > 0 ? 'score-positive' : n < 0 ? 'score-negative' : 'score-zero'; }

function render(data) {
  const lb = data.leaderboard;
  const teams = lb?.teams ? Object.values(lb.teams).sort((a,b) => (a.rank||99) - (b.rank||99)) : [];
  const history = lb ? (lb.daily_history || []) : [];
  const latestDay = history.length > 0 ? history[history.length - 1] : null;
  const dayNum = history.length || 0;
  const today = new Date().toISOString().slice(0,10);

  // Compute total P&L across all teams
  let totalPnL = 0;
  TEAMS.forEach(tid => {
    const p = data.portfolios[tid];
    if (p) totalPnL += (p.current_capital || 0) - (p.initial_capital || 10000000);
  });

  // Build today match results from latest daily_history
  let todayRanking = [];
  if (latestDay && latestDay.ranking) {
    todayRanking = [...latestDay.ranking].sort((a,b) => (a.total_return||0) < (b.total_return||0) ? 1 : -1);
  }

  // Find MVP and worst trade across all teams
  let mvpTrade = null, worstTrade = null;
  TEAMS.forEach(tid => {
    const t = data.trades[tid];
    if (!t || !t.results) return;
    t.results.forEach(r => {
      if (!mvpTrade || (r.return_pct||0) > (mvpTrade.return_pct||0)) mvpTrade = r;
      if (!worstTrade || (r.return_pct||0) < (worstTrade.return_pct||0)) worstTrade = r;
    });
  });

  // Build ticker text
  let tickerParts = [];
  if (mvpTrade) tickerParts.push(`${mvpTrade.name} ${fmtPct(mvpTrade.return_pct)} MVP`);
  if (teams[0]) tickerParts.push(`${TEAM_NAMES[teams[0].team_id] || teams[0].team_name || 'Alpha'} ${teams[0].total_1st||0}연승 독주`);
  if (teams.length > 1) {
    const worst = teams[teams.length - 1];
    const wp = data.portfolios[worst.team_id];
    if (wp) tickerParts.push(`${TEAM_NAMES[worst.team_id]||worst.team_name} 시즌 최악 ${fmtPct(wp.total_return_pct)}`);
  }
  if (data.bnfPos && data.bnfPos.stats) tickerParts.push(`BNF ${fmtPct(data.bnfPos.stats.total_return)} 시즌 수익`);
  if (!tickerParts.length) tickerParts.push('Arena League 데이터 로딩 중...');

  // Candidates for tomorrow
  let allCandidates = [];
  if (data.candidates && data.candidates.strategies) {
    Object.values(data.candidates.strategies).forEach(s => {
      if (s.candidates) allCandidates.push(...s.candidates);
    });
    allCandidates.sort((a,b) => (b.score||0) - (a.score||0));
  }
  const topCandidates = allCandidates.slice(0, 5);

  // BNF positions
  const bnfPositions = data.bnfPos && data.bnfPos.positions ? data.bnfPos.positions : [];
  const bnfStats = data.bnfPos && data.bnfPos.stats ? data.bnfPos.stats : {};

  // Most wins team
  let mostWinsTeam = teams[0];

  // Compute W-D-L for standings from daily_history
  function getTeamWDL(teamId) {
    let w=0, d=0, l=0;
    history.forEach(day => {
      if (!day.ranking) return;
      const entry = day.ranking.find(r => r.team_id === teamId);
      if (!entry) { d++; return; }
      const ret = entry.total_return || 0;
      if (ret > 0) w++; else if (ret < 0) l++; else d++;
    });
    return {w, d, l};
  }

  // Build score cards from todayRanking
  function buildScoreCards() {
    if (!todayRanking.length) return '<div class="text-center text-slate-500 text-sm py-4 font-body">데이터 없음</div>';
    return todayRanking.map((r, i) => {
      const tid = r.team_id || '';
      const ret = r.total_return || 0;
      const winRate = r.win_rate || 0;
      const wins = r.trades ? Math.round(r.trades * winRate / 100) : 0;
      const losses = (r.trades || 0) - wins;
      const isDominant = i === 0 && ret > 10;
      const noTrades = !r.trades;
      return `
      <div class="match-card ${TEAM_STRIPE[tid]||''} slide-in opacity-0">
        <div class="px-3 py-2.5 flex items-center">
          <div class="flex items-center gap-2 flex-1 min-w-0">
            <div class="w-8 h-8 rounded-full ${TEAM_BG_CLASS[tid]||'bg-slate-700/20'} flex items-center justify-center text-sm shrink-0">${TEAM_EMOJIS[tid]||''}</div>
            <div class="min-w-0">
              <div class="font-display font-bold text-[13px] text-white truncate">${TEAM_NAMES[tid]||tid}</div>
              <div class="text-[10px] text-slate-500">${noTrades ? '<i>BYE WEEK</i>' : `${wins}W ${losses}L`}</div>
            </div>
          </div>
          <div class="text-right shrink-0 ml-2">
            ${noTrades ? '<div class="font-display font-bold text-[14px] score-zero leading-none">---</div>' :
            `<div class="font-display font-black text-[${i===0?'20':'18'}px] ${scoreClass(ret)} leading-none">${fmtPct(ret)}</div>
            ${isDominant ? '<div class="dominant-tag text-[10px] font-display mt-0.5">DOMINANT</div>' : ''}`}
          </div>
        </div>
        ${!noTrades ? `<div class="win-bar mx-3 mb-2.5"><div class="win-bar-fill ${TEAM_BAR_CLASS[tid]||'bg-slate-500'}" style="width:${winRate}%"></div></div>` : ''}
      </div>`;
    }).join('');
  }

  // Build standings
  function buildStandings() {
    if (!teams.length) return '<div class="text-center text-slate-500 text-sm py-4 font-body">데이터 없음</div>';
    return teams.map((t, i) => {
      const tid = t.team_id || '';
      const rank = t.rank || (i+1);
      const elo = t.elo || '-';
      const wdl = getTeamWDL(tid);
      const p = data.portfolios[tid];
      const retPct = p ? p.total_return_pct : 0;
      const trophies = [];
      if (t.total_1st) trophies.push(`\u{1F3C6}${t.total_1st}`);
      const trophyStr = trophies.length ? trophies.join('') : '-';
      return `
      <div class="grid grid-cols-[28px_1fr_50px_70px_56px_40px] gap-1 items-center px-2 py-2 rounded-lg ${rank===1?'rank-1 border border-amber-500/20':' hover:bg-slate-800/50'} mb-1 transition">
        <div class="rank-badge ${rank===1?'bg-amber-500 text-black':'bg-slate-700 text-slate-300'}">${rank}</div>
        <div class="flex items-center gap-1.5 min-w-0">
          <span class="text-sm">${TEAM_EMOJIS[tid]||''}</span>
          <div class="min-w-0">
            <div class="font-display font-bold text-[12px] text-white truncate leading-tight">${TEAM_SHORT[tid]||tid}</div>
            <div class="text-[9px] text-slate-500 truncate">${TEAM_SUB[tid]||''}</div>
          </div>
        </div>
        <div class="text-center font-display font-bold text-[13px] ${rank===1?'text-amber-400':'text-slate-300'}">${elo}</div>
        <div class="text-center font-display font-semibold text-[11px] text-slate-300">${wdl.w}-${wdl.d}-${wdl.l}</div>
        <div class="text-right font-display font-bold text-[12px] ${scoreClass(retPct)}">${fmtPct(retPct)}</div>
        <div class="text-center text-[11px] ${trophyStr==='-'?'text-slate-600':''}">${trophyStr}</div>
      </div>`;
    }).join('');
  }

  // Build BNF section
  function buildBNF() {
    const totalRet = bnfStats.total_return;
    const winRate = bnfStats.win_rate || 0;
    const totalT = bnfStats.total_trades || 0;
    const wins = Math.round(totalT * winRate / 100);
    const losses = totalT - wins;
    let positionsHtml = '';
    if (bnfPositions.length) {
      positionsHtml = bnfPositions.map(pos => {
        const ret = pos.return_pct || pos.unrealized_pnl_pct || 0;
        return `<div class="px-3 py-2 flex items-center justify-between">
          <span class="font-body text-[12px] text-slate-300">${pos.name || pos.code || '-'}</span>
          <span class="font-display font-bold text-[13px] ${scoreClass(ret)}">${fmtPct(ret)}</span>
        </div>`;
      }).join('');
    } else {
      positionsHtml = '<div class="px-3 py-2 text-center text-slate-500 text-[12px]">보유 종목 없음</div>';
    }
    return `
    <div class="match-card overflow-hidden">
      <div class="flex items-center justify-between px-3 py-2 bg-purple-500/10 border-b border-arena-border">
        <div class="flex items-center gap-2">
          <span class="font-display font-bold text-[12px] text-purple-300">Season</span>
          <span class="font-display font-black text-[16px] ${scoreClass(totalRet)}">${fmtPct(totalRet)}</span>
        </div>
        <div class="flex items-center gap-1 text-[11px] font-display font-semibold">
          <span class="text-emerald-400">${wins}W</span>
          <span class="text-slate-600">|</span>
          <span class="text-red-400">${losses}L</span>
        </div>
      </div>
      <div class="divide-y divide-arena-border">${positionsHtml}</div>
    </div>`;
  }

  // Build candidates
  function buildCandidates() {
    if (!topCandidates.length) return '<div class="match-card p-3"><div class="text-center text-slate-500 text-sm">후보 데이터 없음</div></div>';
    return `<div class="match-card p-3">
      <div class="text-[10px] text-slate-500 font-display font-bold tracking-wider mb-2.5">TOP PICKS FOR TOMORROW</div>
      <div class="space-y-2">
        ${topCandidates.map((c, i) => {
          const score = c.score || 0;
          const gradients = ['from-amber-500 to-amber-400','from-amber-600 to-amber-500','from-amber-700 to-amber-600','from-amber-800 to-amber-700','from-amber-900 to-amber-800'];
          return `<div class="flex items-center gap-3">
            <div class="flex-1">
              <div class="flex items-center justify-between mb-1">
                <span class="font-body font-semibold text-[12px] text-white">${c.name || c.code || '-'}</span>
                <span class="font-display font-black text-[14px] text-amber-400">${score.toFixed(1)}</span>
              </div>
              <div class="win-bar">
                <div class="win-bar-fill bg-gradient-to-r ${gradients[i]||gradients[4]}" style="width:${Math.min(score, 100)}%"></div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  document.getElementById('content').innerHTML = `
  <!-- Top Ticker Bar -->
  <div class="bg-red-700 overflow-hidden h-7 flex items-center relative">
    <div class="absolute left-0 top-0 bottom-0 bg-red-800 px-2 flex items-center z-10 font-display font-bold text-[11px] tracking-wider text-white">
      LIVE
      <span class="ml-1.5 w-2 h-2 bg-white rounded-full animate-pulse"></span>
    </div>
    <div class="ticker-scroll whitespace-nowrap text-[11px] font-body text-white/90 pl-16">
      ${tickerParts.join(' | ')}
    </div>
  </div>

  <!-- League Banner -->
  <div class="relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-b from-amber-500/10 to-transparent"></div>
    <div class="px-4 pt-5 pb-4 relative">
      <div class="flex items-center justify-between mb-1">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center">
            <span class="font-display font-black text-black text-sm">A</span>
          </div>
          <div>
            <div class="font-display font-black text-[22px] tracking-tight text-white leading-none">ARENA LEAGUE</div>
          </div>
        </div>
        <div class="text-right">
          <div class="font-display font-extrabold text-amber-400 text-[13px] tracking-wide">DAY ${dayNum}</div>
          <div class="text-[10px] text-slate-500">${today}</div>
        </div>
      </div>
      <div class="flex items-center gap-3 mt-3">
        <div class="flex -space-x-1">
          <div class="w-4 h-4 rounded-full bg-team-alpha border border-arena-bg"></div>
          <div class="w-4 h-4 rounded-full bg-team-delta border border-arena-bg"></div>
          <div class="w-4 h-4 rounded-full bg-team-gamma border border-arena-bg"></div>
          <div class="w-4 h-4 rounded-full bg-team-echo border border-arena-bg"></div>
          <div class="w-4 h-4 rounded-full bg-team-beta border border-arena-bg"></div>
        </div>
        <div class="text-[11px] text-slate-400 font-body">5 Teams Competing | Season Total <span class="text-emerald-400 font-semibold">${totalPnL >= 0 ? '+' : ''}${fmt(totalPnL)}원</span></div>
      </div>
    </div>
    <hr class="espn-divider">
  </div>

  <!-- SECTION: Today's Match Results -->
  <div class="px-4 pt-4">
    <div class="flex items-center gap-2 mb-3">
      <span class="font-display font-extrabold text-[13px] text-amber-400 tracking-widest">MATCH DAY ${dayNum}</span>
      <span class="text-[10px] text-slate-500 font-body">RESULTS</span>
      <div class="flex-1"></div>
      <span class="glow-live text-[10px] bg-red-500/20 text-red-400 font-bold px-2 py-0.5 rounded-full border border-red-500/30">FINAL</span>
    </div>
    <div class="space-y-2">${buildScoreCards()}</div>
  </div>

  <hr class="espn-divider mt-5">

  <!-- SECTION: League Standings -->
  <div class="px-4 pt-4">
    <div class="flex items-center gap-2 mb-3">
      <span class="font-display font-extrabold text-[13px] text-white tracking-widest">STANDINGS</span>
      <span class="text-[10px] text-slate-500 font-body">ELO RANKING</span>
    </div>
    <div class="grid grid-cols-[28px_1fr_50px_70px_56px_40px] gap-1 px-2 py-1.5 text-[9px] text-slate-500 font-display font-bold tracking-wider uppercase">
      <div>#</div>
      <div>Team</div>
      <div class="text-center">ELO</div>
      <div class="text-center">W-D-L</div>
      <div class="text-right">Return</div>
      <div class="text-center">Trophies</div>
    </div>
    ${buildStandings()}
  </div>

  <hr class="espn-divider mt-4">

  <!-- SECTION: MVP & Awards -->
  <div class="px-4 pt-4">
    <div class="flex items-center gap-2 mb-3">
      <span class="font-display font-extrabold text-[13px] text-white tracking-widest">AWARDS</span>
      <span class="text-[10px] text-slate-500 font-body">MATCH DAY ${dayNum}</span>
    </div>
    <div class="grid grid-cols-2 gap-2">
      <div class="match-card p-3 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-16 h-16 bg-amber-500/5 rounded-full -translate-y-4 translate-x-4"></div>
        <div class="text-[10px] text-amber-400 font-display font-bold tracking-wider mb-1">MVP OF THE DAY</div>
        <div class="text-[22px] mb-1">\u{1F3C5}</div>
        <div class="font-display font-bold text-[13px] text-white leading-tight">${mvpTrade ? mvpTrade.name : '-'}</div>
        <div class="font-display font-black text-[18px] ${mvpTrade ? scoreClass(mvpTrade.return_pct) : 'score-zero'} mt-1">${mvpTrade ? fmtPct(mvpTrade.return_pct) : '-'}</div>
        <div class="text-[11px] ${mvpTrade && mvpTrade.return_amount >= 0 ? 'text-emerald-400/70' : 'text-red-400/70'} font-body">${mvpTrade ? (mvpTrade.return_amount >= 0 ? '+' : '') + fmt(mvpTrade.return_amount) + '원' : ''}</div>
      </div>
      <div class="match-card p-3 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-16 h-16 bg-red-500/5 rounded-full -translate-y-4 translate-x-4"></div>
        <div class="text-[10px] text-red-400 font-display font-bold tracking-wider mb-1">WORST PLAY</div>
        <div class="text-[22px] mb-1">\u{1F480}</div>
        <div class="font-display font-bold text-[13px] text-white leading-tight">${worstTrade ? worstTrade.name : '-'}</div>
        <div class="font-display font-black text-[18px] ${worstTrade ? scoreClass(worstTrade.return_pct) : 'score-zero'} mt-1">${worstTrade ? fmtPct(worstTrade.return_pct) : '-'}</div>
        <div class="text-[11px] ${worstTrade && worstTrade.return_amount >= 0 ? 'text-emerald-400/70' : 'text-red-400/70'} font-body">${worstTrade ? (worstTrade.return_amount >= 0 ? '+' : '') + fmt(worstTrade.return_amount) + '원' : ''}</div>
      </div>
    </div>
    <div class="match-card p-3 mt-2">
      <div class="text-[10px] text-amber-400 font-display font-bold tracking-wider mb-2">SEASON STATS</div>
      <div class="grid grid-cols-4 gap-2 text-center">
        <div>
          <div class="font-display font-black text-[20px] text-white">${dayNum}</div>
          <div class="text-[9px] text-slate-500">Match Days</div>
        </div>
        <div>
          <div class="font-display font-black text-[20px] text-red-400">${mostWinsTeam ? (TEAM_SHORT[mostWinsTeam.team_id] || mostWinsTeam.team_name || '-') : '-'}</div>
          <div class="text-[9px] text-slate-500">Most Wins</div>
        </div>
        <div>
          <div class="font-display font-black text-[16px] text-slate-500 leading-[30px]">N/A</div>
          <div class="text-[9px] text-slate-500">Comeback</div>
        </div>
        <div>
          <div class="font-display font-black text-[16px] ${scoreClass(totalPnL)} leading-[30px]">${totalPnL >= 0 ? '+' : ''}${Math.abs(totalPnL) >= 1000 ? Math.round(totalPnL/1000) + 'K' : fmt(totalPnL)}</div>
          <div class="text-[9px] text-slate-500">Total P&L</div>
        </div>
      </div>
    </div>
  </div>

  <hr class="espn-divider mt-4">

  <!-- SECTION: BNF Side Tournament -->
  <div class="px-4 pt-4">
    <div class="flex items-center gap-2 mb-3">
      <span class="font-display font-extrabold text-[13px] text-white tracking-widest">BNF SIDE TOURNAMENT</span>
      <span class="bg-purple-500/20 text-purple-400 text-[9px] font-bold px-1.5 py-0.5 rounded font-display">EXHIBITION</span>
    </div>
    ${buildBNF()}
  </div>

  <hr class="espn-divider mt-4">

  <!-- SECTION: Tomorrow's Preview -->
  <div class="px-4 pt-4 pb-2">
    <div class="flex items-center gap-2 mb-3">
      <span class="font-display font-extrabold text-[13px] text-white tracking-widest">TOMORROW</span>
      <span class="text-[10px] text-slate-500 font-body">MATCHUP PREVIEW</span>
      <div class="flex-1"></div>
      <span class="text-[10px] bg-amber-500/20 text-amber-400 font-bold px-2 py-0.5 rounded-full font-display">DAY ${dayNum + 1}</span>
    </div>
    ${buildCandidates()}
  </div>

  <!-- Footer -->
  <div class="px-4 pt-4 pb-6">
    <div class="text-center">
      <div class="font-display font-black text-[11px] text-slate-600 tracking-[0.2em]">ARENA LEAGUE</div>
      <div class="text-[9px] text-slate-700 font-body mt-0.5">News Trading Bot | 2026 Season</div>
    </div>
  </div>
  `;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

document.addEventListener('DOMContentLoaded', () => {
  loadData().then(render).catch(e => {
    console.error(e);
    document.getElementById('loading').innerHTML = '<div class="text-red-400 text-sm font-body">데이터 로딩 실패</div>';
  });
});
</script>

<!-- Style Switcher FAB -->
<div id="style-fab" onclick="document.getElementById('style-modal').classList.toggle('hidden')" style="position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:#fbbf24;color:#000;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(251,191,36,.4);z-index:9999;">\u{1F3A8}</div>
<div id="style-modal" class="hidden" style="position:fixed;inset:0;z-index:10000;display:flex;align-items:flex-end;justify-content:center;">
  <div onclick="document.getElementById('style-modal').classList.add('hidden')" style="position:absolute;inset:0;background:rgba(0,0,0,.5);"></div>
  <div style="position:relative;width:100%;max-width:430px;max-height:70vh;overflow-y:auto;background:#1a1a1a;border-radius:20px 20px 0 0;padding:20px;">
    <div style="text-align:center;margin-bottom:16px;"><div style="width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 12px;"></div><div style="font-weight:700;font-size:16px;color:#fff;">스타일 변경</div></div>
    <div id="style-list" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"></div>
  </div>
</div>
<script>
const STYLES = [
  {id:'style1_terminal',name:'Terminal',icon:'\u{1F4BB}'},
  {id:'style2_card',name:'Card',icon:'\u{1F0CF}'},
  {id:'style3_glass',name:'Glass',icon:'\u{1F52E}'},
  {id:'style4_table',name:'Table+',icon:'\u{1F4CA}'},
  {id:'style5_chart',name:'Chart',icon:'\u{1F4C8}'},
  {id:'style6_kanban',name:'Kanban',icon:'\u{1F4CB}'},
  {id:'style7_sports',name:'Sports',icon:'\u{1F3DF}'},
  {id:'style8_hybrid',name:'Hybrid',icon:'\u26A1'},
  {id:'style9_stockapp',name:'MTS',icon:'\u{1F4F1}'},
];
const currentFile = location.pathname.split('/').pop().replace('.html','');
const list = document.getElementById('style-list');
STYLES.forEach(s => {
  const active = currentFile === s.id;
  const btn = document.createElement('div');
  btn.style.cssText = `padding:12px 8px;border-radius:12px;text-align:center;cursor:pointer;border:2px solid ${active?'#fbbf24':'rgba(255,255,255,.1)'};background:${active?'rgba(251,191,36,.15)':'rgba(255,255,255,.03)'};`;
  btn.innerHTML = `<div style="font-size:24px;">${s.icon}</div><div style="font-size:11px;margin-top:4px;color:${active?'#fbbf24':'rgba(255,255,255,.6)'};">${s.name}</div>`;
  if (!active) btn.onclick = () => location.href = s.id + '.html';
  list.appendChild(btn);
});
document.head.insertAdjacentHTML('beforeend','<style>.hidden{display:none!important;}</style>');
</script>
</body>
</html>
