<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard - Kanban Board</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { font-family: 'Pretendard', -apple-system, sans-serif; }
  body { background: #f8f9fb; }
  .kanban-scroll { overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
  .kanban-scroll::-webkit-scrollbar { display: none; }
  .kanban-col { scroll-snap-align: start; min-width: 260px; }
  .progress-ring { transform: rotate(-90deg); }
  .card { background: #fff; border-radius: 12px; border: 1px solid #f0f0f0; }
  .pill { display: inline-flex; align-items: center; border-radius: 999px; padding: 2px 10px; font-size: 11px; font-weight: 600; }
  .pill-green { background: #ecfdf5; color: #059669; }
  .pill-red { background: #fef2f2; color: #dc2626; }
  .pill-gray { background: #f3f4f6; color: #6b7280; }
  .pill-blue { background: #eff6ff; color: #2563eb; }
  .score-bar { height: 6px; border-radius: 3px; background: #f0f0f0; }
  .score-fill { height: 100%; border-radius: 3px; }
  .loading-wrap {
    display: flex; align-items: center; justify-content: center;
    padding: 80px 0; color: #9ca3af; font-size: 13px;
  }
  .loading-wrap .spinner {
    width: 20px; height: 20px; border: 2px solid #e5e7eb;
    border-top-color: #3b82f6; border-radius: 50%;
    animation: spin .6s linear infinite; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        surface: '#ffffff',
        muted: '#f8f9fb',
      }
    }
  }
}
</script>
</head>

  <!-- Hero: Today Summary -->

    <div class="flex items-center justify-between mb-1">
      <span id="headerDate" class="text-xs text-gray-400 font-medium tracking-wide">Loading...</span>
      <span class="pill pill-blue">LIVE</span>

    <h1 class="text-2xl font-bold text-gray-900 mb-1">뉴스 트레이딩 보드</h1>

      <div class="flex items-end justify-between">
        <div>
          <p class="text-xs text-gray-400 mb-1">오늘 총 손익</p>
          <p id="heroPnl" class="text-3xl font-extrabold tracking-tight" style="color:#9ca3af;">-</p>

        <div class="text-right">

            <div class="text-center">
              <p id="heroTotal" class="text-lg font-bold text-gray-900">-</p>
              <p class="text-[10px] text-gray-400">총 매매</p>
            </div>
            <div class="text-center">
              <p id="heroWins" class="text-lg font-bold text-emerald-600">-</p>
              <p class="text-[10px] text-gray-400">익절</p>
            </div>
            <div class="text-center">
              <p id="heroLosses" class="text-lg font-bold text-red-500">-</p>
              <p class="text-[10px] text-gray-400">손절</p>
            </div>
            <div class="text-center">
              <p id="heroWaiting" class="text-lg font-bold text-gray-400">-</p>
              <p class="text-[10px] text-gray-400">대기</p>
            </div>

      </div>

  </div>

  <!-- Loading -->
  <div id="loadingIndicator" class="loading-wrap">
    <div class="spinner"></div> 데이터 로딩 중...

  <div id="mainContent" style="display:none;">

  <!-- Kanban Columns -->
  <div class="px-4 mb-5">
    <h2 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-1.5">
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      오늘의 매매 현황
    </h2>
    <div id="kanbanContainer" class="kanban-scroll flex gap-3 pb-2">

  </div>

  <!-- Team Grid -->
  <div class="px-4 mb-5">
    <h2 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-1.5">
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      팀 성과

      <!-- Dynamically populated -->

  </div>

  <!-- BNF Portfolio -->
  <div class="px-4 mb-5">
    <h2 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-1.5">
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      BNF 포트폴리오
    </h2>

    <!-- BNF Stats Bar -->
    <div id="bnfStats" class="card p-3 mb-3 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div>
          <p class="text-[10px] text-gray-400">수익률</p>
          <p id="bnfReturn" class="text-base font-extrabold" style="color:#9ca3af;">-</p>

        <div class="w-px h-8 bg-gray-100"></div>

          <p class="text-[10px] text-gray-400">승률</p>
          <p id="bnfWinRate" class="text-base font-extrabold text-gray-800">-</p>

        <div>

      <span id="bnfHoldCount" class="pill pill-blue">보유 -</span>

    <!-- Holdings List -->
    <div id="bnfHoldings" class="space-y-2">

  <!-- Tomorrow Pipeline -->
  <div class="px-4 mb-6">

      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      내일 매매 파이프라인
    </h2>
    <div id="candidatePipeline" class="card p-3.5 space-y-3.5">

    </div>
  </div>

  </div><!-- /mainContent -->

  <!-- Footer -->
  <div class="text-center pb-6">
    <p class="text-[10px] text-gray-300">Style 6 - Kanban / Status Board</p>
  </div>

</div>

<!-- Style Switcher -->
<div id="style-fab" onclick="document.getElementById('style-modal').classList.toggle('hidden')" style="position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:#fbbf24;color:#000;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(251,191,36,.4);z-index:9999;">🎨</div>
<div id="style-modal" class="hidden" style="position:fixed;inset:0;z-index:10000;display:flex;align-items:flex-end;justify-content:center;">
  <div onclick="document.getElementById('style-modal').classList.add('hidden')" style="position:absolute;inset:0;background:rgba(0,0,0,.5);"></div>
  <div style="position:relative;width:100%;max-width:430px;max-height:70vh;overflow-y:auto;background:#1a1a1a;border-radius:20px 20px 0 0;padding:20px;">
    <div style="text-align:center;margin-bottom:16px;"><div style="width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 12px;"></div><div style="font-weight:700;font-size:16px;color:#fff;">스타일 변경</div></div>
    <div id="style-list" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"></div>
  </div>
</div>
<script>
const STYLES = [
  {id:'style1_terminal',name:'Terminal',icon:'💻'},
  {id:'style2_card',name:'Card',icon:'🃏'},
  {id:'style3_glass',name:'Glass',icon:'🔮'},
  {id:'style4_table',name:'Table+',icon:'📊'},
  {id:'style5_chart',name:'Chart',icon:'📈'},
  {id:'style6_kanban',name:'Kanban',icon:'📋'},
  {id:'style7_sports',name:'Sports',icon:'🏟'},
  {id:'style8_hybrid',name:'Hybrid',icon:'⚡'},
  {id:'style9_stockapp',name:'MTS',icon:'📱'},
];
const currentFile = location.pathname.split('/').pop().replace('.html','');
const list = document.getElementById('style-list');
STYLES.forEach(s => {
  const active = currentFile === s.id;
  const btn = document.createElement('div');
  btn.style.cssText = `padding:12px 8px;border-radius:12px;text-align:center;cursor:pointer;border:2px solid ${active?'#fbbf24':'rgba(255,255,255,.1)'};background:${active?'rgba(251,191,36,.15)':'rgba(255,255,255,.03)'};`;
  btn.innerHTML = `<div style="font-size:24px;">${s.icon}</div><div style="font-size:11px;margin-top:4px;color:${active?'#fbbf24':'rgba(255,255,255,.6)'};">${s.name}</div>`;
  if (!active) btn.onclick = () => location.href = s.id + '.html';
  list.appendChild(btn);
});
document.head.insertAdjacentHTML('beforeend','<style>.hidden{display:none!important;}</style>');
</script>

<script>
// ===== DATA LOADER =====
const BASE = '../';
const TEAMS = ['team_a','team_b','team_c','team_d','team_e'];
const TEAM_NAMES = {team_a:'Alpha Momentum',team_b:'Beta Contrarian',team_c:'Gamma Disclosure',team_d:'Delta Theme',team_e:'Echo Frontier'};
const TEAM_COLORS = {team_a:'#EF4444',team_b:'#3B82F6',team_c:'#10B981',team_d:'#F59E0B',team_e:'#8B5CF6'};
const TEAM_STRATS = {team_a:'momentum',team_b:'largecap_contrarian',team_c:'dart_disclosure',team_d:'theme_policy',team_e:'frontier_gap'};
const TEAM_SHORT = {team_a:'Alpha',team_b:'Beta',team_c:'Gamma',team_d:'Delta',team_e:'Echo'};
const TEAM_BG = {team_a:'violet',team_b:'blue',team_c:'amber',team_d:'rose',team_e:'slate'};
const TEAM_LETTER = {team_a:'A',team_b:'B',team_c:'G',team_d:'D',team_e:'E'};

async function fetchJ(path) {
  try { const r = await fetch(BASE + path); if (!r.ok) return null; return r.json(); } catch { return null; }
}

async function loadData() {
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
  }

  const [leaderboard, bnfPos, bnfCand] = await Promise.all([
    fetchJ('data/arena/leaderboard.json'),
    fetchJ('data/bnf/positions.json'),
    fetchJ('data/bnf/candidates.json'),
  ]);

  let status=null, candidates=null, dataDate=dates[0];
  for (const dt of dates) {
    const s = await fetchJ(`data/paper_trading/status_${dt}.json`);
    if (s) { status = s; dataDate = dt; break; }
  }
  for (const dt of dates) {
    const c = await fetchJ(`data/paper_trading/candidates_${dt}_all.json`);
    if (c) { candidates = c; break; }
  }

  const portfolios = {}, trades = {}, summaries = {};
  await Promise.all(TEAMS.map(async tid => {
    portfolios[tid] = await fetchJ(`data/arena/${tid}/portfolio.json`);
    for (const dt of dates) {
      if (!trades[tid]) { const t = await fetchJ(`data/arena/${tid}/daily/${dt}/trades.json`); if(t) trades[tid]=t; }
      if (!summaries[tid]) { const s = await fetchJ(`data/arena/${tid}/daily/${dt}/summary.json`); if(s) summaries[tid]=s; }
    }
  }));

  return { leaderboard, status, candidates, bnfPos, bnfCand, portfolios, trades, summaries, dataDate };
}

// ===== HELPERS =====
function fmtPct(n) { return n != null ? ((n > 0 ? '+' : '') + n.toFixed(2) + '%') : '-'; }

function makeProgressRing(pct, color) {
  const circumference = 113.1; // 2 * PI * 18
  const offset = circumference - (Math.min(100, Math.max(0, pct)) / 100) * circumference;
  const pctStr = pct >= 0 ? Math.round(pct) + '%' : '-';
  return `<svg class="w-11 h-11" viewBox="0 0 44 44">
    <circle cx="22" cy="22" r="18" fill="none" stroke="#f0f0f0" stroke-width="4"/>
    <circle cx="22" cy="22" r="18" fill="none" stroke="${color}" stroke-width="4" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" class="progress-ring"/>
    <text x="22" y="24" text-anchor="middle" class="text-[9px] font-bold" fill="${color}" dominant-baseline="middle">${pctStr}</text>
  </svg>`;
}

// ===== RENDER =====
function render(data) {
  const today = new Date();
  const dateStr = today.toISOString().slice(0,10).replace(/-/g, '.');
  document.getElementById('headerDate').textContent = dateStr + ' 일간 리포트';

  // -- Collect all trades into kanban categories --
  const profitItems = [], lossItems = [], waitingItems = [];

  // From arena trades
  TEAMS.forEach(tid => {
    const t = data.trades[tid];
    if (!t || !t.results) return;
    t.results.forEach(r => {
      const isWin = r.exit_type === 'profit' || r.return_pct > 0;
      const pctStr = fmtPct(r.return_pct);
      const item = { name: r.name || r.code || '-', pct: r.return_pct || 0, pctStr };
      if (isWin) profitItems.push(item);
      else lossItems.push(item);
    });
  });

  // From paper trading status (waiting items)
  if (data.status && data.status.stocks) {
    data.status.stocks.forEach(s => {
      if (s.status === 'waiting') {
        waitingItems.push({ name: s.name || s.code || '-', pct: s.current_pct || 0, pctStr: fmtPct(s.current_pct) });
      } else if (s.status === 'profit_hit') {
        profitItems.push({ name: s.name || s.code || '-', pct: s.current_pct || 0, pctStr: fmtPct(s.current_pct) });
      } else if (s.status === 'loss_hit') {
        lossItems.push({ name: s.name || s.code || '-', pct: s.current_pct || 0, pctStr: fmtPct(s.current_pct) });
      }
    });
  }

  const totalTrades = profitItems.length + lossItems.length + waitingItems.length;
  const totalPnlPct = totalTrades > 0
    ? [...profitItems, ...lossItems, ...waitingItems].reduce((s, i) => s + i.pct, 0) / totalTrades
    : 0;

  // -- Hero --
  const heroPnl = document.getElementById('heroPnl');
  heroPnl.textContent = fmtPct(totalPnlPct);
  heroPnl.className = 'text-3xl font-extrabold tracking-tight ' + (totalPnlPct >= 0 ? 'text-emerald-600' : 'text-red-500');

  document.getElementById('heroTotal').textContent = totalTrades;
  document.getElementById('heroWins').textContent = profitItems.length;
  document.getElementById('heroLosses').textContent = lossItems.length;
  document.getElementById('heroWaiting').textContent = waitingItems.length;

  // -- Kanban Columns --
  const kanban = document.getElementById('kanbanContainer');
  let kanbanHtml = '';

  // Profit column
  kanbanHtml += `<div class="kanban-col flex-shrink-0" style="width:260px">
    <div class="rounded-xl bg-emerald-50/60 border border-emerald-100 p-3">
      <div class="flex items-center gap-2 mb-3">
        <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
        <span class="text-sm font-bold text-emerald-700">익절</span>
        <span class="ml-auto text-xs font-semibold text-emerald-500 bg-emerald-100 rounded-full px-2 py-0.5">${profitItems.length}</span>
      </div>
      <div class="space-y-2">`;
  if (profitItems.length > 0) {
    profitItems.forEach(item => {
      kanbanHtml += `<div class="card px-3 py-2.5 flex items-center justify-between">
        <span class="text-sm font-medium text-gray-800">${item.name}</span>
        <span class="pill pill-green">${item.pctStr}</span>
      </div>`;
    });
  } else {
    kanbanHtml += `<div class="text-center text-xs text-gray-400 py-4">데이터 없음</div>`;
  }
  kanbanHtml += `</div></div></div>`;

  // Loss column
  kanbanHtml += `<div class="kanban-col flex-shrink-0" style="width:260px">
    <div class="rounded-xl bg-red-50/60 border border-red-100 p-3">
      <div class="flex items-center gap-2 mb-3">
        <span class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
        <span class="text-sm font-bold text-red-700">손절</span>
        <span class="ml-auto text-xs font-semibold text-red-500 bg-red-100 rounded-full px-2 py-0.5">${lossItems.length}</span>
      </div>
      <div class="space-y-2">`;
  if (lossItems.length > 0) {
    lossItems.forEach(item => {
      kanbanHtml += `<div class="card px-3 py-2.5 flex items-center justify-between">
        <span class="text-sm font-medium text-gray-800">${item.name}</span>
        <span class="pill pill-red">${item.pctStr}</span>
      </div>`;
    });
  } else {
    kanbanHtml += `<div class="text-center text-xs text-gray-400 py-4">데이터 없음</div>`;
  }
  kanbanHtml += `</div></div></div>`;

  // Waiting column
  kanbanHtml += `<div class="kanban-col flex-shrink-0" style="width:260px">
    <div class="rounded-xl bg-gray-50/80 border border-gray-200 p-3">
      <div class="flex items-center gap-2 mb-3">
        <span class="w-2.5 h-2.5 rounded-full bg-gray-400"></span>
        <span class="text-sm font-bold text-gray-600">대기</span>
        <span class="ml-auto text-xs font-semibold text-gray-500 bg-gray-200 rounded-full px-2 py-0.5">${waitingItems.length}</span>
      </div>
      <div class="space-y-2">`;
  if (waitingItems.length > 0) {
    waitingItems.forEach(item => {
      const pillClass = item.pct >= 0 ? 'pill-green' : 'pill-red';
      kanbanHtml += `<div class="card px-3 py-2.5 flex items-center justify-between">
        <span class="text-sm font-medium text-gray-800">${item.name}</span>
        <span class="pill ${pillClass}">${item.pctStr}</span>
      </div>`;
    });
  } else {
    kanbanHtml += `<div class="text-center text-xs text-gray-400 py-4">데이터 없음</div>`;
  }
  kanbanHtml += `</div></div></div>`;

  kanban.innerHTML = kanbanHtml;

  // -- Team Grid --
  const teamGrid = document.getElementById('teamGrid');
  let teamHtml = '';
  const bgColors = {team_a:'violet',team_b:'blue',team_c:'amber',team_d:'rose',team_e:'slate'};
  const ringColors = {team_a:'#8b5cf6',team_b:'#3b82f6',team_c:'#f59e0b',team_d:'#f43f5e',team_e:'#64748b'};

  let hasNoTradeTeam = false;
  TEAMS.forEach(tid => {
    const p = data.portfolios[tid];
    const cap = p ? (p.current_capital || 0) : 10000000;
    const initCap = p ? (p.initial_capital || 10000000) : 10000000;
    const cum = p ? (p.total_return_pct || ((cap - initCap) / initCap * 100)) : 0;
    const w = p ? (p.total_wins || 0) : 0;
    const l = p ? (p.total_losses || 0) : 0;
    const tt = p ? (p.total_trades || (w + l)) : 0;
    const wr = tt > 0 ? (w / tt * 100) : -1;
    const bg = bgColors[tid];
    const letter = TEAM_LETTER[tid];
    const shortName = TEAM_SHORT[tid];
    const ringColor = ringColors[tid];

    if (tt === 0) {
      hasNoTradeTeam = true;
      // Will render as full-width at the end
      return;
    }

    const cumColor = cum >= 0 ? 'text-emerald-600' : 'text-red-500';
    teamHtml += `<div class="card p-3.5 relative overflow-hidden">
      <div class="flex items-center gap-2 mb-2">
        <div class="w-7 h-7 rounded-lg bg-${bg}-100 flex items-center justify-center">
          <span class="text-xs font-bold text-${bg}-600">${letter}</span>
        </div>
        <span class="text-sm font-bold text-gray-800">${shortName}</span>
      </div>
      <div class="flex items-center gap-3">
        ${makeProgressRing(wr >= 0 ? wr : 0, ringColor)}
        <div>
          <p class="text-lg font-extrabold ${cumColor}">${fmtPct(cum)}</p>
          <p class="text-[10px] text-gray-400">승률 ${wr >= 0 ? Math.round(wr) + '%' : '-'}</p>
        </div>
      </div>
    </div>`;
  });

  // Render no-trade teams as full-width
  TEAMS.forEach(tid => {
    const p = data.portfolios[tid];
    const w = p ? (p.total_wins || 0) : 0;
    const l = p ? (p.total_losses || 0) : 0;
    const tt = p ? (p.total_trades || (w + l)) : 0;
    if (tt > 0) return;
    const bg = bgColors[tid];
    const letter = TEAM_LETTER[tid];
    const shortName = TEAM_SHORT[tid];

    teamHtml += `<div class="card p-3.5 col-span-2 flex items-center gap-3">
      <div class="w-7 h-7 rounded-lg bg-${bg}-100 flex items-center justify-center">
        <span class="text-xs font-bold text-${bg}-500">${letter}</span>
      </div>
      <span class="text-sm font-bold text-gray-800">${shortName}</span>
      <span class="pill pill-gray ml-auto">매매 없음</span>
    </div>`;
  });

  teamGrid.innerHTML = teamHtml;

  // -- BNF Portfolio --
  if (data.bnfPos) {
    const stats = data.bnfPos.stats;
    const positions = data.bnfPos.positions || [];

    if (stats) {
      const retEl = document.getElementById('bnfReturn');
      const retVal = stats.total_return || 0;
      retEl.textContent = fmtPct(retVal);
      retEl.className = 'text-base font-extrabold ' + (retVal >= 0 ? 'text-emerald-600' : 'text-red-500');
      document.getElementById('bnfWinRate').textContent = stats.win_rate != null ? Math.round(stats.win_rate) + '%' : '-';
      document.getElementById('bnfTrades').textContent = stats.total_trades != null ? stats.total_trades + '건' : '-';
    }
    document.getElementById('bnfHoldCount').textContent = '보유 ' + positions.length;

    const holdingsEl = document.getElementById('bnfHoldings');
    if (positions.length > 0) {
      let holdHtml = '';
      positions.forEach(p => {
        const pct = p.unrealized_pnl_pct || 0;
        const dotColor = pct >= 0 ? 'bg-emerald-400' : 'bg-red-400';
        const textColor = pct >= 0 ? 'text-emerald-600' : 'text-red-500';
        holdHtml += `<div class="card px-3.5 py-3 flex items-center justify-between">
          <div class="flex items-center gap-2.5">
            <span class="w-2 h-2 rounded-full ${dotColor}"></span>
            <span class="text-sm font-medium text-gray-800">${p.name || p.code || '-'}</span>
          </div>
          <span class="text-sm font-bold ${textColor}">${fmtPct(pct)}</span>
        </div>`;
      });
      holdingsEl.innerHTML = holdHtml;
    } else {
      holdingsEl.innerHTML = '<div class="text-center text-xs text-gray-400 py-4">보유 종목 없음</div>';
    }
  } else {
    document.getElementById('bnfHoldings').innerHTML = '<div class="text-center text-xs text-gray-400 py-4">데이터 없음</div>';
  }

  // -- Tomorrow Pipeline --
  const pipeline = document.getElementById('candidatePipeline');
  const barColors = ['bg-violet-400', 'bg-blue-400', 'bg-cyan-400', 'bg-amber-400', 'bg-emerald-400', 'bg-rose-400', 'bg-indigo-400', 'bg-teal-400'];
  const textColors = ['text-violet-600', 'text-blue-600', 'text-cyan-600', 'text-amber-600', 'text-emerald-600', 'text-rose-600', 'text-indigo-600', 'text-teal-600'];

  let allCands = [];
  if (data.candidates && data.candidates.strategies) {
    Object.keys(data.candidates.strategies).forEach(stratKey => {
      const strat = data.candidates.strategies[stratKey];
      if (strat.candidates) {
        strat.candidates.forEach(c => {
          allCands.push({ name: c.name || c.code || '-', score: c.score || 0 });
        });
      }
    });
  }
  allCands.sort((a, b) => b.score - a.score);
  const topCands = allCands.slice(0, 8);
  const maxScore = topCands.length > 0 ? topCands[0].score : 135;

  if (topCands.length > 0) {
    let pipHtml = '';
    topCands.forEach((c, i) => {
      const widthPct = Math.round((c.score / maxScore) * 100);
      pipHtml += `<div>
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-sm font-medium text-gray-800">${c.name}</span>
          <span class="text-xs font-bold ${textColors[i % textColors.length]}">${Math.round(c.score)}점</span>
        </div>
        <div class="score-bar"><div class="score-fill ${barColors[i % barColors.length]}" style="width:${widthPct}%"></div></div>
      </div>`;
    });
    pipeline.innerHTML = pipHtml;
  } else {
    pipeline.innerHTML = '<div class="text-center text-xs text-gray-400 py-4">데이터 없음</div>';
  }

  // Show content
  document.getElementById('loadingIndicator').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
  loadData().then(render).catch(function(err) {
    console.error('Data load error:', err);
    document.getElementById('loadingIndicator').innerHTML = '<div style="color:#dc2626;">데이터 로딩 실패</div>';
  });
});
</script>
</body>
</html>
