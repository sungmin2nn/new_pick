<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>News Trading Bot - Chart Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
  body { background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; justify-content: center; }
  .app { max-width: 430px; width: 100%; padding: 12px 10px 24px; }
  .kpi-strip { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
  .kpi-strip::-webkit-scrollbar { display: none; }
  .kpi-card {
    flex: 0 0 auto; min-width: 95px; padding: 8px 10px;
    background: #16213e; border-radius: 8px; text-align: center;
    border: 1px solid #0f3460;
  }
  .kpi-label { font-size: 10px; color: #7f8c9b; margin-bottom: 2px; }
  .kpi-val { font-size: 14px; font-weight: 700; }
  .chart-box {
    background: #16213e; border-radius: 10px; padding: 12px;
    margin-top: 10px; border: 1px solid #0f3460;
  }
  .chart-title { font-size: 13px; font-weight: 700; color: #c0c8d4; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .chart-title::before { content: ''; width: 3px; height: 14px; background: #e94560; border-radius: 2px; display: inline-block; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .pos { color: #00e396; }
  .neg { color: #e94560; }
  canvas { width: 100% !important; }
  .loading-wrap {
    display: flex; align-items: center; justify-content: center;
    padding: 80px 0; color: #7f8c9b; font-size: 13px;
  }
  .loading-wrap .spinner {
    width: 20px; height: 20px; border: 2px solid #0f3460;
    border-top-color: #e94560; border-radius: 50%;
    animation: spin .6s linear infinite; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
    <div>
      <div style="font-size:16px; font-weight:800; color:#fff;">Chart Dashboard</div>
      <div id="headerDate" style="font-size:10px; color:#7f8c9b;">Loading...</div>
    </div>
    <div style="font-size:10px; color:#0f3460; background:#e94560; padding:3px 8px; border-radius:4px; font-weight:700; color:#fff;">LIVE</div>
  </div>

  <!-- KPI Strip -->
  <div class="kpi-strip">
    <div class="kpi-card">
      <div class="kpi-label">총 자산</div>
      <div id="kpiAsset" class="kpi-val" style="color:#fff;">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">일간 수익</div>
      <div id="kpiDaily" class="kpi-val">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">누적 수익</div>
      <div id="kpiCum" class="kpi-val">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">승률</div>
      <div id="kpiWR" class="kpi-val" style="color:#ffd166;">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">활성 포지션</div>
      <div id="kpiBnf" class="kpi-val" style="color:#fff;">-</div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loadingIndicator" class="loading-wrap">
    <div class="spinner"></div> 데이터 로딩 중...
  </div>

  <div id="mainContent" style="display:none;">
  <!-- Equity Curve -->
  <div class="chart-box">
    <div class="chart-title">자산 곡선 (Equity Curve)</div>
    <canvas id="equityChart" height="180"></canvas>
  </div>

  <!-- Team Returns -->
  <div class="chart-box">
    <div class="chart-title">팀별 수익률</div>
    <canvas id="teamChart" height="160"></canvas>
  </div>

  <!-- Win/Loss Donut + Today P&L -->
  <div class="row2">
    <div class="chart-box" style="margin-top:0;">
      <div class="chart-title">승/패</div>
      <canvas id="winlossChart" height="150"></canvas>
    </div>
    <div class="chart-box" style="margin-top:0;">
      <div class="chart-title">금일 P&L</div>
      <canvas id="pnlChart" height="150"></canvas>
    </div>
  </div>

  <!-- BNF Positions -->
  <div class="chart-box">
    <div class="chart-title">BNF 보유 종목</div>
    <canvas id="bnfChart" height="130"></canvas>
  </div>

  <!-- Tomorrow Candidates Bubble -->
  <div class="chart-box">
    <div class="chart-title">내일 매수 후보 (점수 vs 등락률)</div>
    <canvas id="bubbleChart" height="180"></canvas>
  </div>
  </div><!-- /mainContent -->

</div>

<!-- Style Switcher -->
<div id="style-fab" onclick="document.getElementById('style-modal').classList.toggle('hidden')" style="position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:#fbbf24;color:#000;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(251,191,36,.4);z-index:9999;">🎨</div>
<div id="style-modal" class="hidden" style="position:fixed;inset:0;z-index:10000;display:flex;align-items:flex-end;justify-content:center;">
  <div onclick="document.getElementById('style-modal').classList.add('hidden')" style="position:absolute;inset:0;background:rgba(0,0,0,.5);"></div>
  <div style="position:relative;width:100%;max-width:430px;max-height:70vh;overflow-y:auto;background:#1a1a1a;border-radius:20px 20px 0 0;padding:20px;">
    <div style="text-align:center;margin-bottom:16px;"><div style="width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 12px;"></div><div style="font-weight:700;font-size:16px;color:#fff;">스타일 변경</div></div>
    <div id="style-list" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"></div>
  </div>
</div>
<script>
const STYLES = [
  {id:'style1_terminal',name:'Terminal',icon:'💻'},
  {id:'style2_card',name:'Card',icon:'🃏'},
  {id:'style3_glass',name:'Glass',icon:'🔮'},
  {id:'style4_table',name:'Table+',icon:'📊'},
  {id:'style5_chart',name:'Chart',icon:'📈'},
  {id:'style6_kanban',name:'Kanban',icon:'📋'},
  {id:'style7_sports',name:'Sports',icon:'🏟'},
  {id:'style8_hybrid',name:'Hybrid',icon:'⚡'},
  {id:'style9_stockapp',name:'MTS',icon:'📱'},
];
const currentFile = location.pathname.split('/').pop().replace('.html','');
const list = document.getElementById('style-list');
STYLES.forEach(s => {
  const active = currentFile === s.id;
  const btn = document.createElement('div');
  btn.style.cssText = `padding:12px 8px;border-radius:12px;text-align:center;cursor:pointer;border:2px solid ${active?'#fbbf24':'rgba(255,255,255,.1)'};background:${active?'rgba(251,191,36,.15)':'rgba(255,255,255,.03)'};`;
  btn.innerHTML = `<div style="font-size:24px;">${s.icon}</div><div style="font-size:11px;margin-top:4px;color:${active?'#fbbf24':'rgba(255,255,255,.6)'};">${s.name}</div>`;
  if (!active) btn.onclick = () => location.href = s.id + '.html';
  list.appendChild(btn);
});
document.head.insertAdjacentHTML('beforeend','<style>.hidden{display:none!important;}</style>');
</script>

<script>
// ===== DATA LOADER =====
const BASE = '../';
const TEAMS = ['team_a','team_b','team_c','team_d','team_e'];
const TEAM_NAMES = {team_a:'Alpha Momentum',team_b:'Beta Contrarian',team_c:'Gamma Disclosure',team_d:'Delta Theme',team_e:'Echo Frontier'};
const TEAM_COLORS = {team_a:'#EF4444',team_b:'#3B82F6',team_c:'#10B981',team_d:'#F59E0B',team_e:'#8B5CF6'};
const TEAM_STRATS = {team_a:'momentum',team_b:'largecap_contrarian',team_c:'dart_disclosure',team_d:'theme_policy',team_e:'frontier_gap'};
const TEAM_SHORT = {team_a:'Alpha',team_b:'Beta',team_c:'Gamma',team_d:'Delta',team_e:'Echo'};

async function fetchJ(path) {
  try { const r = await fetch(BASE + path); if (!r.ok) return null; return r.json(); } catch { return null; }
}

async function loadData() {
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
  }

  const [leaderboard, bnfPos, bnfCand] = await Promise.all([
    fetchJ('data/arena/leaderboard.json'),
    fetchJ('data/bnf/positions.json'),
    fetchJ('data/bnf/candidates.json'),
  ]);

  let status=null, candidates=null, dataDate=dates[0];
  for (const dt of dates) {
    const s = await fetchJ(`data/paper_trading/status_${dt}.json`);
    if (s) { status = s; dataDate = dt; break; }
  }
  for (const dt of dates) {
    const c = await fetchJ(`data/paper_trading/candidates_${dt}_all.json`);
    if (c) { candidates = c; break; }
  }

  const portfolios = {}, trades = {}, summaries = {};
  await Promise.all(TEAMS.map(async tid => {
    portfolios[tid] = await fetchJ(`data/arena/${tid}/portfolio.json`);
    for (const dt of dates) {
      if (!trades[tid]) { const t = await fetchJ(`data/arena/${tid}/daily/${dt}/trades.json`); if(t) trades[tid]=t; }
      if (!summaries[tid]) { const s = await fetchJ(`data/arena/${tid}/daily/${dt}/summary.json`); if(s) summaries[tid]=s; }
    }
  }));

  return { leaderboard, status, candidates, bnfPos, bnfCand, portfolios, trades, summaries, dataDate };
}

// ===== CHART DEFAULTS =====
Chart.defaults.color = '#7f8c9b';
Chart.defaults.borderColor = 'rgba(15,52,96,0.5)';
Chart.defaults.font.family = 'Pretendard';
Chart.defaults.font.size = 10;

const ACCENT = '#e94560';
const GREEN = '#00e396';
const RED = '#e94560';
const GOLD = '#ffd166';
const BLUE = '#4cc9f0';

const BUBBLE_COLORS = [
  'rgba(0,227,150,0.7)', 'rgba(76,201,240,0.7)', 'rgba(255,209,102,0.7)',
  'rgba(233,69,96,0.7)', 'rgba(162,155,254,0.7)', 'rgba(255,150,80,0.7)',
  'rgba(0,180,216,0.7)', 'rgba(247,127,0,0.7)', 'rgba(144,224,239,0.7)',
];

function fmtM(n) {
  if (n >= 100000000) return (n / 100000000).toFixed(2) + '억';
  if (n >= 10000) return (n / 10000).toFixed(0) + '만';
  return n.toLocaleString('ko-KR');
}

// ===== RENDER =====
function render(data) {
  const today = new Date();
  const dateStr = today.toISOString().slice(0,10);
  document.getElementById('headerDate').textContent = dateStr + ' 마감 기준';

  // -- Aggregate data --
  let totalCapital = 0, totalWins = 0, totalLosses = 0, totalTrades = 0;
  const teamLabels = [], teamValues = [];
  const allTradeResults = [];

  TEAMS.forEach(tid => {
    const p = data.portfolios[tid];
    const cap = p ? (p.current_capital || 0) : 10000000;
    const initCap = p ? (p.initial_capital || 10000000) : 10000000;
    const cum = p ? (p.total_return_pct || ((cap - initCap) / initCap * 100)) : 0;
    const w = p ? (p.total_wins || 0) : 0;
    const l = p ? (p.total_losses || 0) : 0;
    const tt = p ? (p.total_trades || (w + l)) : 0;

    totalCapital += cap;
    totalWins += w;
    totalLosses += l;
    totalTrades += tt;

    teamLabels.push(TEAM_SHORT[tid]);
    teamValues.push(parseFloat(cum.toFixed(2)));

    // Collect trades for P&L chart
    const t = data.trades[tid];
    if (t && t.results) {
      t.results.forEach(r => {
        allTradeResults.push({
          name: (r.name || r.code || '-').slice(0, 6),
          pnl: r.return_amount || 0,
        });
      });
    }
  });

  const avgCum = teamValues.length > 0 ? teamValues.reduce((s, v) => s + v, 0) / teamValues.length : 0;
  const winRate = totalTrades > 0 ? (totalWins / totalTrades * 100) : 0;
  const bnfCount = data.bnfPos && data.bnfPos.positions ? data.bnfPos.positions.length : 0;

  // -- KPI --
  document.getElementById('kpiAsset').textContent = fmtM(totalCapital);
  const kpiDailyEl = document.getElementById('kpiDaily');
  // Use summary or compute from today's trades
  let dailyPct = 0;
  allTradeResults.forEach(r => { dailyPct += r.pnl; });
  const dailyPctCalc = totalCapital > 0 ? (dailyPct / totalCapital * 100) : 0;
  kpiDailyEl.textContent = (dailyPctCalc >= 0 ? '+' : '') + dailyPctCalc.toFixed(2) + '%';
  kpiDailyEl.className = 'kpi-val ' + (dailyPctCalc >= 0 ? 'pos' : 'neg');

  const kpiCumEl = document.getElementById('kpiCum');
  kpiCumEl.textContent = (avgCum >= 0 ? '+' : '') + avgCum.toFixed(2) + '%';
  kpiCumEl.className = 'kpi-val ' + (avgCum >= 0 ? 'pos' : 'neg');

  document.getElementById('kpiWR').textContent = totalTrades > 0 ? winRate.toFixed(1) + '%' : '-';
  document.getElementById('kpiBnf').textContent = bnfCount;

  // -- 1. Equity Curve --
  let eqLabels = ['시작'];
  let eqData = [1000];
  if (data.leaderboard && data.leaderboard.daily_history && data.leaderboard.daily_history.length > 0) {
    const hist = data.leaderboard.daily_history;
    eqLabels = hist.map(h => h.date ? h.date.slice(5) : '');
    // Average all teams
    eqData = hist.map(h => {
      let sum = 0, cnt = 0;
      TEAMS.forEach(tid => {
        if (h[tid] !== undefined) { sum += h[tid]; cnt++; }
      });
      const avgRet = cnt > 0 ? sum / cnt : 0;
      return Math.round(1000 * (1 + avgRet / 100));
    });
    if (eqLabels[0] !== '시작') { eqLabels.unshift('시작'); eqData.unshift(1000); }
  } else {
    // Fallback: construct from team cumulative returns
    eqLabels = ['시작', dateStr.slice(5)];
    eqData = [1000, Math.round(1000 * (1 + avgCum / 100))];
  }

  new Chart(document.getElementById('equityChart'), {
    type: 'line',
    data: {
      labels: eqLabels,
      datasets: [{
        label: '자산 (만원)',
        data: eqData,
        borderColor: ACCENT,
        backgroundColor: 'rgba(233,69,96,0.08)',
        fill: true,
        tension: 0.35,
        pointBackgroundColor: '#fff',
        pointBorderColor: ACCENT,
        pointRadius: 4,
        pointHoverRadius: 6,
        borderWidth: 2.5,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${(ctx.parsed.y / 100).toFixed(2)}M` } }
      },
      scales: {
        y: { ticks: { callback: v => `${v}만` }, grid: { color: 'rgba(15,52,96,0.4)' } },
        x: { grid: { display: false } }
      }
    }
  });

  // -- 2. Team Returns --
  new Chart(document.getElementById('teamChart'), {
    type: 'bar',
    data: {
      labels: teamLabels,
      datasets: [{
        data: teamValues,
        backgroundColor: teamValues.map(v => v > 0 ? GREEN : v < 0 ? RED : '#555'),
        borderRadius: 4,
        barThickness: 18,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.parsed.x > 0 ? '+' : ''}${ctx.parsed.x}%` } }
      },
      scales: {
        x: { ticks: { callback: v => `${v}%` }, grid: { color: 'rgba(15,52,96,0.4)' } },
        y: { grid: { display: false } }
      }
    }
  });

  // -- 3. Win/Loss Donut --
  new Chart(document.getElementById('winlossChart'), {
    type: 'doughnut',
    data: {
      labels: ['승리 ' + totalWins, '패배 ' + totalLosses],
      datasets: [{
        data: [totalWins || 0, totalLosses || 0],
        backgroundColor: [GREEN, RED],
        borderWidth: 0,
        cutout: '65%',
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 10, padding: 8, font: { size: 9 } } },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.parsed}건` } }
      }
    }
  });

  // -- 4. Today P&L --
  const pnlNames = allTradeResults.map(r => r.name);
  const pnlVals = allTradeResults.map(r => r.pnl);
  new Chart(document.getElementById('pnlChart'), {
    type: 'bar',
    data: {
      labels: pnlNames.length > 0 ? pnlNames : ['-'],
      datasets: [{
        data: pnlVals.length > 0 ? pnlVals : [0],
        backgroundColor: pnlVals.length > 0 ? pnlVals.map(v => v >= 0 ? GREEN : RED) : ['#555'],
        borderRadius: 2,
        barThickness: 6,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.parsed.y.toLocaleString()}원` } }
      },
      scales: {
        x: { ticks: { display: false }, grid: { display: false } },
        y: {
          ticks: { callback: v => `${(v/10000).toFixed(0)}만`, font: { size: 8 } },
          grid: { color: 'rgba(15,52,96,0.4)' }
        }
      }
    }
  });

  // -- 5. BNF Positions --
  let bnfNames = ['-'], bnfVals = [0];
  if (data.bnfPos && data.bnfPos.positions && data.bnfPos.positions.length > 0) {
    bnfNames = data.bnfPos.positions.map(p => p.name || p.code || '-');
    bnfVals = data.bnfPos.positions.map(p => p.unrealized_pnl_pct || 0);
  }
  new Chart(document.getElementById('bnfChart'), {
    type: 'bar',
    data: {
      labels: bnfNames,
      datasets: [{
        data: bnfVals,
        backgroundColor: bnfVals.map(v => v >= 0 ? BLUE : RED),
        borderRadius: 4,
        barThickness: 18,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.parsed.x > 0 ? '+' : ''}${ctx.parsed.x.toFixed(2)}%` } }
      },
      scales: {
        x: { ticks: { callback: v => `${v}%` }, grid: { color: 'rgba(15,52,96,0.4)' } },
        y: { grid: { display: false } }
      }
    }
  });

  // -- 6. Bubble Chart - Tomorrow Candidates --
  const bubbleDatasets = [];
  if (data.candidates && data.candidates.strategies) {
    let colorIdx = 0;
    Object.keys(data.candidates.strategies).forEach(stratKey => {
      const strat = data.candidates.strategies[stratKey];
      if (strat.candidates) {
        strat.candidates.forEach(c => {
          bubbleDatasets.push({
            label: c.name || c.code || '-',
            data: [{ x: c.score || 0, y: c.change_pct || 0, r: Math.max(6, Math.min(14, (c.score || 50) / 8)) }],
            backgroundColor: BUBBLE_COLORS[colorIdx % BUBBLE_COLORS.length],
          });
          colorIdx++;
        });
      }
    });
  }
  if (bubbleDatasets.length === 0) {
    bubbleDatasets.push({ label: '데이터 없음', data: [{ x: 50, y: 0, r: 5 }], backgroundColor: '#555' });
  }

  const allScores = bubbleDatasets.flatMap(ds => ds.data.map(d => d.x));
  const minScore = Math.max(0, Math.min(...allScores) - 10);
  const maxScore = Math.min(150, Math.max(...allScores) + 10);

  new Chart(document.getElementById('bubbleChart'), {
    type: 'bubble',
    data: { datasets: bubbleDatasets },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: 점수 ${ctx.parsed.x}, 등락 ${ctx.parsed.y.toFixed(2)}%`
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: '점수', color: '#7f8c9b', font: { size: 10 } },
          min: minScore, max: maxScore,
          grid: { color: 'rgba(15,52,96,0.4)' }
        },
        y: {
          title: { display: true, text: '등락률 %', color: '#7f8c9b', font: { size: 10 } },
          grid: { color: 'rgba(15,52,96,0.4)' }
        }
      }
    }
  });

  // Show content
  document.getElementById('loadingIndicator').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
  loadData().then(render).catch(function(err) {
    console.error('Data load error:', err);
    document.getElementById('loadingIndicator').innerHTML = '<div style="color:#e94560;">데이터 로딩 실패</div>';
  });
});
</script>
</body>
</html>
