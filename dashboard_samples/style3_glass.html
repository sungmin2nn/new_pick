<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trading Dashboard - Glassmorphism</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { font-family: 'Pretendard', sans-serif; }
  body {
    background: linear-gradient(135deg, #0f0524 0%, #1a0a3e 25%, #0d1b4a 50%, #0a1628 75%, #0f0524 100%);
    min-height: 100vh;
  }
  .glass {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }
  .glass-strong {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.12);
  }
  .neon-green { color: #00ffaa; text-shadow: 0 0 12px rgba(0,255,170,0.5); }
  .neon-red { color: #ff4d6a; text-shadow: 0 0 12px rgba(255,77,106,0.5); }
  .neon-blue { color: #5edfff; text-shadow: 0 0 12px rgba(94,223,255,0.4); }
  .neon-purple { color: #c084fc; text-shadow: 0 0 12px rgba(192,132,252,0.4); }
  .neon-yellow { color: #facc15; text-shadow: 0 0 12px rgba(250,204,21,0.4); }
  .glow-border {
    box-shadow: 0 0 20px rgba(94,223,255,0.15), inset 0 0 20px rgba(94,223,255,0.03);
  }
  .glow-green { box-shadow: 0 0 24px rgba(0,255,170,0.2), inset 0 0 24px rgba(0,255,170,0.03); }
  .hero-glow {
    background: radial-gradient(ellipse at center, rgba(0,255,170,0.12) 0%, transparent 70%);
  }
  .rank-badge {
    background: linear-gradient(135deg, rgba(250,204,21,0.25), rgba(250,204,21,0.08));
    border: 1px solid rgba(250,204,21,0.3);
  }
  .rank-badge-silver {
    background: linear-gradient(135deg, rgba(192,192,210,0.2), rgba(192,192,210,0.06));
    border: 1px solid rgba(192,192,210,0.25);
  }
  .rank-badge-bronze {
    background: linear-gradient(135deg, rgba(205,127,50,0.2), rgba(205,127,50,0.06));
    border: 1px solid rgba(205,127,50,0.25);
  }
  .timeline-line {
    background: linear-gradient(180deg, rgba(94,223,255,0.3) 0%, rgba(192,132,252,0.1) 100%);
  }
  .pill {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .score-bar-bg {
    background: rgba(255,255,255,0.06);
  }
  .score-bar-fill {
    background: linear-gradient(90deg, #5edfff, #c084fc);
    box-shadow: 0 0 8px rgba(94,223,255,0.4);
  }
  @keyframes pulse-glow {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .pulse { animation: pulse-glow 2s ease-in-out infinite; }
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .loading-wrap { display:flex;align-items:center;justify-content:center;min-height:70vh;flex-direction:column;gap:12px; }
  .loading-spin { width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:#5edfff;border-radius:50%;animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body class="text-white relative overflow-x-hidden">

<!-- Background orbs -->
<div class="bg-orb" style="width:300px;height:300px;background:rgba(94,223,255,0.08);top:-50px;left:-80px;"></div>
<div class="bg-orb" style="width:250px;height:250px;background:rgba(192,132,252,0.08);bottom:200px;right:-60px;"></div>
<div class="bg-orb" style="width:200px;height:200px;background:rgba(0,255,170,0.06);top:40%;left:50%;transform:translateX(-50%);"></div>

<div class="max-w-[430px] mx-auto px-4 py-6 relative z-10" id="app">
  <div class="loading-wrap">
    <div class="loading-spin"></div>
    <div style="font-size:12px;color:rgba(255,255,255,.3);">Loading data...</div>
  </div>
</div>

<script>
const BASE = '../';
const TEAMS = ['team_a','team_b','team_c','team_d','team_e'];
const TEAM_NAMES = {team_a:'Alpha Momentum',team_b:'Beta Contrarian',team_c:'Gamma Disclosure',team_d:'Delta Theme',team_e:'Echo Frontier'};
const TEAM_SHORT = {team_a:'Alpha',team_b:'Beta',team_c:'Gamma',team_d:'Delta',team_e:'Echo'};
const TEAM_COLORS = {team_a:'#EF4444',team_b:'#3B82F6',team_c:'#10B981',team_d:'#F59E0B',team_e:'#8B5CF6'};
const TEAM_STRATS = {team_a:'momentum',team_b:'largecap_contrarian',team_c:'dart_disclosure',team_d:'theme_policy',team_e:'frontier_gap'};

async function fetchJ(path) {
  try { const r = await fetch(BASE + path); if (!r.ok) return null; return r.json(); } catch { return null; }
}

async function loadData() {
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
  }
  const [leaderboard, bnfPos, bnfCand] = await Promise.all([
    fetchJ('data/arena/leaderboard.json'),
    fetchJ('data/bnf/positions.json'),
    fetchJ('data/bnf/candidates.json'),
  ]);
  let status=null, candidates=null, dataDate=dates[0];
  for (const dt of dates) {
    const s = await fetchJ(`data/paper_trading/status_${dt}.json`);
    if (s) { status = s; dataDate = dt; break; }
  }
  for (const dt of dates) {
    const c = await fetchJ(`data/paper_trading/candidates_${dt}_all.json`);
    if (c) { candidates = c; break; }
  }
  const portfolios = {}, trades = {}, summaries = {};
  await Promise.all(TEAMS.map(async tid => {
    portfolios[tid] = await fetchJ(`data/arena/${tid}/portfolio.json`);
    for (const dt of dates) {
      if (!trades[tid]) { const t = await fetchJ(`data/arena/${tid}/daily/${dt}/trades.json`); if(t) trades[tid]=t; }
      if (!summaries[tid]) { const s = await fetchJ(`data/arena/${tid}/daily/${dt}/summary.json`); if(s) summaries[tid]=s; }
    }
  }));
  return { leaderboard, status, candidates, bnfPos, bnfCand, portfolios, trades, summaries, dataDate };
}

function fmt(n) { return n != null ? Number(n).toLocaleString('ko-KR') : '-'; }

function render(data) {
  const app = document.getElementById('app');
  const now = new Date();
  const dateStr = now.toISOString().slice(0,10).replace(/-/g,'.');

  // KPIs
  let totalCapital = 0, totalTrades = 0, totalWins = 0;
  const teamList = data.leaderboard?.teams ? [...data.leaderboard.teams].sort((a,b) => (b.elo||0) - (a.elo||0)) : [];

  TEAMS.forEach(tid => {
    const p = data.portfolios[tid];
    if (p) {
      totalCapital += p.current_capital || 0;
      totalTrades += p.total_trades || 0;
      totalWins += p.total_wins || 0;
    }
  });
  const totalLosses = totalTrades - totalWins;
  const winRate = totalTrades > 0 ? (totalWins / totalTrades * 100) : 0;
  const avgReturn = teamList.length > 0 ? teamList.reduce((s,t) => s + (t.total_return_pct || 0), 0) / teamList.length : 0;

  const neonRetClass = avgReturn > 0 ? 'neon-green' : avgReturn < 0 ? 'neon-red' : 'text-white/40';

  // All trades
  let allTrades = [];
  TEAMS.forEach(tid => {
    const t = data.trades[tid];
    if (t?.results) t.results.forEach(r => allTrades.push(r));
  });
  const winTrades = allTrades.filter(t => (t.return_pct || t.pnl_pct || 0) > 0);
  const lossTrades = allTrades.filter(t => (t.return_pct || t.pnl_pct || 0) <= 0);

  // BNF
  const bnfPositions = data.bnfPos?.positions || [];
  const bnfStats = data.bnfPos?.stats || {};
  const bnfTotalReturn = bnfStats.total_return_pct || bnfPositions.reduce((s,p) => s + (p.return_pct || 0), 0);

  // Candidates
  let candList = [];
  if (data.candidates?.strategies) {
    Object.values(data.candidates.strategies).forEach(strat => {
      if (strat.candidates) strat.candidates.forEach(c => { if (!candList.find(x => x.code === c.code)) candList.push(c); });
    });
  }
  candList.sort((a,b) => (b.score||0) - (a.score||0));
  candList = candList.slice(0, 5);

  // Rank badge helpers
  const rankBadge = (i) => {
    if (i === 0) return 'rank-badge';
    if (i === 1) return 'rank-badge-silver';
    if (i === 2) return 'rank-badge-bronze';
    return '';
  };
  const rankNeon = (i) => {
    if (i === 0) return 'neon-yellow';
    if (i === 1) return 'text-gray-300';
    if (i === 2) return 'text-amber-600';
    return 'text-white/25';
  };
  const candNeons = ['neon-blue','neon-purple','neon-yellow','text-white/50','text-white/40'];
  const candGrads = [
    'from-cyan-500/20 to-blue-500/20',
    'from-purple-500/20 to-pink-500/20',
    'from-yellow-500/20 to-orange-500/20',
    '',
    '',
  ];

  app.innerHTML = `
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-2">
      <div class="w-2 h-2 rounded-full bg-green-400 pulse"></div>
      <span class="text-xs text-white/40 tracking-wider uppercase">Live Trading</span>
    </div>
    <span class="text-xs text-white/30">${dateStr}</span>
  </div>

  <!-- Hero P&L -->
  <div class="glass-strong rounded-3xl p-6 mb-5 glow-green relative overflow-hidden">
    <div class="hero-glow absolute inset-0 pointer-events-none"></div>
    <div class="relative">
      <p class="text-xs text-white/40 mb-1 tracking-wide">${teamList.length}팀 평균 수익률</p>
      <p class="text-5xl font-black ${neonRetClass} tracking-tight">${avgReturn > 0 ? '+' : ''}${avgReturn.toFixed(2)}%</p>
      <div class="flex items-baseline gap-2 mt-3">
        <p class="text-xl font-bold text-white/90">${fmt(totalCapital)}</p>
        <p class="text-xs text-white/40">원</p>
      </div>
      <div class="flex gap-4 mt-4">
        <div class="glass rounded-xl px-3 py-2 flex-1 text-center">
          <p class="text-[10px] text-white/35 mb-0.5">총 매매</p>
          <p class="text-sm font-bold neon-blue">${totalTrades}건</p>
        </div>
        <div class="glass rounded-xl px-3 py-2 flex-1 text-center">
          <p class="text-[10px] text-white/35 mb-0.5">승 / 패</p>
          <p class="text-sm font-bold"><span class="neon-green">${totalWins}</span><span class="text-white/20"> / </span><span class="neon-red">${totalLosses}</span></p>
        </div>
        <div class="glass rounded-xl px-3 py-2 flex-1 text-center">
          <p class="text-[10px] text-white/35 mb-0.5">승률</p>
          <p class="text-sm font-bold neon-yellow">${winRate.toFixed(1)}%</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Section Label -->
  <div class="flex items-center gap-2 mb-3">
    <div class="w-1 h-4 rounded-full bg-gradient-to-b from-cyan-400 to-purple-500"></div>
    <p class="text-xs font-semibold text-white/50 tracking-wider uppercase">Team Rankings</p>
  </div>

  <!-- Team Cards -->
  <div class="space-y-2.5 mb-6">
    ${teamList.map((t, i) => {
      const tid = t.team_id || t.id || '';
      const p = data.portfolios[tid];
      const ret = t.total_return_pct ?? p?.total_return_pct ?? 0;
      const name = TEAM_SHORT[tid] || t.name || tid;
      const retClass = ret > 0 ? 'neon-green' : ret < 0 ? 'neon-red' : 'text-white/40';
      const isFirst = i === 0;
      const badgeClass = rankBadge(i);
      const wrapClass = isFirst ? 'glass-strong rounded-2xl p-4 glow-border relative overflow-hidden' : 'glass rounded-2xl p-4';
      const topLine = isFirst ? '<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-cyan-400/40 to-transparent"></div>' : '';
      const badgeEl = badgeClass
        ? `<div class="${badgeClass} w-8 h-8 rounded-lg flex items-center justify-center"><span class="text-xs font-black ${rankNeon(i)}">${i+1}</span></div>`
        : `<div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center"><span class="text-xs font-bold text-white/25">${i+1}</span></div>`;
      return `<div class="${wrapClass}">
        ${topLine}
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            ${badgeEl}
            <div>
              <p class="text-sm font-bold text-white/90">${name}</p>
              <p class="text-[10px] text-white/30">ELO ${t.elo || '-'}</p>
            </div>
          </div>
          <div class="text-right">
            <p class="text-lg ${isFirst ? 'font-black' : 'font-bold'} ${retClass}">${ret > 0 ? '+' : ''}${ret.toFixed(2)}%</p>
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>

  <!-- Trade History Timeline -->
  <div class="flex items-center gap-2 mb-3">
    <div class="w-1 h-4 rounded-full bg-gradient-to-b from-green-400 to-red-400"></div>
    <p class="text-xs font-semibold text-white/50 tracking-wider uppercase">Trade History</p>
  </div>

  <div class="glass-strong rounded-2xl p-4 mb-6 relative">
    ${allTrades.length > 0 ? `
    <div class="absolute left-[29px] top-6 bottom-6 w-[1px] timeline-line"></div>
    <div class="space-y-3">
      ${[...winTrades, ...lossTrades].map(t => {
        const pct = t.return_pct || t.pnl_pct || 0;
        const isWin = pct > 0;
        return `<div class="flex items-center gap-3 relative">
          <div class="w-3 h-3 rounded-full ${isWin ? 'bg-green-400 shadow-[0_0_8px_rgba(0,255,170,0.5)]' : 'bg-red-400 shadow-[0_0_8px_rgba(255,77,106,0.5)]'} z-10 shrink-0"></div>
          <div class="glass rounded-xl px-3 py-2 flex-1 flex justify-between items-center">
            <span class="text-xs font-medium text-white/80">${t.name || t.stock_name || t.code || '-'}</span>
            <span class="text-xs font-bold ${isWin ? 'neon-green' : 'neon-red'}">${pct > 0 ? '+' : ''}${pct.toFixed(0)}%</span>
          </div>
        </div>`;
      }).join('')}
    </div>` : '<div class="text-center text-white/30 text-xs py-6">거래 데이터 없음</div>'}
  </div>

  <!-- BNF Portfolio -->
  <div class="flex items-center gap-2 mb-3">
    <div class="w-1 h-4 rounded-full bg-gradient-to-b from-purple-400 to-pink-400"></div>
    <p class="text-xs font-semibold text-white/50 tracking-wider uppercase">BNF Portfolio</p>
  </div>

  <div class="glass-strong rounded-2xl p-4 mb-6 relative overflow-hidden">
    <div class="absolute top-0 right-0 w-24 h-24 bg-purple-500/10 rounded-full blur-2xl -translate-y-1/2 translate-x-1/2"></div>
    <div class="flex items-center justify-between mb-4 relative">
      <p class="text-xs text-white/40">보유 종목</p>
      <div class="flex items-baseline gap-1">
        <span class="text-lg font-black ${bnfTotalReturn >= 0 ? 'neon-purple' : 'neon-red'}">${bnfTotalReturn > 0 ? '+' : ''}${bnfTotalReturn.toFixed(2)}%</span>
        <span class="text-[10px] text-white/30">total</span>
      </div>
    </div>
    <div class="space-y-2.5 relative">
      ${bnfPositions.length > 0 ? bnfPositions.map(p => {
        const ret = p.return_pct || 0;
        const isPos = ret >= 0;
        return `<div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="w-1.5 h-1.5 rounded-full ${isPos ? 'bg-green-400' : 'bg-red-400'}"></div>
            <span class="text-xs text-white/70">${p.name || p.stock_name || '-'}</span>
          </div>
          <span class="text-xs font-bold ${isPos ? 'neon-green' : 'neon-red'}">${ret > 0 ? '+' : ''}${ret.toFixed(2)}%</span>
        </div>`;
      }).join('') : '<div class="text-xs text-white/30 text-center py-4">BNF 데이터 없음</div>'}
    </div>
  </div>

  <!-- Tomorrow Watchlist -->
  <div class="flex items-center gap-2 mb-3">
    <div class="w-1 h-4 rounded-full bg-gradient-to-b from-yellow-400 to-orange-400"></div>
    <p class="text-xs font-semibold text-white/50 tracking-wider uppercase">Tomorrow Watchlist</p>
  </div>

  <div class="space-y-2 mb-8">
    ${candList.length > 0 ? candList.map((c, i) => {
      const score = c.score || 0;
      const neon = candNeons[i] || 'text-white/40';
      const grad = candGrads[i];
      const badgeBg = grad ? `bg-gradient-to-br ${grad}` : 'bg-white/5';
      return `<div class="pill rounded-2xl px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <div class="w-6 h-6 rounded-lg ${badgeBg} flex items-center justify-center">
            <span class="text-[8px] font-bold ${neon}">${i+1}</span>
          </div>
          <span class="text-sm font-medium text-white/85">${c.name || c.stock_name || c.code || '-'}</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="score-bar-bg rounded-full w-16 h-1.5 overflow-hidden">
            <div class="score-bar-fill h-full rounded-full" style="width:${score}%"></div>
          </div>
          <span class="text-xs font-bold ${neon}">${score.toFixed(1)}</span>
        </div>
      </div>`;
    }).join('') : '<div class="text-center text-white/30 text-xs py-6">후보 데이터 없음</div>'}
  </div>

  <!-- Footer -->
  <div class="text-center pb-4">
    <p class="text-[10px] text-white/15 tracking-widest uppercase">AI Trading System v3.0</p>
  </div>
  `;
}

document.addEventListener('DOMContentLoaded', () => {
  loadData().then(render).catch(e => {
    console.error(e);
    document.getElementById('app').innerHTML = '<div class="loading-wrap"><div style="font-size:13px;" class="neon-red">데이터 로딩 실패</div><div style="font-size:11px;color:rgba(255,255,255,.3);">'+e.message+'</div></div>';
  });
});
</script>

<!-- Style Switcher -->
<div id="style-fab" onclick="document.getElementById('style-modal').classList.toggle('hidden')" style="position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:#fbbf24;color:#000;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(251,191,36,.4);z-index:9999;">🎨</div>
<div id="style-modal" class="hidden" style="position:fixed;inset:0;z-index:10000;display:flex;align-items:flex-end;justify-content:center;">
  <div onclick="document.getElementById('style-modal').classList.add('hidden')" style="position:absolute;inset:0;background:rgba(0,0,0,.5);"></div>
  <div style="position:relative;width:100%;max-width:430px;max-height:70vh;overflow-y:auto;background:#1a1a1a;border-radius:20px 20px 0 0;padding:20px;">
    <div style="text-align:center;margin-bottom:16px;"><div style="width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 12px;"></div><div style="font-weight:700;font-size:16px;color:#fff;">스타일 변경</div></div>
    <div id="style-list" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"></div>
  </div>
</div>
<script>
const STYLES = [
  {id:'style1_terminal',name:'Terminal',icon:'💻'},
  {id:'style2_card',name:'Card',icon:'🃏'},
  {id:'style3_glass',name:'Glass',icon:'🔮'},
  {id:'style4_table',name:'Table+',icon:'📊'},
  {id:'style5_chart',name:'Chart',icon:'📈'},
  {id:'style6_kanban',name:'Kanban',icon:'📋'},
  {id:'style7_sports',name:'Sports',icon:'🏟'},
  {id:'style8_hybrid',name:'Hybrid',icon:'⚡'},
  {id:'style9_stockapp',name:'MTS',icon:'📱'},
];
const currentFile = location.pathname.split('/').pop().replace('.html','');
const list = document.getElementById('style-list');
STYLES.forEach(s => {
  const active = currentFile === s.id;
  const btn = document.createElement('div');
  btn.style.cssText = `padding:12px 8px;border-radius:12px;text-align:center;cursor:pointer;border:2px solid ${active?'#fbbf24':'rgba(255,255,255,.1)'};background:${active?'rgba(251,191,36,.15)':'rgba(255,255,255,.03)'};`;
  btn.innerHTML = `<div style="font-size:24px;">${s.icon}</div><div style="font-size:11px;margin-top:4px;color:${active?'#fbbf24':'rgba(255,255,255,.6)'};">${s.name}</div>`;
  if (!active) btn.onclick = () => location.href = s.id + '.html';
  list.appendChild(btn);
});
document.head.insertAdjacentHTML('beforeend','<style>.hidden{display:none!important;}</style>');
</script>

</body>
</html>
