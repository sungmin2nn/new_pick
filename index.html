<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이퍼 트레이딩 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e4;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a2a4a;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { color: #00d9ff; font-size: 1.8em; }
        .header .subtitle { color: #8892b0; margin-top: 5px; font-size: 0.9em; }
        .header .nav-links a {
            color: #00ff88;
            text-decoration: none;
            margin-left: 20px;
        }
        .header .nav-links a:hover { text-decoration: underline; }

        /* Dashboard Navigation */
        .dashboard-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .dashboard-nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .dashboard-nav-btn:not(.active) {
            background: rgba(42, 42, 74, 0.5);
            color: #8892b0;
            border-color: #2a2a4a;
        }
        .dashboard-nav-btn:not(.active):hover {
            background: rgba(42, 42, 74, 0.8);
            color: #e4e4e4;
            transform: translateY(-2px);
        }
        .dashboard-nav-btn.active {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }
        .dashboard-nav-btn.bnf:not(.active):hover {
            border-color: #ff6b35;
            color: #ff6b35;
        }
        .dashboard-nav-btn.bnf.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
        }
        .nav-icon { font-size: 1.2em; }

        /* Control Bar */
        .control-bar {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .control-bar input[type="date"] {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #2a2a4a;
            background: #16213e;
            color: #e4e4e4;
            font-size: 1em;
        }
        .control-bar button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 217, 255, 0.3); }
        .btn-secondary {
            background: #2a2a4a;
            color: #e4e4e4;
        }
        .btn-secondary:hover { background: #3a3a5a; }
        .btn-refresh {
            background: linear-gradient(135deg, #ffaa00, #ff6b6b);
            color: #1a1a2e;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2a4a;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00d9ff;
            margin-bottom: 8px;
        }
        .stat-value.positive { color: #00ff88; }
        .stat-value.negative { color: #ff6b6b; }
        .stat-label { color: #8892b0; font-size: 0.85em; }

        /* Section */
        .section {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #2a2a4a;
        }
        .section h2 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .section h2 .update-time {
            font-size: 0.7em;
            color: #8892b0;
            font-weight: normal;
        }

        /* Live Status Grid */
        .live-status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        .stock-status-card {
            background: rgba(15, 52, 96, 0.5);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #8892b0;
            transition: all 0.3s;
        }
        .stock-status-card.profit { border-left-color: #00ff88; background: rgba(0, 255, 136, 0.1); }
        .stock-status-card.loss { border-left-color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
        .stock-status-card.waiting { border-left-color: #ffaa00; }
        .stock-status-card .stock-name {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stock-status-card .stock-code { color: #8892b0; font-size: 0.9em; }
        .stock-status-card .stock-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 0.9em;
        }
        .stock-status-card .info-label { color: #8892b0; }
        .stock-status-card .info-value { text-align: right; }
        .stock-status-card .status-badge,
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.75em;
            font-weight: 600;
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
        }
        .status-badge.positive { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .status-badge.negative { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .status-badge.profit { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .status-badge.loss { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .status-badge.waiting { background: rgba(255, 170, 0, 0.2); color: #ffaa00; }

        /* Table */
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid #2a2a4a;
            white-space: nowrap;
        }
        th { background: #0f3460; color: #00d9ff; font-weight: 600; font-size: 0.85em; }
        tr:hover { background: rgba(0, 217, 255, 0.05); }
        .positive { color: #00ff88; }
        .negative { color: #ff6b6b; }
        .table-wrapper { overflow-x: auto; }

        /* Live Status Table */
        #liveStatusTable th:nth-child(1) { width: 130px; }
        #liveStatusTable th:nth-child(2) { width: 50px; }
        #liveStatusTable th:nth-child(3),
        #liveStatusTable th:nth-child(4) { width: 90px; text-align: right; }
        #liveStatusTable th:nth-child(5) { width: 70px; text-align: right; }
        #liveStatusTable th:nth-child(6) { width: 100px; }
        #liveStatusTable td:nth-child(3),
        #liveStatusTable td:nth-child(4),
        #liveStatusTable td:nth-child(5) { text-align: right; }

        /* Chart Container */
        .chart-container {
            height: 300px;
            position: relative;
            margin-top: 15px;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
        }
        .badge-profit { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .badge-loss { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .badge-close { background: rgba(0, 217, 255, 0.2); color: #00d9ff; }

        /* Chart Toggle Button */
        .chart-toggle-btn {
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid #2a2a4a;
            background: transparent;
            color: #8892b0;
            font-size: 0.75em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chart-toggle-btn.active {
            background: #00d9ff;
            color: #1a1a2e;
            border-color: #00d9ff;
        }
        .chart-toggle-btn:hover:not(.active) {
            border-color: #00d9ff;
            color: #00d9ff;
        }

        /* Status Message */
        .status-message {
            text-align: center;
            padding: 30px 20px;
            color: #8892b0;
            font-size: 1em;
        }
        .status-message.waiting { color: #ffaa00; }
        .status-message.no-data { color: #8892b0; }
        .status-message.error { color: #ff6b6b; }

        /* Mini Stat for Strategy Summary */
        .stat-mini {
            background: rgba(15, 52, 96, 0.5);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .stat-mini .value {
            display: block;
            font-size: 1.3em;
            font-weight: bold;
            color: #00d9ff;
        }
        .stat-mini .value.positive { color: #00ff88; }
        .stat-mini .value.negative { color: #ff6b6b; }
        .stat-mini .label {
            display: block;
            font-size: 0.75em;
            color: #8892b0;
            margin-top: 4px;
        }

        /* Responsive - Tablet */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 0 5px; }
            .header { flex-direction: column; text-align: center; }
            .header h1 { font-size: 1.4em; }
            .header .nav-links { margin-top: 15px; }
            .header .nav-links a { margin: 0 10px; font-size: 0.9em; }
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
            .stat-card { padding: 15px 10px; }
            .stat-value { font-size: 1.5em; }
            .stat-label { font-size: 0.75em; }
            .control-bar {
                justify-content: center;
                gap: 8px;
            }
            .control-bar input[type="date"],
            .control-bar button {
                padding: 8px 12px;
                font-size: 0.85em;
            }
            .section {
                padding: 15px;
                margin-bottom: 15px;
                border-radius: 10px;
            }
            .section h2 {
                font-size: 1.1em;
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            .strategy-buttons {
                width: 100%;
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 10px;
                -webkit-overflow-scrolling: touch;
            }
            .strategy-btn {
                flex-shrink: 0;
                padding: 8px 14px;
                font-size: 0.85em;
            }
            .live-status-grid {
                grid-template-columns: 1fr;
            }
            .stock-status-card { padding: 15px; }
            /* Table scroll wrapper */
            .table-wrapper {
                overflow-x: auto;
                overflow-y: hidden;
                margin: 0;
                padding: 0;
                max-width: 100%;
            }
            table {
                min-width: 500px;
                font-size: 0.85em;
                width: 100%;
            }
            th, td {
                padding: 10px 8px;
                white-space: nowrap;
            }
            .chart-container { height: 250px; }
        }

        /* Responsive - Mobile (S23 등) */
        @media (max-width: 420px) {
            body { padding: 8px; }
            .container { padding: 0; }
            .header { margin-bottom: 15px; padding-bottom: 12px; }
            .header h1 { font-size: 1.15em; }
            .header .subtitle { font-size: 0.75em; }
            .header .nav-links a { margin: 0 8px; font-size: 0.8em; }
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
                margin-bottom: 15px;
            }
            .stat-card {
                padding: 10px 6px;
                border-radius: 10px;
            }
            .stat-value { font-size: 1.1em; }
            .stat-label { font-size: 0.65em; }
            .control-bar {
                gap: 6px;
                margin-bottom: 15px;
            }
            .control-bar input[type="date"] {
                padding: 6px 8px;
                font-size: 0.8em;
                max-width: 130px;
            }
            .control-bar button {
                padding: 6px 10px;
                font-size: 0.75em;
            }
            .section {
                padding: 12px 10px;
                margin-bottom: 12px;
                border-radius: 8px;
            }
            .section h2 { font-size: 1em; margin-bottom: 12px; }
            .strategy-buttons { gap: 6px; padding-bottom: 8px; }
            .strategy-btn {
                padding: 6px 10px;
                font-size: 0.75em;
                border-radius: 6px;
            }
            .stock-status-card {
                padding: 12px;
                border-radius: 8px;
            }
            .stock-status-card .stock-name { font-size: 0.95em; }
            .stock-status-card .stock-info { font-size: 0.8em; gap: 6px; }
            .table-wrapper {
                margin: 0;
                padding: 0;
                overflow-x: auto;
                overflow-y: hidden;
                max-width: 100%;
            }
            table { min-width: 450px; font-size: 0.75em; width: 100%; }
            th, td { padding: 8px 6px; }
            .chart-container { height: 200px; }
            .no-data { padding: 25px; font-size: 0.85em; }
        }

        /* No Data */
        .no-data {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }

        /* Strategy Buttons */
        .strategy-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .strategy-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #2a2a4a;
            background: #16213e;
            color: #e4e4e4;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .strategy-btn:hover {
            border-color: #00d9ff;
            background: rgba(0, 217, 255, 0.1);
        }
        .strategy-btn.active {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
            font-weight: 600;
        }

        /* Strategy Comparison Grid */
        .strategy-comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        .strategy-card {
            background: rgba(22, 33, 62, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #2a2a4a;
            transition: all 0.3s;
        }
        .strategy-card:hover {
            border-color: #00d9ff;
            transform: translateY(-3px);
        }
        .strategy-card.best {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }
        .strategy-card .strategy-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a4a;
        }
        .strategy-card .strategy-name {
            font-size: 1.2em;
            font-weight: 600;
            color: #00d9ff;
        }
        .strategy-card .strategy-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
        }
        .strategy-card .badge-best {
            background: #00ff88;
            color: #1a1a2e;
        }
        .strategy-card .strategy-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .strategy-card .stat-item {
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        .strategy-card .stat-item .value {
            font-size: 1.3em;
            font-weight: bold;
        }
        .strategy-card .stat-item .label {
            font-size: 0.8em;
            color: #8892b0;
        }
        .strategy-card .candidates-list {
            font-size: 0.9em;
        }
        .strategy-card .candidate-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <!-- Dashboard Navigation -->
        <div class="dashboard-nav">
            <a href="index.html" class="dashboard-nav-btn active">
                <span class="nav-icon">📈</span>
                <span>Paper Trading</span>
            </a>
            <a href="bnf_dashboard.html" class="dashboard-nav-btn bnf">
                <span class="nav-icon">📉</span>
                <span>BNF 낙폭과대</span>
            </a>
        </div>

        <header class="header">
            <div>
                <h1>📊 페이퍼 트레이딩 대시보드</h1>
                <div class="subtitle">다중 전략 비교 | 실시간 모니터링</div>
            </div>
            <nav class="nav-links">
                <a href="backtest_dashboard.html">백테스트</a>
                <a href="system_guide.html">시스템 가이드</a>
            </nav>
        </header>

        <!-- Strategy Buttons -->
        <div class="strategy-buttons">
            <button class="strategy-btn active" data-strategy="all" onclick="selectStrategy('all', this)">📊 전체 비교</button>
            <button class="strategy-btn" data-strategy="largecap_contrarian" onclick="selectStrategy('largecap_contrarian', this)">🏢 대형주 역추세</button>
            <button class="strategy-btn" data-strategy="momentum" onclick="selectStrategy('momentum', this)">📈 모멘텀</button>
            <button class="strategy-btn" data-strategy="theme_policy" onclick="selectStrategy('theme_policy', this)">🎯 테마/정책</button>
        </div>

        <!-- Control Bar -->
        <div class="control-bar">
            <input type="date" id="selectDate" />
            <button class="btn-secondary" onclick="loadHistoryData()">히스토리 조회</button>
            <button class="btn-primary" onclick="loadTodayData()">오늘 데이터</button>
            <button class="btn-refresh" onclick="triggerManualCheck()">🔄 수동 체크</button>
        </div>

        <!-- Strategy Comparison (전체 선택시 표시) -->
        <div class="section" id="strategyComparison" style="display: none;">
            <h2>⚔️ 전략 비교</h2>
            <div id="comparisonGrid" class="strategy-comparison-grid"></div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="tradingDays">-</div>
                <div class="stat-label">거래일</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalTrades">-</div>
                <div class="stat-label">총 거래</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="winRate">-</div>
                <div class="stat-label">승률</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalReturn">-</div>
                <div class="stat-label">누적 수익률</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="profitExits">-</div>
                <div class="stat-label">익절</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="lossExits">-</div>
                <div class="stat-label">손절</div>
            </div>
        </div>

        <!-- Live Status -->
        <div class="section">
            <h2>
                ⏱️ 실시간 상태
                <span class="update-time" id="statusUpdateTime">-</span>
            </h2>
            <div id="targetDate" style="color: #00d9ff; font-size: 0.9em; margin-bottom: 10px;"></div>
            <div class="table-wrapper">
                <table id="liveStatusTable">
                    <thead id="liveStatusHead">
                        <tr>
                            <th>종목</th>
                            <th>상태</th>
                            <th>진입가</th>
                            <th>현재가</th>
                            <th>수익률</th>
                            <th>비고</th>
                        </tr>
                    </thead>
                    <tbody id="liveStatusBody">
                        <tr><td colspan="6" class="no-data">상태 확인 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Performance Chart -->
        <div class="section">
            <h2>
                📈 성과 차트
                <div style="display: flex; gap: 8px;">
                    <button class="chart-toggle-btn active" onclick="toggleChartMode('percent')">%</button>
                    <button class="chart-toggle-btn" onclick="toggleChartMode('amount')">금액</button>
                </div>
            </h2>
            <div id="initialCapitalInfo" style="color: #8892b0; font-size: 0.85em; margin-bottom: 10px;">초기 자본금: 1,000,000원</div>
            <div class="chart-container">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <!-- Recent Trades -->
        <div class="section">
            <h2>📋 최근 매매 내역</h2>
            <div id="recentTrades" class="loading">데이터 로딩 중</div>
        </div>

        <!-- Daily Results -->
        <div class="section">
            <h2>📅 일별 결과</h2>
            <div id="dailyResults" class="loading">데이터 로딩 중</div>
        </div>
    </div>

    <script>
        let performanceChart = null;
        let currentStrategy = 'all';
        let chartMode = 'percent'; // 'percent' or 'amount'
        let cachedData = null;
        const INITIAL_CAPITAL = 1000000; // 초기 자본금 100만원

        // 백테스트 데이터를 페이퍼 트레이딩 형식으로 변환
        function transformBacktestData(backtest) {
            const strategies = backtest.strategies || {};
            const dailyMap = {};

            // 모든 전략의 일별 데이터를 합산
            for (const [strategyId, strategy] of Object.entries(strategies)) {
                const daily = strategy.daily || [];
                daily.forEach(d => {
                    if (!dailyMap[d.date]) {
                        dailyMap[d.date] = {
                            date: d.date,
                            total_trades: 0,
                            wins: 0,
                            losses: 0,
                            close_exits: 0,
                            total_return: 0,
                            profit_exits: 0,
                            loss_exits: 0,
                            results: []
                        };
                    }
                    const day = dailyMap[d.date];
                    day.total_trades += d.trades || 0;
                    day.wins += d.wins || 0;
                    day.losses += d.losses || 0;
                    day.total_return += d.return || 0;
                    day.profit_exits += d.wins || 0;
                    day.loss_exits += d.losses || 0;

                    // 종목별 결과 추가
                    (d.stocks || []).forEach(s => {
                        day.results.push({
                            code: s.code,
                            name: s.name,
                            return_pct: s.return_pct,
                            exit_type: s.exit_type,
                            strategy: strategyId
                        });
                    });
                });
            }

            // 날짜순 정렬 및 누적 수익률 계산
            const dailyResults = Object.values(dailyMap).sort((a, b) => a.date.localeCompare(b.date));
            let cumulative = 0;
            dailyResults.forEach(d => {
                d.win_rate = d.total_trades > 0 ? Math.round(d.wins / d.total_trades * 100) : 0;
                cumulative += d.total_return;
                d.cumulative_return = cumulative;
            });

            return {
                daily_results: dailyResults,
                source: 'backtest',
                period: backtest.period
            };
        }

        // intraday 파일들 직접 로드 (병렬)
        async function loadIntradayFiles() {
            // 최근 30일 날짜 목록 생성 (주말 제외)
            const dates = [];
            const today = new Date();
            for (let i = 0; i < 45; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dayOfWeek = d.getDay();
                if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                    dates.push(d.toISOString().split('T')[0].replace(/-/g, ''));
                }
            }

            // 병렬로 모든 파일 로드 (10배 이상 빠름)
            const fetchPromises = dates.map(async dateStr => {
                try {
                    const response = await fetch(`data/intraday/intraday_${dateStr}.json?t=${Date.now()}`);
                    if (response.ok) {
                        const data = await response.json();
                        return transformIntradayData(data, dateStr);
                    }
                } catch (e) {
                    // 파일 없으면 null
                }
                return null;
            });

            const results = await Promise.all(fetchPromises);
            const dailyResults = results.filter(r => r !== null);

            // 날짜순 정렬 및 누적 수익률 계산
            dailyResults.sort((a, b) => a.date.localeCompare(b.date));
            let cumulative = 0;
            dailyResults.forEach(d => {
                cumulative += d.total_return;
                d.cumulative_return = cumulative;
            });

            return { daily_results: dailyResults, source: 'intraday' };
        }

        // intraday 데이터 변환
        function transformIntradayData(data, dateStr) {
            const stocks = data.stocks || {};
            const stockList = Object.values(stocks);

            if (stockList.length === 0) return null;

            let wins = 0, losses = 0, closes = 0;
            let totalReturn = 0;
            const results = [];

            stockList.forEach(s => {
                const pl = s.profit_loss_analysis || {};
                const firstHit = pl.first_hit;
                let exitType = 'close';
                let returnPct = pl.closing_percent || 0;

                if (firstHit === 'profit') {
                    exitType = 'profit';
                    returnPct = pl.profit_target_percent || 3;
                    wins++;
                } else if (firstHit === 'loss') {
                    exitType = 'loss';
                    returnPct = pl.loss_target_percent || -1.5;
                    losses++;
                } else {
                    closes++;
                }

                totalReturn += returnPct;
                results.push({
                    code: s.code,
                    name: s.name,
                    return_pct: parseFloat(returnPct.toFixed(2)),
                    exit_type: exitType,
                    entry_price: pl.actual_result?.entry_price,
                    exit_price: pl.actual_result?.closing_price,
                    entry_time: pl.actual_result?.entry_time,
                    exit_time: pl.first_hit_time || '15:30:00'
                });
            });

            const totalTrades = stockList.length;
            return {
                date: dateStr,
                total_trades: totalTrades,
                wins: wins,
                losses: losses,
                close_exits: closes,
                total_return: parseFloat((totalReturn / totalTrades).toFixed(2)),
                profit_exits: wins,
                loss_exits: losses,
                win_rate: totalTrades > 0 ? Math.round(wins / totalTrades * 100) : 0,
                results: results
            };
        }

        // 실시간 상태 로드
        async function loadLiveStatus(dateStr = null) {
            const tbody = document.getElementById('liveStatusBody');

            const targetDateEl = document.getElementById('targetDate');

            try {
                const today = dateStr || new Date().toISOString().split('T')[0].replace(/-/g, '');
                const formattedDate = formatDate(today);
                targetDateEl.textContent = `📅 대상 날짜: ${formattedDate}`;

                // 현재 시간 체크
                const now = new Date();
                const hour = now.getHours();
                const isWeekend = now.getDay() === 0 || now.getDay() === 6;
                const isMarketOpen = hour >= 9 && hour < 16;

                // 상태 파일 로드 시도
                const statusResponse = await fetch(`data/paper_trading/status_${today}.json?t=${Date.now()}`);

                if (statusResponse.ok) {

                    displayLiveStatus(status);
                    updateTime.textContent = `최근 업데이트: ${status.checked_at || '-'}`;

                    displayCandidatesAsStatus(candidates);
                    updateTime.textContent = `선정 시간: ${candidates.selected_at || '-'}`;
                    return;
                }

                // morning_candidates.json 로드 시도
                const morningResponse = await fetch(`data/morning_candidates.json?t=${Date.now()}`);
                if (morningResponse.ok) {
                    const morningData = await morningResponse.json();
                    // 오늘 날짜와 일치하는지 확인
                    const morningDate = (morningData.date || '').replace(/-/g, '');
                    if (morningDate === today || morningDate === today.slice(0,4) + '-' + today.slice(4,6) + '-' + today.slice(6,8)) {
                        displayMorningCandidates(morningData);
                        updateTime.textContent = `선정 시간: ${morningData.generated_at || '-'}`;

                if (isWeekend) {
                    statusMsg = '📅 주말 - 장 휴무';
                } else if (hour < 8) {
                    statusMsg = '⏳ 장 시작 전 - 08:10 종목 선정 예정';
                } else if (hour < 9) {
                    statusMsg = '⏳ 대기 중 - 09:00 장 시작 예정';
                } else if (isMarketOpen) {
                    statusMsg = '📊 장중 - 충족 종목 없음';
                } else {
                    statusMsg = '📋 장 마감 - 오늘 충족 종목 없음';

                tbody.innerHTML = `<tr><td colspan="6" class="no-data">${statusMsg}</td></tr>`;

                    <th>현재가</th>
                    <th>등락률</th>
                    <th>점수</th>
                    <th>선정사유</th>
                </tr>
            `;

            if (candidates.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="no-data">선정된 종목이 없습니다.</td></tr>';
                return;
            }

            // 날짜/시장 정보 표시
            const targetDateEl = document.getElementById('targetDate');
            targetDateEl.innerHTML = `📊 ${data.date} (${data.weekday_short}) 선정 종목 <span style="margin-left:10px;">시장: ${sentiment.mode || '-'}</span>`;

            tbody.innerHTML = candidates.map(c => {
                const price = c.current_price || c.price || 0;
                const score = c.total_score || c.score || 0;
                const changePct = c.price_change_percent || 0;
                const capLabel = c.cap_tier === 'large' ? '대형' : c.cap_tier === 'mid' ? '중형' : '소형';

                return `
                    <tr>
                        <td><strong>${c.name}</strong> <span style="color:#8892b0;font-size:0.8em;">${c.code}</span></td>
                        <td><span class="status-badge" style="background:${c.is_leading ? '#00ff88' : '#ffaa00'};color:#1a1a2e;">${capLabel}</span></td>
                        <td>${price.toLocaleString()}원</td>
                        <td class="${changePct >= 0 ? 'positive' : 'negative'}">${changePct >= 0 ? '+' : ''}${changePct.toFixed(2)}%</td>
                        <td>${score.toFixed(0)}</td>
                        <td style="font-size:0.8em;max-width:150px;white-space:normal;">${c.selection_reason || c.technical_summary || '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        // 통계 표시
        function displayStats(data) {
            const days = data.daily_results || [];
            const totalTrades = days.reduce((sum, d) => sum + (d.total_trades || 0), 0);
            const totalWins = days.reduce((sum, d) => sum + (d.wins || 0), 0);
            const totalReturn = days.reduce((sum, d) => sum + (d.total_return || 0), 0);
            const profitExits = days.reduce((sum, d) => sum + (d.profit_exits || 0), 0);
            const lossExits = days.reduce((sum, d) => sum + (d.loss_exits || 0), 0);

            document.getElementById('tradingDays').textContent = days.length + '일';
            document.getElementById('totalTrades').textContent = totalTrades + '건';

            const winRate = totalTrades > 0 ? (totalWins / totalTrades * 100).toFixed(1) : 0;
            document.getElementById('winRate').textContent = winRate + '%';

            const returnEl = document.getElementById('totalReturn');
            returnEl.textContent = (totalReturn >= 0 ? '+' : '') + totalReturn.toFixed(2) + '%';
            returnEl.className = 'stat-value ' + (totalReturn >= 0 ? 'positive' : 'negative');

            document.getElementById('profitExits').textContent = profitExits + '건';
            document.getElementById('lossExits').textContent = lossExits + '건';
        }

        // 성과 차트
        function displayPerformanceChart(data) {
            cachedData = data; // 캐시 저장
            const days = data.daily_results || [];

            if (days.length === 0) return;

            const labels = days.map(d => formatDate(d.date));
            let cumulative = 0;
            const cumulativeReturns = days.map(d => {
                cumulative += d.total_return || 0;
                return cumulative;
            });
            const dailyReturns = days.map(d => d.total_return || 0);

            // 금액 모드용 데이터
            let balance = INITIAL_CAPITAL;
            const cumulativeAmounts = days.map(d => {
                const dailyPnL = (d.total_trades || 0) * POSITION_SIZE * (d.total_return || 0) / 100;
                balance += dailyPnL;
                return balance;
            });
            const dailyAmounts = days.map(d => {
                return (d.total_trades || 0) * POSITION_SIZE * (d.total_return || 0) / 100;
            });

            const isPercent = chartMode === 'percent';
            const ctx = document.getElementById('performanceChart').getContext('2d');

            if (performanceChart) {
                performanceChart.destroy();
            }

            performanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: isPercent ? '누적 수익률 (%)' : '총 자산 (원)',
                            data: isPercent ? cumulativeReturns : cumulativeAmounts,
                            borderColor: '#00d9ff',
                            backgroundColor: 'rgba(0, 217, 255, 0.1)',
                            fill: true,
                            tension: 0.3,
                            yAxisID: 'y'
                        },
                        {
                            label: isPercent ? '일일 수익률 (%)' : '일일 손익 (원)',
                            data: isPercent ? dailyReturns : dailyAmounts,
                            borderColor: '#00ff88',
                            backgroundColor: 'rgba(0, 255, 136, 0.5)',
                            type: 'bar',
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            position: 'left',
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#8892b0' }
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            grid: { display: false },
                            ticks: { color: '#8892b0' }
                        },
                        x: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#8892b0', maxRotation: 45 }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#e4e4e4' }
                        }
                    }
                }
            });
        }

        // 최근 매매 내역
        function displayRecentTrades(data, filterDate = null) {
            const container = document.getElementById('recentTrades');
            const days = data.daily_results || [];

            let allTrades = [];
            const targetDays = filterDate
                ? days.filter(d => d.date === filterDate)
                : days.slice(-5);

            targetDays.forEach(day => {
                (day.results || []).forEach(trade => {
                    allTrades.push({ ...trade, date: day.date });
                });
            });

            if (allTrades.length === 0) {
                container.innerHTML = '<div class="no-data">해당 기간에 거래 내역이 없습니다.</div>';
                return;
            }

            const html = `
                <div class="table-wrapper" style="margin: 0 -5px; padding: 0 5px;">
                <table>
                    <thead>
                        <tr>
                            <th>날짜</th>
                            <th>종목</th>
                            <th>주수</th>
                            <th>진입가</th>
                            <th>청산가</th>
                            <th>수익률</th>
                            <th>손익금액</th>
                            <th>청산</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${allTrades.slice(-15).reverse().map(t => {
                            const shares = t.entry_price ? Math.floor(POSITION_SIZE / t.entry_price) : 0;
                            const pnlAmount = shares * (t.exit_price || t.entry_price) * (t.return_pct || 0) / 100;
                            return `
                            <tr>
                                <td>${formatDate(t.date)}</td>
                                <td>${t.name}</td>
                                <td>${shares}주</td>
                                <td>${t.entry_price?.toLocaleString() || '-'}</td>
                                <td>${t.exit_price?.toLocaleString() || '-'}</td>
                                <td class="${t.return_pct >= 0 ? 'positive' : 'negative'}">${t.return_pct >= 0 ? '+' : ''}${t.return_pct}%</td>
                                <td class="${pnlAmount >= 0 ? 'positive' : 'negative'}">${pnlAmount >= 0 ? '+' : ''}${Math.round(pnlAmount).toLocaleString()}원</td>
                                <td><span class="badge badge-${t.exit_type}">${getExitTypeLabel(t.exit_type)}</span></td>
                            </tr>
                        `}).join('')}
                    </tbody>
                </table>
                </div>
            `;
            container.innerHTML = html;
        }

        // 일별 결과
        function displayDailyResults(data) {
            const container = document.getElementById('dailyResults');
            const days = data.daily_results || [];

            if (days.length === 0) {
                container.innerHTML = '<div class="no-data">아직 일별 결과가 없습니다.</div>';
                return;
            }

            // 누적 손익 계산
            let cumulativePnL = 0;
            const daysWithPnL = days.map(d => {
                const dailyPnL = (d.total_trades || 0) * POSITION_SIZE * (d.total_return || 0) / 100;
                cumulativePnL += dailyPnL;
                return { ...d, dailyPnL, cumulativePnL };
            });

            const html = `
                <div class="table-wrapper" style="margin: 0; padding: 0;">
                <table style="min-width: 580px;">
                    <thead>
                        <tr>
                            <th>날짜</th>
                            <th>거래</th>
                            <th>승률</th>
                            <th>수익률</th>
                            <th>손익</th>
                            <th>누적손익</th>
                            <th>익/손/종</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${daysWithPnL.slice(-20).reverse().map(d => `
                            <tr>
                                <td>${formatDate(d.date)}</td>
                                <td>${d.total_trades}건</td>
                                <td>${d.win_rate}%</td>
                                <td class="${d.total_return >= 0 ? 'positive' : 'negative'}">${d.total_return >= 0 ? '+' : ''}${d.total_return?.toFixed(1)}%</td>
                                <td class="${d.dailyPnL >= 0 ? 'positive' : 'negative'}">${d.dailyPnL >= 0 ? '+' : ''}${Math.round(d.dailyPnL).toLocaleString()}</td>
                                <td class="${d.cumulativePnL >= 0 ? 'positive' : 'negative'}">${d.cumulativePnL >= 0 ? '+' : ''}${Math.round(d.cumulativePnL).toLocaleString()}</td>
                                <td>${d.profit_exits || 0}/${d.loss_exits || 0}/${d.close_exits || 0}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                </div>
            `;
            container.innerHTML = html;
        }

        // No Data 표시
        function displayNoData() {
            document.getElementById('tradingDays').textContent = '0일';
            document.getElementById('totalTrades').textContent = '0건';
            document.getElementById('winRate').textContent = '0%';
            document.getElementById('totalReturn').textContent = '+0.00%';
            document.getElementById('profitExits').textContent = '0건';
            document.getElementById('lossExits').textContent = '0건';
            document.getElementById('liveStatus').innerHTML = '<div class="no-data">데이터가 없습니다. 장 종료 후 자동으로 업데이트됩니다.</div>';
            document.getElementById('recentTrades').innerHTML = '<div class="no-data">아직 거래 내역이 없습니다.</div>';
            document.getElementById('dailyResults').innerHTML = '<div class="no-data">아직 일별 결과가 없습니다.</div>';
        }

        // 날짜 포맷
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            if (dateStr.includes('-')) return dateStr;
            return dateStr.slice(0, 4) + '-' + dateStr.slice(4, 6) + '-' + dateStr.slice(6, 8);
        }

        // 청산 유형 라벨
        function getExitTypeLabel(type) {
            const labels = { 'profit': '익절', 'loss': '손절', 'close': '종가' };
            return labels[type] || type;
        }
    </script>

    <!-- Footer with Last Modified Date -->
    <footer style="text-align: center; padding: 20px; margin-top: 30px; border-top: 1px solid #2a2a4a; color: #8892b0; font-size: 0.85em;">
        📅 마지막 수정: 2026-03-31 00:10
    </footer>
</body>
</html>
