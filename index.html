<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Arena · BNF Trading Dashboard</title>
  <meta name="description" content="Arena 5팀 경쟁 + BNF 낙폭과대 트레이딩 대시보드 (Pearl Design)">
  <meta name="theme-color" content="#F8FAFB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Pearl Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Phase 8 Stylesheets -->
  <link rel="stylesheet" href="css/phase8/tokens.css">
  <link rel="stylesheet" href="css/phase8/base.css">
  <link rel="stylesheet" href="css/phase8/components.css">
  <link rel="stylesheet" href="css/phase8/layout.css">
  <link rel="stylesheet" href="css/phase8/responsive.css">
</head>
<body>
  <!-- PTR (Pull-to-Refresh) indicator -->
  <div id="ptr" style="position:fixed; top:0; left:0; right:0; padding:var(--space-3); text-align:center; background:var(--accent-bg); color:var(--accent-deep); font-size:var(--fs-sm); font-weight:600; transform:translateY(-100%); opacity:0; transition:all 0.3s var(--easing-spring); z-index:var(--z-sticky);">
    당겨서 새로고침
  </div>

  <!-- Status Bar (Sticky Top) -->
  <div class="status-bar">
    <div class="status-bar-inner">
      <div class="status-bar-left">
        <span class="inline">
          <span class="pill-dot pulse-dot" style="background:var(--success); width:8px; height:8px;"></span>
          <span>시스템 정상</span>
        </span>
        <span class="divider">·</span>
        <span><span id="status-date">-</span></span>
        <span class="divider">·</span>
        <span>마지막 갱신 <span id="status-last-refresh" class="num">-</span></span>
      </div>
      <div class="status-bar-right">
        <button id="refresh-btn" class="btn btn-icon" title="새로고침">↻</button>
      </div>
    </div>
  </div>

  <!-- Main Tab Navigation (Desktop) -->
  <div class="main-tabs">
    <div class="container inline" style="gap:var(--space-2); width:100%; max-width:var(--container-max);">
      <button class="main-tab active" data-tab="arena">
        🏟 <span>Arena</span>
      </button>
      <a href="bnf_dashboard.html" class="main-tab">
        🎯 <span>BNF</span>
      </a>
    </div>
  </div>

  <!-- Main Content -->
  <main class="page">
    <div class="page-content">

      <!-- ============ Arena Pane ============ -->
      <section class="main-pane active" id="pane-arena">
        <!-- Sub-tabs -->
        <nav class="sub-tabs" id="arena-subtabs" data-tab="arena">
          <button class="sub-tab active" data-section="arena-today">📊 Today</button>
          <button class="sub-tab" data-section="arena-leaderboard">🏆 리더보드</button>
          <button class="sub-tab" data-section="arena-teams">👥 팀별 상세</button>
          <button class="sub-tab" data-section="arena-strategies">📋 전략 후보</button>
          <button class="sub-tab" data-section="arena-system">⚙️ 시스템</button>
        </nav>

        <!-- Sub-panes -->
        <div class="sub-pane active" id="arena-today">
          <div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">데이터 로딩 중...</div></div>
        </div>
        <div class="sub-pane" id="arena-leaderboard"></div>
        <div class="sub-pane" id="arena-teams"></div>
        <div class="sub-pane" id="arena-strategies"></div>
        <div class="sub-pane" id="arena-system"></div>
      </section>

    </div>
  </main>

  <!-- Bottom Mobile Nav (Arena + BNF link) -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <button class="bottom-tab active" data-tab="arena">
        <span class="icon">🏟</span><span>Arena</span>
      </button>
      <a class="bottom-tab" href="bnf_dashboard.html">
        <span class="icon">🎯</span><span>BNF</span>
      </a>
    </div>
  </nav>

  <!-- Phase 8 App (ES Module) -->
  <script type="module" src="js/phase8/app.js"></script>
</body>
</html>
