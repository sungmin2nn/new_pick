<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Arena · BNF Trading Dashboard</title>
  <meta name="description" content="Arena 5팀 경쟁 + BNF 낙폭과대 트레이딩 대시보드 (Pearl Design)">
  <meta name="theme-color" content="#F8FAFB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Pearl Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Phase 8 Stylesheets -->
  <link rel="stylesheet" href="css/phase8/tokens.css">
  <link rel="stylesheet" href="css/phase8/base.css">
  <link rel="stylesheet" href="css/phase8/components.css">
  <link rel="stylesheet" href="css/phase8/layout.css">
  <link rel="stylesheet" href="css/phase8/responsive.css">
</head>
<body>
  <!-- PTR (Pull-to-Refresh) indicator -->
  <div id="ptr" style="position:fixed; top:0; left:0; right:0; padding:var(--space-3); text-align:center; background:var(--accent-bg); color:var(--accent-deep); font-size:var(--fs-sm); font-weight:600; transform:translateY(-100%); opacity:0; transition:all 0.3s var(--easing-spring); z-index:var(--z-sticky);">
    당겨서 새로고침
  </div>

  <!-- Status Bar (Sticky Top) -->
  <div class="status-bar">
    <div class="status-bar-inner">
      <div class="status-bar-left">
        <span class="inline">
          <span class="pill-dot pulse-dot" style="background:var(--success); width:8px; height:8px;"></span>
          <span>시스템 정상</span>
        </span>
        <span class="divider">·</span>
        <span><span id="status-date">-</span></span>
        <span class="divider">·</span>
        <span>마지막 갱신 <span id="status-last-refresh" class="num">-</span></span>
      </div>
      <div class="status-bar-right" style="display:flex;gap:var(--space-1);align-items:center;">
        <button id="theme-toggle" class="theme-toggle" title="다크/라이트 모드">🌙</button>
        <button id="refresh-btn" class="btn btn-icon" title="새로고침">↻</button>
      </div>
    </div>
  </div>

  <!-- Main Tab Navigation (Desktop) -->
  <div class="main-tabs">
    <div class="container inline" style="gap:var(--space-2); width:100%; max-width:var(--container-max);">
      <button class="main-tab active" data-tab="arena">
        🏠 <span>홈</span>
      </button>
      <button class="main-tab" data-tab="telegram">
        📨 <span>알림</span>
      </button>
      <button class="main-tab" data-tab="bnf">
        🎯 <span>BNF</span>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <main class="page">
    <div class="page-content">

      <!-- ============ Arena Pane (Single Scroll + 3-Depth Accordion) ============ -->
      <section class="main-pane active" id="pane-arena">
        <div id="arena-content">
          <div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">데이터 로딩 중...</div></div>
        </div>
      </section>

      <!-- ============ Telegram Pane ============ -->
      <section class="main-pane" id="pane-telegram">
        <div class="section">
          <!-- 날짜 네비게이션 -->
          <div class="card" style="padding:var(--space-3) var(--space-4);">
            <div style="display:flex; align-items:center; justify-content:space-between;">
              <button id="tg-prev" class="btn btn-icon" style="font-size:1.4rem; min-width:44px;" title="이전 날짜">‹</button>
              <div style="display:flex; align-items:center; gap:var(--space-2); cursor:pointer;" id="tg-today" title="오늘로 이동">
                <span id="tg-date-display" style="font-size:var(--fs-lg); font-weight:var(--fw-semibold); font-variant-numeric:tabular-nums;">-</span>
                <span id="tg-today-badge" class="pill-dot pulse-dot" style="background:var(--accent); width:6px; height:6px; display:none;"></span>
              </div>
              <button id="tg-next" class="btn btn-icon" style="font-size:1.4rem; min-width:44px;" title="다음 날짜" disabled>›</button>
            </div>
            <div id="tg-stats" style="display:flex; align-items:center; justify-content:center; gap:var(--space-2); margin-top:var(--space-2); font-size:var(--fs-xs); color:var(--text-secondary);"></div>
          </div>
          <!-- 발송 이력 목록 -->
          <div id="telegram-content" style="margin-top:var(--space-3);">
            <div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">로딩 중...</div></div>
          </div>
        </div>
      </section>

      <!-- ============ BNF Pane (iframe → bnf_dashboard.html) ============ -->
      <section class="main-pane" id="pane-bnf">
        <iframe
          id="bnf-iframe"
          src="bnf_dashboard.html"
          title="BNF 낙폭과대 대시보드"
          style="width:100%; height:calc(100vh - 160px); min-height:700px; border:none; border-radius:var(--radius-lg); background:var(--bg-surface); box-shadow:var(--shadow-card); display:block;"
        ></iframe>
        <script>
          (function() {
            var f = document.getElementById('bnf-iframe');
            if (f) f.src = 'bnf_dashboard.html?v=' + Date.now();
          })();
        </script>
      </section>

    </div>
  </main>

  <!-- Bottom Mobile Nav (5 tabs) -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <button class="bottom-tab active" data-tab="arena">
        <span class="icon">🏠</span><span>홈</span>
      </button>
      <button class="bottom-tab" data-tab="candidates">
        <span class="icon">📊</span><span>페이퍼</span>
      </button>
      <button class="bottom-tab" data-tab="trades">
        <span class="icon">📋</span><span>NEW</span>
      </button>
      <button class="bottom-tab" data-tab="bnf">
        <span class="icon">🎯</span><span>BNF</span>
      </button>
    </div>
  </nav>

  <!-- Phase 8 App (ES Module) -->
  <script type="module" src="js/phase8/app.js"></script>

</body>
</html>
