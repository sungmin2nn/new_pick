name: BNF Trading Simulation

on:
  schedule:
    # 매일 09:30 KST (00:30 UTC) - 장 시작 후
    - cron: '30 0 * * 1-5'
    # 매일 15:30 KST (06:30 UTC) - 장 마감 전
    - cron: '30 6 * * 1-5'
  workflow_dispatch: # 수동 실행 가능

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run BNF simulation
      run: python scripts/run_bnf_simulation.py

    - name: Commit and push results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/bnf/
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 BNF 시뮬레이션 업데이트 - $(date +'%Y-%m-%d %H:%M')" && git pull --rebase && git push) || true

    - name: Send Telegram Alert (BNF 매매)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TZ: Asia/Seoul
      run: python scripts/send_bnf_telegram.py simulation || echo "Telegram alert skipped"
