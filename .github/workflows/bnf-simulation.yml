name: BNF Trading Simulation

on:
  schedule:
    # 매일 09:30 KST (00:30 UTC) - 장 시작 후
    - cron: '30 0 * * 1-5'
    # 매일 15:30 KST (06:30 UTC) - 장 마감 전
    - cron: '30 6 * * 1-5'
  workflow_dispatch: # 수동 실행 가능

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run BNF simulation
      run: |
        python -c "
        import json
        import os
        from datetime import datetime, timedelta
        import pytz

        kst = pytz.timezone('Asia/Seoul')
        now = datetime.now(kst)
        today = now.strftime('%Y-%m-%d')
        time_str = now.strftime('%H:%M:%S')

        print(f'BNF 시뮬레이션 - {today} {time_str}')
        print('='*60)

        candidates_file = 'data/bnf/candidates.json'
        positions_file = 'data/bnf/positions.json'
        history_file = 'data/bnf/trade_history.json'

        # 포지션 로드
        if os.path.exists(positions_file):
            with open(positions_file, 'r', encoding='utf-8') as f:
                positions_data = json.load(f)
        else:
            positions_data = {
                'updated_at': '',
                'positions': [],
                'stats': {'total_capital': 3000000, 'open_positions': 0, 'total_trades': 0, 'win_rate': 0, 'total_return': 0, 'avg_return': 0, 'unrealized_pnl': 0}
            }

        # 거래이력 로드
        if os.path.exists(history_file):
            with open(history_file, 'r', encoding='utf-8') as f:
                history_data = json.load(f)
        else:
            history_data = {'updated_at': '', 'trades': [], 'stats': {}}

        # 후보종목 로드
        if not os.path.exists(candidates_file):
            print('후보 종목 파일이 없습니다.')
            positions_data['updated_at'] = f'{today} {time_str}'
            with open(positions_file, 'w', encoding='utf-8') as f:
                json.dump(positions_data, f, indent=2, ensure_ascii=False)
            exit(0)

        with open(candidates_file, 'r', encoding='utf-8') as f:
            candidates_data = json.load(f)

        candidates = candidates_data.get('candidates', [])
        print(f'후보 종목: {len(candidates)}개')

        if len(candidates) == 0:
            print('후보 종목이 없습니다.')
            positions_data['updated_at'] = f'{today} {time_str}'
            with open(positions_file, 'w', encoding='utf-8') as f:
                json.dump(positions_data, f, indent=2, ensure_ascii=False)
            exit(0)

        try:
            from pykrx import stock
            import warnings
            warnings.filterwarnings('ignore')

            # 현재 날짜 기준으로 시장 데이터 조회
            test_code = candidates[0]['code']
            today_str = now.strftime('%Y%m%d')
            start_str = (now - timedelta(days=10)).strftime('%Y%m%d')

            print(f'시장 기준일: {today_str}')

            positions = positions_data.get('positions', [])
            if isinstance(positions, dict):
                positions = list(positions.values())

            stats = positions_data.get('stats', {})
            total_capital = stats.get('total_capital', 3000000)
            max_positions = 5
            position_size = total_capital * 0.2

            open_positions = [p for p in positions if p.get('state') != 'CLOSED']

            # 기존 포지션 가격 업데이트
            for p in open_positions:
                code = p['code']
                try:
                    df = stock.get_market_ohlcv(start_str, today_str, code)
                    if not df.empty:
                        current_price = int(df.iloc[-1]['종가'])
                        p['current_price'] = current_price

                        avg_price = p.get('avg_price', current_price)
                        quantity = p.get('total_quantity', 0)
                        p['unrealized_pnl'] = (current_price - avg_price) * quantity
                        p['unrealized_pnl_pct'] = ((current_price / avg_price) - 1) * 100 if avg_price > 0 else 0

                        gain_pct = ((current_price / avg_price) - 1) * 100

                        if gain_pct <= -3:
                            p['state'] = 'CLOSED'
                            p['exit_reason'] = '손절 (-3%)'
                            p['exit_price'] = current_price
                            p['exit_date'] = today
                            print(f'손절: {p[\"name\"]} ({gain_pct:.1f}%)')
                        elif gain_pct >= 10:
                            p['state'] = 'CLOSED'
                            p['exit_reason'] = '익절 (+10%)'
                            p['exit_price'] = current_price
                            p['exit_date'] = today
                            print(f'익절: {p[\"name\"]} ({gain_pct:.1f}%)')

                except Exception as e:
                    print(f'가격 조회 실패: {code} - {e}')

            # 신규 진입 (candidates.json의 가격 사용)
            current_open = len([p for p in positions if p.get('state') != 'CLOSED'])
            slots_available = max_positions - current_open

            print(f'진입 가능 슬롯: {slots_available}개')

            for candidate in candidates[:slots_available]:
                code = candidate['code']
                name = candidate['name']

                if any(p['code'] == code and p['state'] != 'CLOSED' for p in positions):
                    print(f'이미 보유 중: {name}')
                    continue

                # candidates.json에서 가격 사용
                current_price = candidate.get('price', 0)
                if current_price <= 0:
                    print(f'가격 정보 없음: {name}')
                    continue

                quantity = int(position_size / current_price)

                if quantity > 0:
                    new_position = {
                        'code': code,
                        'name': name,
                        'state': 'FULL',
                        'avg_price': current_price,
                        'current_price': current_price,
                        'total_quantity': quantity,
                        'entry_date': today,
                        'entry_price': current_price,
                        'unrealized_pnl': 0,
                        'unrealized_pnl_pct': 0,
                        'selection_reason': candidate.get('reasons', ''),
                        'entries': [{'price': current_price, 'quantity': quantity, 'date': today, 'time': time_str}],
                        'exits': []
                    }
                    positions.append(new_position)
                    print(f'진입: {name}({code}) @ {current_price:,}원 x {quantity}주')

            # 청산 포지션 이력 이동
            trades = history_data.get('trades', [])
            for p in positions:
                if p.get('state') == 'CLOSED' and not any(t.get('code') == p['code'] and t.get('exit_date') == p.get('exit_date') for t in trades):
                    entry_price = p.get('avg_price', 0)
                    exit_price = p.get('exit_price', 0)
                    quantity = p.get('total_quantity', 0)
                    return_pct = ((exit_price / entry_price) - 1) * 100 if entry_price > 0 else 0

                    trade = {
                        'code': p['code'],
                        'name': p['name'],
                        'entry_date': p.get('entry_date'),
                        'entry_price': entry_price,
                        'exit_date': p.get('exit_date'),
                        'exit_price': exit_price,
                        'quantity': quantity,
                        'return_pct': round(return_pct, 2),
                        'profit': int((exit_price - entry_price) * quantity),
                        'exit_reason': p.get('exit_reason', '')
                    }
                    trades.append(trade)

            # 통계 계산
            open_positions = [p for p in positions if p.get('state') != 'CLOSED']
            total_trades = len(trades)
            win_count = len([t for t in trades if t.get('return_pct', 0) > 0])
            win_rate = (win_count / total_trades * 100) if total_trades > 0 else 0
            total_return = sum(t.get('return_pct', 0) for t in trades)
            avg_return = (total_return / total_trades) if total_trades > 0 else 0
            unrealized_pnl = sum(p.get('unrealized_pnl', 0) for p in open_positions)

            positions_data = {
                'updated_at': f'{today} {time_str}',
                'positions': positions,
                'stats': {
                    'total_capital': total_capital,
                    'used_capital': sum(p.get('avg_price', 0) * p.get('total_quantity', 0) for p in open_positions),
                    'open_positions': len(open_positions),
                    'total_trades': total_trades,
                    'win_rate': round(win_rate, 1),
                    'total_return': round(total_return, 2),
                    'avg_return': round(avg_return, 2),
                    'unrealized_pnl': unrealized_pnl
                }
            }

            history_data = {
                'updated_at': f'{today} {time_str}',
                'trades': trades,
                'stats': {
                    'total_trades': total_trades,
                    'win_count': win_count,
                    'loss_count': total_trades - win_count,
                    'win_rate': round(win_rate, 1),
                    'total_profit': sum(t.get('profit', 0) for t in trades),
                    'total_return': round(total_return, 2),
                    'avg_return': round(avg_return, 2)
                }
            }

            with open(positions_file, 'w', encoding='utf-8') as f:
                json.dump(positions_data, f, indent=2, ensure_ascii=False)

            with open(history_file, 'w', encoding='utf-8') as f:
                json.dump(history_data, f, indent=2, ensure_ascii=False)

            print('='*60)
            print(f'오픈 포지션: {len(open_positions)}개')
            print(f'총 거래: {total_trades}건, 승률: {win_rate:.1f}%')

        except Exception as e:
            print(f'오류 발생: {e}')
            import traceback
            traceback.print_exc()
            positions_data['updated_at'] = f'{today} {time_str}'
            with open(positions_file, 'w', encoding='utf-8') as f:
                json.dump(positions_data, f, indent=2, ensure_ascii=False)
        "

    - name: Commit and push results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/bnf/
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 BNF 시뮬레이션 업데이트 - $(date +'%Y-%m-%d %H:%M')" && git push) || true
