name: BNF Trading Simulation

on:
  schedule:
    # 매일 09:30 KST (00:30 UTC) - 장 시작 후
    - cron: '30 0 * * 1-5'
    # 매일 15:30 KST (06:30 UTC) - 장 마감 전
    - cron: '30 6 * * 1-5'
  workflow_dispatch: # 수동 실행 가능

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run BNF simulation
      env:
        KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
      run: python scripts/run_bnf_simulation.py

    - name: Commit and push results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/bnf/

        if git diff --quiet && git diff --staged --quiet; then
          echo "[git] 변경 없음 — skip"
          exit 0
        fi

        git commit -m "📊 BNF 시뮬레이션 업데이트 - $(date +'%Y-%m-%d %H:%M')"

        for i in 1 2 3 4 5; do
          if git pull --rebase -X theirs origin master && git push; then
            echo "[git] push 성공 (시도 $i)"
            exit 0
          fi
          git rebase --abort 2>/dev/null || true
          echo "[git] push 실패 — 재시도 $i/5"
          sleep $((i * 2))
        done
        echo "::error::push 실패 — origin과 분기됨. 로컬 커밋: $(git rev-parse HEAD)"
        exit 1

    - name: Send Telegram Alert (BNF 매매)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TZ: Asia/Seoul
      run: python scripts/send_bnf_telegram.py simulation || echo "Telegram alert skipped"
