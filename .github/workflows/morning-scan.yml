name: Morning Stock Scan

on:
  schedule:
    # 매일 08:10 KST (23:10 UTC 전날) - GitHub Actions 지연 대비 20분 여유
    - cron: '10 23 * * *'
  workflow_dispatch: # 수동 실행 가능
  push:
    branches:
      - master

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check if market day
      id: market_check
      run: |
        python -c "
        from utils import is_market_day
        import sys
        if is_market_day():
            print('오늘은 개장일입니다.')
            print('is_market_day=true', file=open('$GITHUB_OUTPUT', 'a'))
        else:
            print('오늘은 휴장일입니다. 스캔을 스킵합니다.')
            print('is_market_day=false', file=open('$GITHUB_OUTPUT', 'a'))
        "

    - name: Run stock screener (1차 시도)
      id: scan1
      if: steps.market_check.outputs.is_market_day == 'true'
      continue-on-error: true
      env:
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
      run: |
        python stock_screener.py

    - name: Verify results (1차)
      id: verify1
      if: steps.scan1.outcome == 'success'
      continue-on-error: true
      run: |
        python -c "
        import json
        with open('data/morning_candidates.json') as f:
            data = json.load(f)
        count = data.get('count', 0)
        print(f'선정 종목: {count}개')
        if count == 0:
            exit(1)
        "

    - name: Wait before retry (1차 실패 시)
      if: steps.scan1.outcome == 'failure' || steps.verify1.outcome == 'failure'
      run: |
        echo "⚠️ 1차 시도 실패. 60초 후 재시도..."
        sleep 60

    - name: Run stock screener (2차 시도)
      id: scan2
      if: steps.scan1.outcome == 'failure' || steps.verify1.outcome == 'failure'
      continue-on-error: true
      env:
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
      run: |
        python stock_screener.py

    - name: Verify results (2차)
      id: verify2
      if: steps.scan2.outcome == 'success'
      continue-on-error: true
      run: |
        python -c "
        import json
        with open('data/morning_candidates.json') as f:
            data = json.load(f)
        count = data.get('count', 0)
        print(f'선정 종목: {count}개')
        if count == 0:
            exit(1)
        "

    - name: Wait before retry (2차 실패 시)
      if: steps.scan2.outcome == 'failure' || steps.verify2.outcome == 'failure'
      run: |
        echo "⚠️ 2차 시도 실패. 60초 후 재시도..."
        sleep 60

    - name: Run stock screener (3차 시도 - 최종)
      id: scan3
      if: steps.scan2.outcome == 'failure' || steps.verify2.outcome == 'failure'
      env:
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
      run: |
        python stock_screener.py

    - name: Verify results (최종)
      if: steps.market_check.outputs.is_market_day == 'true'
      run: |
        python -c "
        import json
        with open('data/morning_candidates.json') as f:
            data = json.load(f)
        count = data.get('count', 0)
        print(f'✅ 최종 선정 종목: {count}개')
        # 0개여도 정상 종료 (휴장일 등)
        "

    - name: Export history
      if: steps.market_check.outputs.is_market_day == 'true'
      run: |
        python export_history.py

    - name: Commit and push results
      if: steps.market_check.outputs.is_market_day == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        cp data/morning_candidates.json morning_candidates.json
        cp data/history.json history.json
        git add data/morning_candidates.json morning_candidates.json data/history.json history.json
        # DB 파일이 존재하면 추가
        [ -f data/morning_candidates.db ] && git add data/morning_candidates.db || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔮 장전 종목 선정 - $(date +'%Y-%m-%d %H:%M')" && git pull --rebase && git push) || true
