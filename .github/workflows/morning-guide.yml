name: Morning Guide (옵션 B 메시지 2)

on:
  schedule:
    # 매일 KST 08:00 (UTC 23:00 전날) — 평일만 (UTC 일~목 = KST 월~금)
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

jobs:
  send-guide:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Send morning guide (휴장일은 스크립트 내부에서 skip)
        env:
          TZ: Asia/Seoul
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/morning_guide.py
