name: Afternoon Intraday Collection

on:
  schedule:
    # 매일 16:30 KST (07:30 UTC) - 장 마감 후
    - cron: '30 7 * * 1-5'
  workflow_dispatch: # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check morning candidates
      id: check_candidates
      run: |
        python -c "
        import json
        import os
        from datetime import datetime
        import pytz

        kst = pytz.timezone('Asia/Seoul')
        today = datetime.now(kst).strftime('%Y-%m-%d')

        filepath = 'data/morning_candidates.json'
        if not os.path.exists(filepath):
            print('❌ morning_candidates.json 파일 없음')
            print('has_candidates=false')
            exit(0)

        with open(filepath) as f:
            data = json.load(f)

        file_date = data.get('date', '')
        count = data.get('count', 0)

        print(f'파일 날짜: {file_date}, 오늘: {today}')
        print(f'선정 종목: {count}개')

        if file_date != today:
            print('⚠️ 오늘 날짜의 데이터가 아닙니다.')
            print('has_candidates=false')
        elif count == 0:
            print('⚠️ 선정된 종목이 없습니다.')
            print('has_candidates=false')
        else:
            print('✅ 오늘 선정 종목 확인됨')
            print('has_candidates=true')
        " | tee /dev/stderr | grep 'has_candidates=' >> $GITHUB_OUTPUT

    - name: Collect intraday data
      if: steps.check_candidates.outputs.has_candidates == 'true'
      run: |
        python intraday_collector.py

    - name: Skip message
      if: steps.check_candidates.outputs.has_candidates != 'true'
      run: |
        echo "📭 오늘 선정된 종목이 없어 장중 데이터 수집을 스킵합니다."

    - name: Commit and push results
      if: steps.check_candidates.outputs.has_candidates == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/intraday/
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 장중 데이터 수집 - $(date +'%Y-%m-%d %H:%M')" && git pull --rebase && git push) || true
