name: Paper Trading - Final Result

on:
  schedule:
    # 매일 16:10 KST (07:10 UTC) - 장 종료 후 최종 결과
    - cron: '10 7 * * 1-5'
  workflow_dispatch: # 수동 실행 가능
    inputs:
      date:
        description: '실행 날짜 (YYYYMMDD, 비워두면 오늘)'
        required: false
        default: ''

jobs:
  final-result:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Pull latest changes
      run: |
        git pull origin master || true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check if market day
      id: market_check
      run: |
        python -c "
        from utils import is_market_day
        if is_market_day():
            print('오늘은 개장일입니다.')
            with open('env', 'a') as f:
                f.write('IS_MARKET_DAY=true\n')
        else:
            print('오늘은 휴장일입니다.')
            with open('env', 'a') as f:
                f.write('IS_MARKET_DAY=false\n')
        "
        cat env >> $GITHUB_OUTPUT 2>/dev/null || echo "IS_MARKET_DAY=true" >> $GITHUB_OUTPUT

    - name: Run final simulation (strategy-separated)
      id: simulate
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      env:
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
      run: |
        if [ -n "${{ github.event.inputs.date }}" ]; then
          python -m paper_trading.scheduler run --date ${{ github.event.inputs.date }} --force
        else
          python -m paper_trading.scheduler run --force
        fi

    - name: Select tomorrow stocks (multi-strategy)
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      env:
        TZ: Asia/Seoul
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
      run: |
        python -c "
        from paper_trading.multi_strategy_runner import run_all_strategies
        from datetime import datetime, timedelta, timezone

        kst = timezone(timedelta(hours=9))
        today = datetime.now(kst)
        tomorrow = today + timedelta(days=1)
        while tomorrow.weekday() >= 5:
            tomorrow += timedelta(days=1)

        tomorrow_str = tomorrow.strftime('%Y%m%d')
        print(f'내일({tomorrow_str}) 다중 전략 종목 선정')
        results = run_all_strategies(date=tomorrow_str, top_n=5)
        print(f'총 {len(results)}개 전략 실행 완료')
        "

    - name: Generate reports
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      run: |
        python -c "
        from auto_reporter import AutoReporter
        reporter = AutoReporter()
        reporter.generate_daily_report()
        reporter.update_knowledge_base()
        reporter.generate_html_dashboard()
        reporter.aggregate_paper_trading_results()
        print('Reports generated successfully')
        "

    - name: Commit and push results
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        # Add all paper trading files
        git add data/paper_trading/ 2>/dev/null || true
        git add logs/ 2>/dev/null || true
        git add data/dashboard_report.html 2>/dev/null || true
        git add data/project_report.html 2>/dev/null || true
        git add data/knowledge_base.json 2>/dev/null || true

        git diff --quiet && git diff --staged --quiet || \
          (git commit -m "📊 페이퍼 트레이딩 최종 결과 (전략별) - $(date +'%Y-%m-%d')" && git push) || true

    - name: Send Telegram Alert (전략별 결과)
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TZ: Asia/Seoul
      run: |
        python -c "
        import json, glob
        from datetime import datetime, timezone, timedelta
        from telegram_notifier import TelegramNotifier

        kst = timezone(timedelta(hours=9))
        today = datetime.now(kst).strftime('%Y%m%d')

        notifier = TelegramNotifier()

        if not notifier.is_configured():
            print('Telegram 미설정 - 알림 생략')
            exit(0)

        # 비교 리포트 로드
        try:
            with open(f'data/paper_trading/result_{today}_comparison.json') as f:
                comp = json.load(f)

            # 전략별 결과 메시지 구성
            msg_lines = [f'📊 페이퍼 트레이딩 결과 ({today})', '']

            for s in comp.get('strategies', []):
                name = s.get('strategy_name', s.get('strategy_id', ''))
                ret = s.get('total_return', 0)
                wr = s.get('win_rate', 0)
                trades = s.get('total_trades', 0)
                icon = '🟢' if ret > 0 else '🔴' if ret < 0 else '⚪'
                msg_lines.append(f'{icon} {name}: {ret:+.2f}% (승률 {wr:.0f}%, {trades}건)')

            # 랭킹
            ranking = comp.get('ranking', [])
            if ranking:
                msg_lines.append('')
                msg_lines.append('🏆 랭킹:')
                for r in ranking:
                    msg_lines.append(f'  {r[\"rank\"]}위 {r[\"strategy_name\"]} ({r[\"total_return\"]:+.2f}%)')

            notifier.send_message('\n'.join(msg_lines))
            print('전략별 결과 알림 전송 완료')

        except FileNotFoundError:
            # 비교 파일 없으면 기존 방식 시도
            try:
                with open(f'data/paper_trading/result_{today}.json') as f:
                    data = json.load(f)
                sim = data.get('simulation', {})
                summary_data = {
                    'total_stocks': sim.get('total_trades', 0),
                    'profit_hit': sim.get('profit_exits', 0),
                    'loss_hit': sim.get('loss_exits', 0),
                    'waiting': sim.get('close_exits', 0),
                    'total_pnl_pct': sim.get('total_return', 0)
                }
                notifier.send_daily_summary(summary_data)
            except Exception as e:
                print(f'알림 오류: {e}')
        except Exception as e:
            print(f'알림 오류: {e}')
        "

    - name: Summary
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      env:
        TZ: Asia/Seoul
      run: |
        echo "## 📊 페이퍼 트레이딩 최종 결과 (전략별)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        python -c "
        import json
        from datetime import datetime, timezone, timedelta
        kst = timezone(timedelta(hours=9))
        today = datetime.now(kst).strftime('%Y%m%d')

        # 비교 리포트 출력
        try:
            with open(f'data/paper_trading/result_{today}_comparison.json') as f:
                comp = json.load(f)

            print('### 전략별 성과\n')
            print('| 전략 | 거래 | 승률 | 수익률 |')
            print('|------|------|------|--------|')

            for s in comp.get('strategies', []):
                name = s.get('strategy_name', '')
                trades = s.get('total_trades', 0)
                wr = s.get('win_rate', 0)
                ret = s.get('total_return', 0)
                icon = '✅' if ret > 0 else '❌' if ret < 0 else '⚪'
                print(f'| {icon} {name} | {trades}건 | {wr:.1f}% | {ret:+.2f}% |')

            # 랭킹
            ranking = comp.get('ranking', [])
            if ranking:
                print(f'\n### 🏆 랭킹')
                for r in ranking:
                    medal = ['🥇', '🥈', '🥉', '4️⃣'][min(r['rank']-1, 3)]
                    print(f'{medal} {r[\"strategy_name\"]}: {r[\"total_return\"]:+.2f}%')

            # 전략별 매매 상세
            print(f'\n### 매매 상세')
            import glob
            for f in sorted(glob.glob(f'data/paper_trading/result_{today}_*.json')):
                if 'comparison' in f:
                    continue
                with open(f) as fh:
                    data = json.load(fh)
                sim = data.get('simulation', {})
                sname = data.get('strategy_name', '')
                if sim and sim.get('results'):
                    print(f'\n#### {sname}')
                    for r in sim['results']:
                        icon = '✅' if r['exit_type'] == 'profit' else '❌' if r['exit_type'] == 'loss' else '⚪'
                        print(f'{icon} {r[\"name\"]}: {r[\"return_pct\"]:+.2f}% ({r[\"exit_type\"]}@{r.get(\"exit_time\", \"\")})')

        except Exception as e:
            print(f'Error: {e}')
        " >> $GITHUB_STEP_SUMMARY
