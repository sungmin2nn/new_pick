name: Daily Paper Trading

on:
  schedule:
    # 매일 16:10 KST (07:10 UTC) - 장 종료 후 10분
    - cron: '10 7 * * 1-5'
  workflow_dispatch: # 수동 실행 가능
    inputs:
      date:
        description: '실행 날짜 (YYYYMMDD, 비워두면 오늘)'
        required: false
        default: ''

jobs:
  paper-trade:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check if market day
      id: market_check
      run: |
        python -c "
        from utils import is_market_day
        if is_market_day():
            print('오늘은 개장일입니다.')
            with open('$GITHUB_OUTPUT', 'a') as f:
                f.write('is_market_day=true\n')
        else:
            print('오늘은 휴장일입니다.')
            with open('$GITHUB_OUTPUT', 'a') as f:
                f.write('is_market_day=false\n')
        "

    - name: Run paper trading
      id: paper_trade
      if: steps.market_check.outputs.is_market_day == 'true'
      env:
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
      run: |
        if [ -n "${{ github.event.inputs.date }}" ]; then
          python -m paper_trading.scheduler run --date ${{ github.event.inputs.date }} --force
        else
          python -m paper_trading.scheduler run --force
        fi

    - name: Generate dashboard
      if: steps.market_check.outputs.is_market_day == 'true'
      run: |
        python -c "
        from auto_reporter import AutoReporter
        reporter = AutoReporter()
        reporter.generate_daily_report()
        reporter.update_knowledge_base()
        reporter.generate_html_dashboard()
        print('Dashboard generated successfully')
        "

    - name: Commit and push results
      if: steps.market_check.outputs.is_market_day == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        # Add paper trading results
        git add data/paper_trading/ 2>/dev/null || true
        git add logs/ 2>/dev/null || true
        git add data/dashboard_report.html 2>/dev/null || true
        git add data/project_report.html 2>/dev/null || true
        git add data/knowledge_base.json 2>/dev/null || true

        # Commit if there are changes
        git diff --quiet && git diff --staged --quiet || \
          (git commit -m "📊 페이퍼 트레이딩 결과 - $(date +'%Y-%m-%d')" && git push) || true

    - name: Summary
      if: steps.market_check.outputs.is_market_day == 'true'
      run: |
        echo "## 📊 페이퍼 트레이딩 완료" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "data/paper_trading/result_$(date +'%Y%m%d').json" ]; then
          python -c "
        import json
        from datetime import datetime
        date = datetime.now().strftime('%Y%m%d')
        try:
            with open(f'data/paper_trading/result_{date}.json') as f:
                data = json.load(f)
            sim = data.get('simulation', {})
            print(f'- 거래 수: {sim.get(\"total_trades\", 0)}건')
            print(f'- 승률: {sim.get(\"win_rate\", 0)}%')
            print(f'- 총 수익률: {sim.get(\"total_return\", 0):+.2f}%')
        except:
            print('결과 파일 읽기 실패')
          " >> $GITHUB_STEP_SUMMARY
        fi
