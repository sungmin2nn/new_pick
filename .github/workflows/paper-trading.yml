name: Arena - Final Result

on:
  schedule:
    # 매일 16:10 KST (07:10 UTC) - 장 종료 후 최종 결과
    - cron: '10 7 * * 1-5'
  workflow_dispatch: # 수동 실행 가능
    inputs:
      date:
        description: '실행 날짜 (YYYYMMDD, 비워두면 오늘)'
        required: false
        default: ''

jobs:
  arena-result:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Pull latest changes
      run: |
        git pull origin master || true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check if market day
      id: market_check
      run: |
        python -c "
        from utils import is_market_day
        if is_market_day():
            print('오늘은 개장일입니다.')
            with open('env', 'a') as f:
                f.write('IS_MARKET_DAY=true\n')
        else:
            print('오늘은 휴장일입니다.')
            with open('env', 'a') as f:
                f.write('IS_MARKET_DAY=false\n')
        "
        cat env >> $GITHUB_OUTPUT 2>/dev/null || echo "IS_MARKET_DAY=true" >> $GITHUB_OUTPUT

    - name: Run Arena (4-team competition)
      id: arena
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      env:
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
        TZ: Asia/Seoul
      run: |
        python -c "
        from paper_trading.arena.arena_manager import ArenaManager
        from datetime import datetime, timezone, timedelta

        kst = timezone(timedelta(hours=9))

        date = '${{ github.event.inputs.date }}'
        if not date:
            date = datetime.now(kst).strftime('%Y%m%d')

        print(f'Arena 실행: {date}')
        arena = ArenaManager()
        result = arena.run_daily(date=date, force=True)

        # 분석 & 학습 노트
        if result.get('status') == 'success':
            arena.analyze_and_evolve(date)

        print(f'Arena 완료: {result.get(\"status\")}')
        "

    - name: Select tomorrow stocks (multi-strategy)
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      env:
        TZ: Asia/Seoul
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
      run: |
        python -c "
        from paper_trading.multi_strategy_runner import run_all_strategies
        from datetime import datetime, timedelta, timezone

        kst = timezone(timedelta(hours=9))
        today = datetime.now(kst)
        tomorrow = today + timedelta(days=1)
        while tomorrow.weekday() >= 5:
            tomorrow += timedelta(days=1)

        tomorrow_str = tomorrow.strftime('%Y%m%d')
        print(f'내일({tomorrow_str}) 다중 전략 종목 선정')
        results = run_all_strategies(date=tomorrow_str, top_n=5)
        print(f'총 {len(results)}개 전략 실행 완료')
        "

    - name: Generate dashboard
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      run: |
        python -c "
        from paper_trading.arena.dashboard import generate_arena_dashboard
        generate_arena_dashboard()
        print('대시보드 생성 완료')
        "

    - name: Run healthcheck
      if: always() && steps.market_check.outputs.IS_MARKET_DAY != 'false'
      env:
        TZ: Asia/Seoul
      run: |
        python -c "
        from paper_trading.arena.healthcheck import HealthChecker
        from datetime import datetime, timezone, timedelta

        kst = timezone(timedelta(hours=9))
        today = datetime.now(kst).strftime('%Y%m%d')

        checker = HealthChecker()
        report = checker.run_check(date=today)
        print(f'헬스체크 결과: {report[\"status\"]}')
        for issue in report.get('issues', []):
            print(f'  - {issue[\"description\"]}: {issue[\"details\"]}')
        "

    - name: Commit and push results
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git add data/arena/ 2>/dev/null || true
        git add data/paper_trading/ 2>/dev/null || true
        git add data/arena_dashboard.html 2>/dev/null || true
        git add data/dashboard_report.html 2>/dev/null || true
        git add data/project_report.html 2>/dev/null || true
        git add data/knowledge_base.json 2>/dev/null || true
        git add logs/ 2>/dev/null || true

        git diff --quiet && git diff --staged --quiet || \
          (git commit -m "🏟️ Arena 일일 결과 - $(date +'%Y-%m-%d')" && git pull --rebase && git push) || true

    - name: Send Telegram Alert (Arena 결과)
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TZ: Asia/Seoul
      run: |
        python -c "
        import json
        from datetime import datetime, timezone, timedelta
        from telegram_notifier import TelegramNotifier

        kst = timezone(timedelta(hours=9))
        today = datetime.now(kst).strftime('%Y%m%d')

        notifier = TelegramNotifier()
        if not notifier.is_configured():
            print('Telegram 미설정 - 알림 생략')
            exit(0)

        # Arena 결과 알림
        try:
            from paper_trading.arena.arena_manager import ArenaManager
            arena = ArenaManager()
            msg = arena.format_telegram_daily(today)
            notifier.send_message(msg)
            print('Arena 결과 알림 전송')
        except Exception as e:
            print(f'Arena 알림 오류: {e}')

        # 헬스체크 알림 (이슈 있을 때만)
        try:
            from paper_trading.arena.healthcheck import HealthChecker
            checker = HealthChecker()
            report = checker.run_check(date=today)
            alert = checker.format_telegram_alert(report)
            if alert:
                notifier.send_message(alert)
                print('헬스체크 알림 전송')
        except Exception as e:
            print(f'헬스체크 알림 오류: {e}')
        "

    - name: Send Error Alert (on failure)
      if: failure()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python -c "
        from telegram_notifier import TelegramNotifier
        notifier = TelegramNotifier()
        if notifier.is_configured():
            notifier.send_error_alert(
                'GitHub Actions 실패',
                'Arena 워크플로우(paper-trading.yml) 실행 중 에러 발생. GitHub Actions에서 확인하세요.',
                'paper-trading'
            )
            print('에러 알림 전송')
        " || echo "Failed to send error alert"

    - name: Summary
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      env:
        TZ: Asia/Seoul
      run: |
        echo "## 🏟️ Arena 일일 결과" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        python -c "
        import json
        from datetime import datetime, timezone, timedelta

        kst = timezone(timedelta(hours=9))
        today = datetime.now(kst).strftime('%Y%m%d')

        # Arena 리포트
        try:
            with open(f'data/arena/daily/{today}/arena_report.json') as f:
                report = json.load(f)

            print('### 팀별 성과\n')
            print('| 팀 | 일일수익률 | 누적수익률 | 현재자금 | 승률 |')
            print('|------|-----------|-----------|---------|------|')

            for tid, tdata in report.get('teams', {}).items():
                sim = tdata.get('simulation', {})
                name = tdata.get('team_name', tid)
                daily_ret = sim.get('total_return', 0) if sim else 0
                icon = '✅' if daily_ret > 0 else '❌' if daily_ret < 0 else '⚪'

                # 포트폴리오 로드
                try:
                    with open(f'data/arena/{tid}/portfolio.json') as pf:
                        portfolio = json.load(pf)
                    cum_ret = portfolio.get('total_return_pct', 0)
                    capital = portfolio.get('current_capital', 0)
                    wins = portfolio.get('total_wins', 0)
                    total = portfolio.get('total_trades', 0)
                    wr = f'{wins}/{total}' if total > 0 else '-'
                except:
                    cum_ret = 0
                    capital = 0
                    wr = '-'

                print(f'| {icon} {name} | {daily_ret:+.2f}% | {cum_ret:+.2f}% | {capital:,.0f}원 | {wr} |')

            # 리더보드
            try:
                with open('data/arena/leaderboard.json') as f:
                    lb = json.load(f)

                print(f'\n### 🏆 ELO 랭킹')
                teams_sorted = sorted(lb.get('teams', {}).values(), key=lambda x: x.get('elo', 0), reverse=True)
                medals = ['🥇', '🥈', '🥉', '4️⃣']
                for i, t in enumerate(teams_sorted):
                    medal = medals[min(i, 3)]
                    print(f'{medal} {t.get(\"emoji\", \"\")} {t[\"team_name\"]}: ELO {t[\"elo\"]}')
            except:
                pass

            # 헬스체크
            print(f'\n### 🏥 헬스체크')
            from paper_trading.arena.healthcheck import HealthChecker
            checker = HealthChecker()
            hc = checker.run_check(date=today)
            status_icon = '✅' if hc['status'] == 'healthy' else '⚠️' if hc['status'] == 'warning' else '❌'
            print(f'{status_icon} 상태: {hc[\"status\"]}')
            for issue in hc.get('issues', []):
                print(f'- {issue[\"description\"]}: {issue[\"details\"]}')

        except Exception as e:
            print(f'Error: {e}')
        " >> $GITHUB_STEP_SUMMARY
