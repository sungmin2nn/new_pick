name: Arena - Healthcheck & Intraday Monitor

on:
  schedule:
    # 장중 3회 체크: 10:00, 12:00, 14:00 KST
    - cron: '0 1 * * 1-5'   # 10:00 KST
    - cron: '0 3 * * 1-5'   # 12:00 KST
    - cron: '0 5 * * 1-5'   # 14:00 KST
    # 장후 헬스체크: 17:00 KST (결과 도착 확인)
    - cron: '0 8 * * 1-5'   # 17:00 KST
  workflow_dispatch: # 수동 실행

jobs:
  check-status:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Pull latest changes
      run: |
        git pull origin master || true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run intraday status check
      id: check
      env:
        TZ: Asia/Seoul
      run: |
        python -m paper_trading.checker || echo "Checker completed with warnings"

    - name: Run Arena healthcheck
      id: healthcheck
      env:
        TZ: Asia/Seoul
      run: |
        python -c "
        from paper_trading.arena.healthcheck import HealthChecker
        from datetime import datetime, timezone, timedelta
        import json

        kst = timezone(timedelta(hours=9))
        today = datetime.now(kst).strftime('%Y%m%d')

        checker = HealthChecker()
        report = checker.run_check(date=today)

        print(f'헬스체크 결과: {report[\"status\"]}')
        print(f'체크 항목: {len(report.get(\"checks\", []))}개')
        print(f'이슈: {len(report.get(\"issues\", []))}건')

        for issue in report.get('issues', []):
            print(f'  ⚠️ {issue[\"description\"]}: {issue[\"details\"]}')

        # 상태를 output으로 전달
        with open('healthcheck_result.json', 'w') as f:
            json.dump(report, f, ensure_ascii=False, indent=2)

        if report['status'] != 'healthy':
            print('::warning::Arena 헬스체크 이슈 발견')
        "

    - name: Commit status
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git add data/paper_trading/status_*.json 2>/dev/null || true
        git add data/arena/healthcheck/ 2>/dev/null || true

        git diff --quiet && git diff --staged --quiet || \
          (git commit -m "🏥 Arena 헬스체크 - $(date +'%Y-%m-%d %H:%M')" && git push) || true

    - name: Send alerts (issues only)
      if: always()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TZ: Asia/Seoul
      run: |
        python -c "
        import json
        from telegram_notifier import TelegramNotifier

        notifier = TelegramNotifier()
        if not notifier.is_configured():
            print('Telegram 미설정')
            exit(0)

        # 헬스체크 알림
        try:
            from paper_trading.arena.healthcheck import HealthChecker
            checker = HealthChecker()
            with open('healthcheck_result.json') as f:
                report = json.load(f)
            alert = checker.format_telegram_alert(report)
            if alert:
                notifier.send_message(alert)
                print('헬스체크 알림 전송')
            else:
                print('이상 없음 - 알림 생략')
        except FileNotFoundError:
            print('헬스체크 결과 없음')
        except Exception as e:
            print(f'알림 오류: {e}')

        # 장중 익절/손절 알림 (기존)
        try:
            from datetime import datetime, timezone, timedelta
            kst = timezone(timedelta(hours=9))
            today = datetime.now(kst).strftime('%Y%m%d')

            with open(f'data/paper_trading/status_{today}.json') as f:
                data = json.load(f)

            for s in data.get('stocks', []):
                if s['status'] == 'profit_hit':
                    notifier.send_sell_signal(
                        s['name'], s.get('code', ''),
                        s.get('current_price', 0), 'profit', s.get('pnl_pct', 0))
                elif s['status'] == 'loss_hit':
                    notifier.send_sell_signal(
                        s['name'], s.get('code', ''),
                        s.get('current_price', 0), 'loss', s.get('pnl_pct', 0))
        except Exception as e:
            print(f'장중 알림 오류: {e}')
        "

    - name: Send Error Alert (on failure)
      if: failure()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python -c "
        from telegram_notifier import TelegramNotifier
        notifier = TelegramNotifier()
        if notifier.is_configured():
            notifier.send_error_alert(
                'GitHub Actions 실패',
                '헬스체크 워크플로우(paper-trading-check.yml) 실행 중 에러 발생.',
                'paper-trading-check'
            )
        " || echo "Failed to send error alert"

    - name: Summary
      env:
        TZ: Asia/Seoul
      run: |
        echo "## 🏥 Arena 헬스체크" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "healthcheck_result.json" ]; then
          python -c "
        import json
        with open('healthcheck_result.json') as f:
            r = json.load(f)
        status_icon = '✅' if r['status'] == 'healthy' else '⚠️' if r['status'] == 'warning' else '❌'
        print(f'{status_icon} **상태: {r[\"status\"]}**')
        print(f'- 체크 시간: {r.get(\"checked_at\", \"\")}')
        print(f'- 체크 항목: {len(r.get(\"checks\", []))}개')
        print(f'- 이슈: {len(r.get(\"issues\", []))}건')
        for issue in r.get('issues', []):
            icon = '❌' if issue['status'] == 'fail' else '⚠️'
            print(f'{icon} {issue[\"description\"]}: {issue[\"details\"]}')
          " >> $GITHUB_STEP_SUMMARY
        fi
