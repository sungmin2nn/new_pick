name: Theme Snapshot (Daily)

on:
  schedule:
    # 매일 16:30 KST (07:30 UTC) - 장 마감 후
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Pull latest changes
      run: git pull origin master || true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run theme snapshot
      env:
        TZ: Asia/Seoul
      run: python scripts/snapshot_themes.py

    - name: Commit and push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/theme_snapshots/ 2>/dev/null || true

        if git diff --quiet && git diff --staged --quiet; then
          echo "[git] 변경 없음 — skip"
          exit 0
        fi

        git commit -m "📸 테마 스냅샷 - $(date +'%Y-%m-%d')"

        for i in 1 2 3 4 5; do
          if git pull --rebase -X theirs origin master && git push; then
            echo "[git] push 성공 (시도 $i)"
            exit 0
          fi
          git rebase --abort 2>/dev/null || true
          echo "[git] push 실패 — 재시도 $i/5"
          sleep $((i * 2))
        done
        echo "::error::push 실패 — origin과 분기됨. 로컬 커밋: $(git rev-parse HEAD)"
        exit 1
