name: BNF Stock Selection

on:
  schedule:
    # 매일 16:30 KST (07:30 UTC) - 장 마감 후
    - cron: '30 7 * * 1-5'
  workflow_dispatch: # 수동 실행 가능

jobs:
  select:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run BNF selector
      env:
        TZ: Asia/Seoul
        KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
      run: python scripts/run_bnf_selection.py

    - name: Commit and push results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/bnf/
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔥 BNF 낙폭과대 종목 선정 - $(date +'%Y-%m-%d')" && git pull --rebase && git push) || true

    - name: Send Telegram Alert (BNF 종목 선정)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TZ: Asia/Seoul
      run: python scripts/send_bnf_telegram.py selection || echo "Telegram alert skipped"
