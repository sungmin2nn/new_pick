name: Paper Trading - Morning Select (Multi-Strategy)
# Force re-parse by GitHub Actions

on:
  schedule:
    # 매일 08:00 KST (23:00 UTC 전날) - 장 시작 전 종목 선정
    - cron: '0 23 * * 0-4'
  workflow_dispatch: # 수동 실행 가능

jobs:
  select-stocks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check if market day
      id: market_check
      run: |
        python -c "
        from utils import is_market_day
        if is_market_day():
            print('오늘은 개장일입니다.')
            with open('env', 'a') as f:
                f.write('IS_MARKET_DAY=true\n')
        else:
            print('오늘은 휴장일입니다.')
            with open('env', 'a') as f:
                f.write('IS_MARKET_DAY=false\n')
        "
        cat env >> $GITHUB_OUTPUT 2>/dev/null || echo "IS_MARKET_DAY=true" >> $GITHUB_OUTPUT

    - name: Run multi-strategy selection
      id: select
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      env:
        TZ: Asia/Seoul
      run: |
        python -c "
        from paper_trading.multi_strategy_runner import run_all_strategies
        from datetime import datetime, timezone, timedelta

        # KST 시간대 사용
        kst = timezone(timedelta(hours=9))
        today = datetime.now(kst).strftime('%Y%m%d')
        print(f'=== 다중 전략 종목 선정 ({today}) ===')

        # 모든 전략 실행 (전략당 5개 종목)
        results = run_all_strategies(date=today, top_n=5)

        print(f'\n총 {len(results)}개 전략 실행 완료')
        "

    - name: Commit and push results
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git add data/paper_trading/candidates_*.json 2>/dev/null || true

        git diff --quiet && git diff --staged --quiet || \
          (git commit -m "🎯 다중전략 종목 선정 - $(date +'%Y-%m-%d %H:%M')" && git push) || true

    - name: Send Telegram Alert (종목 선정 완료)
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TZ: Asia/Seoul
      run: |
        python -c "
import json
from datetime import datetime, timezone, timedelta
from telegram_notifier import TelegramNotifier

kst = timezone(timedelta(hours=9))
today = datetime.now(kst).strftime('%Y%m%d')

notifier = TelegramNotifier()

if not notifier.is_configured():
    print('Telegram 미설정 - 알림 생략')
    exit(0)

try:
    with open(f'data/paper_trading/candidates_{today}_all.json') as f:
        data = json.load(f)

    # 전체 종목 리스트 수집
    all_stocks = []
    strategies = data.get('strategies', {})
    for sid, result in strategies.items():
        for c in result.get('candidates', []):
            c['strategy'] = result.get('strategy_name', sid)
            all_stocks.append(c)

    # 점수 상위 10개만
    all_stocks.sort(key=lambda x: x.get('score', 0), reverse=True)
    top_stocks = all_stocks[:10]

    notifier.send_stock_selection(top_stocks, f'다중전략 ({len(strategies)}개)')
    print(f'종목 선정 알림 전송: {len(top_stocks)}개')

except Exception as e:
    print(f'알림 오류: {e}')
"

    - name: Summary
      if: steps.market_check.outputs.IS_MARKET_DAY != 'false'
      env:
        TZ: Asia/Seoul
      run: |
        echo "## 🎯 다중 전략 종목 선정 완료" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        TODAY=$(date +'%Y%m%d')
        python -c "
        import json
        import glob
        from datetime import datetime, timezone, timedelta

        # KST 시간대 사용
        kst = timezone(timedelta(hours=9))
        today = datetime.now(kst).strftime('%Y%m%d')

        # 통합 파일 로드
        try:
            with open(f'data/paper_trading/candidates_{today}_all.json') as f:
                data = json.load(f)

            strategies = data.get('strategies', {})
            print(f'### 전략별 선정 결과\n')

            for sid, result in strategies.items():
                name = result.get('strategy_name', sid)
                count = result.get('count', 0)
                print(f'#### {name} ({count}개)')

                for c in result.get('candidates', [])[:3]:
                    print(f'- {c[\"name\"]}: {c[\"change_pct\"]:+.2f}%, 점수 {c[\"score\"]}')
                print('')

        except Exception as e:
            print(f'Error: {e}')
        " >> $GITHUB_STEP_SUMMARY
