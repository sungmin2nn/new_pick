<!DOCTYPE html>
<html>
<head>
    <title>Analytics Functions Test</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 15px 0; padding: 10px; border: 1px solid #ddd; }
        .pass { background: #d4edda; }
        .fail { background: #f8d7da; }
        h2 { color: #333; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Analytics Functions Test Suite</h1>
    <div id="results"></div>

    <script src="js/utils.js"></script>
    <script src="js/analytics.js"></script>
    <script>
        const results = document.getElementById('results');

        function addTest(name, passed, details) {
            const div = document.createElement('div');
            div.className = 'test ' + (passed ? 'pass' : 'fail');
            div.innerHTML = `
                <h3>${passed ? '✓' : '✗'} ${name}</h3>
                <pre>${details}</pre>
            `;
            results.appendChild(div);
        }

        // 샘플 거래 데이터 생성
        const sampleTrades = [
            { date: '2026-01-01', return_percent: 3.5, result: 'profit', capital_after: 1035000, profit: 35000, invest_amount: 1000000 },
            { date: '2026-01-02', return_percent: -2.0, result: 'loss', capital_after: 1014800, profit: -20200, invest_amount: 1035000 },
            { date: '2026-01-03', return_percent: 5.0, result: 'profit', capital_after: 1065540, profit: 50740, invest_amount: 1014800 },
            { date: '2026-01-04', return_percent: -1.5, result: 'loss', capital_after: 1049565, profit: -15975, invest_amount: 1065540 },
            { date: '2026-01-05', return_percent: 4.2, result: 'profit', capital_after: 1093653, profit: 44088, invest_amount: 1049565 },
            { date: '2026-01-06', return_percent: 2.8, result: 'profit', capital_after: 1124276, profit: 30623, invest_amount: 1093653 },
            { date: '2026-01-07', return_percent: -3.0, result: 'loss', capital_after: 1090548, profit: -33728, invest_amount: 1124276 },
            { date: '2026-01-08', return_percent: 1.5, result: 'none', capital_after: 1106903, profit: 16355, invest_amount: 1090548 },
            { date: '2026-01-09', return_percent: 6.0, result: 'profit', capital_after: 1173317, profit: 66414, invest_amount: 1106903 },
            { date: '2026-01-10', return_percent: -4.0, result: 'loss', capital_after: 1126384, profit: -46933, invest_amount: 1173317 }
        ];

        const initialCapital = 1000000;
        const finalCapital = sampleTrades[sampleTrades.length - 1].capital_after;

        // Test 1: calculateTradingDays
        try {
            const tradingDays = Analytics.calculateTradingDays(sampleTrades);
            addTest('calculateTradingDays', tradingDays === 10,
                `Trading Days: ${tradingDays}\nExpected: 10`);
        } catch (e) {
            addTest('calculateTradingDays', false, `Error: ${e.message}`);
        }

        // Test 2: calculateSharpeRatio
        try {
            const sharpe = Analytics.calculateSharpeRatio(sampleTrades);
            const isValid = !isNaN(sharpe) && isFinite(sharpe);
            addTest('calculateSharpeRatio', isValid,
                `Sharpe Ratio: ${sharpe.toFixed(4)}\nValid number: ${isValid}`);
        } catch (e) {
            addTest('calculateSharpeRatio', false, `Error: ${e.message}`);
        }

        // Test 3: calculateSortinoRatio
        try {
            const sortino = Analytics.calculateSortinoRatio(sampleTrades);
            const isValid = !isNaN(sortino) && isFinite(sortino);
            addTest('calculateSortinoRatio', isValid,
                `Sortino Ratio: ${sortino.toFixed(4)}\nValid number: ${isValid}`);
        } catch (e) {
            addTest('calculateSortinoRatio', false, `Error: ${e.message}`);
        }

        // Test 4: calculateMaxDrawdown
        try {
            const mdd = Analytics.calculateMaxDrawdown(sampleTrades, initialCapital);
            const isValid = !isNaN(mdd) && mdd <= 0;
            addTest('calculateMaxDrawdown', isValid,
                `Max Drawdown: ${mdd.toFixed(2)}%\nNegative: ${mdd <= 0}`);
        } catch (e) {
            addTest('calculateMaxDrawdown', false, `Error: ${e.message}`);
        }

        // Test 5: calculateCalmarRatio
        try {
            const years = 10 / 252;
            const calmar = Analytics.calculateCalmarRatio(sampleTrades, initialCapital, finalCapital, years);
            const isValid = !isNaN(calmar) && isFinite(calmar);
            addTest('calculateCalmarRatio', isValid,
                `Calmar Ratio: ${calmar.toFixed(4)}\nYears: ${years.toFixed(4)}`);
        } catch (e) {
            addTest('calculateCalmarRatio', false, `Error: ${e.message}`);
        }

        // Test 6: calculateMaxConsecutiveLosses
        try {
            const maxLosses = Analytics.calculateMaxConsecutiveLosses(sampleTrades);
            const isValid = maxLosses >= 0 && Number.isInteger(maxLosses);
            addTest('calculateMaxConsecutiveLosses', isValid,
                `Max Consecutive Losses: ${maxLosses}\nInteger: ${Number.isInteger(maxLosses)}`);
        } catch (e) {
            addTest('calculateMaxConsecutiveLosses', false, `Error: ${e.message}`);
        }

        // Test 7: calculateDrawdownSeries
        try {
            const equityCurve = sampleTrades.map(t => ({ date: t.date, capital: t.capital_after }));
            equityCurve.unshift({ date: '2025-12-31', capital: initialCapital });

            const series = Analytics.calculateDrawdownSeries(equityCurve);
            const isValid = Array.isArray(series) && series.length === equityCurve.length;
            addTest('calculateDrawdownSeries', isValid,
                `Series Length: ${series.length}\nExpected: ${equityCurve.length}\n` +
                `Sample: ${JSON.stringify(series[0], null, 2)}`);
        } catch (e) {
            addTest('calculateDrawdownSeries', false, `Error: ${e.message}`);
        }

        // Test 8: calculateMonthlyReturns
        try {
            const monthlyReturns = Analytics.calculateMonthlyReturns(sampleTrades);
            const isValid = Array.isArray(monthlyReturns) && monthlyReturns.length > 0;
            addTest('calculateMonthlyReturns', isValid,
                `Months: ${monthlyReturns.length}\n` +
                `Data: ${JSON.stringify(monthlyReturns[0], null, 2)}`);
        } catch (e) {
            addTest('calculateMonthlyReturns', false, `Error: ${e.message}`);
        }

        // Test 9: analyzeReturnDistribution
        try {
            const distribution = Analytics.analyzeReturnDistribution(sampleTrades);
            const isValid = distribution.distribution && distribution.stats;
            addTest('analyzeReturnDistribution', isValid,
                `Distribution Buckets: ${distribution.distribution.length}\n` +
                `Stats: ${JSON.stringify(distribution.stats, null, 2)}`);
        } catch (e) {
            addTest('analyzeReturnDistribution', false, `Error: ${e.message}`);
        }

        // Test 10: calculateAlphaBeta
        try {
            const strategyReturns = sampleTrades.map(t => t.return_percent);
            const benchmarkReturns = [2.0, -1.0, 3.0, -0.5, 2.5, 1.8, -1.5, 1.0, 3.5, -2.0];

            const alphaBeta = Analytics.calculateAlphaBeta(strategyReturns, benchmarkReturns);
            const isValid = alphaBeta.alpha !== undefined && alphaBeta.beta !== undefined;
            addTest('calculateAlphaBeta', isValid,
                `Alpha: ${alphaBeta.alpha.toFixed(4)}\n` +
                `Beta: ${alphaBeta.beta.toFixed(4)}\n` +
                `Correlation: ${alphaBeta.correlation.toFixed(4)}`);
        } catch (e) {
            addTest('calculateAlphaBeta', false, `Error: ${e.message}`);
        }

        // Test 11: calculateOverallStats (통합 테스트)
        try {
            const stats = Analytics.calculateOverallStats(sampleTrades, finalCapital, initialCapital);
            const hasNewMetrics = stats.sharpeRatio !== undefined &&
                                  stats.sortinoRatio !== undefined &&
                                  stats.calmarRatio !== undefined &&
                                  stats.maxConsecutiveLosses !== undefined;

            addTest('calculateOverallStats (Extended)', hasNewMetrics,
                `Sharpe Ratio: ${stats.sharpeRatio?.toFixed(4)}\n` +
                `Sortino Ratio: ${stats.sortinoRatio?.toFixed(4)}\n` +
                `Calmar Ratio: ${stats.calmarRatio?.toFixed(4)}\n` +
                `Max Consecutive Losses: ${stats.maxConsecutiveLosses}\n` +
                `Total Return: ${stats.totalReturn.toFixed(2)}%`);
        } catch (e) {
            addTest('calculateOverallStats (Extended)', false, `Error: ${e.message}`);
        }

        // Test 12: Helper functions
        try {
            const median = Analytics.calculateMedian([1, 2, 3, 4, 5]);
            const correlation = Analytics.calculateCorrelation([1, 2, 3], [2, 4, 6]);

            const isValid = median === 3 && correlation > 0.99;
            addTest('Helper Functions', isValid,
                `Median of [1,2,3,4,5]: ${median} (expected: 3)\n` +
                `Correlation of [1,2,3] and [2,4,6]: ${correlation.toFixed(4)} (expected: ~1.0)`);
        } catch (e) {
            addTest('Helper Functions', false, `Error: ${e.message}`);
        }

        // 요약 통계
        const allTests = document.querySelectorAll('.test');
        const passed = document.querySelectorAll('.test.pass').length;
        const failed = document.querySelectorAll('.test.fail').length;

        const summary = document.createElement('div');
        summary.className = 'test';
        summary.style.background = failed === 0 ? '#d4edda' : '#fff3cd';
        summary.innerHTML = `
            <h2>Test Summary</h2>
            <pre>Total: ${allTests.length}\nPassed: ${passed}\nFailed: ${failed}\nSuccess Rate: ${(passed/allTests.length*100).toFixed(1)}%</pre>
        `;
        results.insertBefore(summary, results.firstChild);
    </script>
</body>
</html>
