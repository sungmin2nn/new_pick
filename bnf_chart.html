<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNF 시계열 차트</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
  body { background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; padding-bottom: 12px;
    border-bottom: 1px solid #21262d;
  }
  .header h1 { font-size: 18px; font-weight: 700; color: #f0f6fc; }
  .header .badge {
    background: #1f6feb22; color: #58a6ff; padding: 4px 10px;
    border-radius: 12px; font-size: 11px; font-weight: 600;
  }
  .kpi-row {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;
    margin-bottom: 20px;
  }
  .kpi {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 12px; text-align: center;
  }
  .kpi-label { font-size: 10px; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 16px; font-weight: 700; }
  .kpi-value.pos { color: #3fb950; }
  .kpi-value.neg { color: #f85149; }
  .kpi-value.neutral { color: #58a6ff; }

  .chart-panel {
    background: #161b22; border: 1px solid #21262d; border-radius: 10px;
    padding: 16px; margin-bottom: 16px;
  }
  .chart-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .chart-title {
    font-size: 13px; font-weight: 700; color: #c9d1d9;
    display: flex; align-items: center; gap: 8px;
  }
  .chart-title .dot { width: 8px; height: 8px; border-radius: 50%; }
  .chart-title .dot.green { background: #3fb950; }
  .chart-title .dot.blue { background: #58a6ff; }
  .chart-subtitle { font-size: 11px; color: #8b949e; }
  .chart-wrap { position: relative; height: 280px; }

  .trade-list {
    background: #161b22; border: 1px solid #21262d; border-radius: 10px;
    padding: 16px; margin-bottom: 16px;
  }
  .trade-list h3 { font-size: 13px; color: #c9d1d9; margin-bottom: 10px; font-weight: 700; }
  .trade-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .trade-table th {
    text-align: left; padding: 6px 8px; color: #8b949e; font-weight: 600;
    border-bottom: 1px solid #21262d; font-size: 10px; text-transform: uppercase;
  }
  .trade-table td { padding: 6px 8px; border-bottom: 1px solid #21262d22; }
  .trade-table tr:hover { background: #1f6feb11; }
  .win { color: #3fb950; }
  .loss { color: #f85149; }

  .nav-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: #58a6ff; text-decoration: none; font-size: 12px; margin-bottom: 16px;
  }
  .nav-back:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .kpi-row { grid-template-columns: repeat(3, 1fr); }
    .chart-wrap[style] { height: 140px !important; }
    .chart-wrap { height: 220px; }
    body { padding: 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <a href="bnf_dashboard.html" class="nav-back">&larr; BNF 대시보드</a>

  <div class="header">
    <h1>BNF 낙폭과대 시계열 차트</h1>
    <span class="badge" id="dateRange"></span>
  </div>

  <div class="kpi-row" id="kpiRow"></div>

  <!-- Chart 1: Equity Curve -->
  <div class="chart-panel">
    <div class="chart-header">
      <div class="chart-title"><span class="dot green"></span> 자산 추이 (Equity Curve)</div>
      <div class="chart-subtitle" id="equitySubtitle"></div>
    </div>
    <div class="chart-wrap">
      <canvas id="equityChart"></canvas>
    </div>
  </div>

  <!-- Chart 2: Drawdown -->
  <div class="chart-panel">
    <div class="chart-header">
      <div class="chart-title"><span class="dot" style="background:#f85149;"></span> MDD (Maximum Drawdown)</div>
      <div class="chart-subtitle" id="mddSubtitle"></div>
    </div>
    <div class="chart-wrap" style="height:180px;">
      <canvas id="drawdownChart"></canvas>
    </div>
  </div>

  <!-- Chart 3: Cumulative Return -->
  <div class="chart-panel">
    <div class="chart-header">
      <div class="chart-title"><span class="dot blue"></span> 누적 수익률 (%)</div>
      <div class="chart-subtitle" id="returnSubtitle"></div>
    </div>
    <div class="chart-wrap">
      <canvas id="returnChart"></canvas>
    </div>
  </div>

  <!-- Trade Table -->
  <div class="trade-list">
    <h3>거래 내역 (시간순)</h3>
    <table class="trade-table">
      <thead>
        <tr>
          <th>종목</th><th>매수일</th><th>매도일</th>
          <th style="text-align:right">수익률</th>
          <th style="text-align:right">손익</th>
          <th>사유</th>
        </tr>
      </thead>
      <tbody id="tradeBody"></tbody>
    </table>
  </div>
</div>

<script>
const INITIAL_CAPITAL = 3000000;

const TRADE_DATA = {
  "updated_at": "2026-04-17 17:14:11",
  "trades": [
    {"code":"015760","name":"한국전력","entry_date":"2026-03-31","entry_price":41650,"exit_date":"2026-04-03","exit_price":40150,"quantity":14,"return_pct":-3.6,"profit":-21000,"exit_reason":"손절 (-3%)"},
    {"code":"010950","name":"S-Oil","entry_date":"2026-03-31","entry_price":105300,"exit_date":"2026-04-06","exit_price":116500,"quantity":5,"return_pct":10.64,"profit":56000,"exit_reason":"익절 (+10%)"},
    {"code":"015760","name":"한국전력","entry_date":"2026-04-03","entry_price":41250,"exit_date":"2026-04-06","exit_price":39975,"quantity":14,"return_pct":-3.09,"profit":-17850,"exit_reason":"손절 (-3%)"},
    {"code":"005380","name":"현대차","entry_date":"2026-03-31","entry_price":445500,"exit_date":"2026-04-08","exit_price":504000,"quantity":1,"return_pct":13.13,"profit":58500,"exit_reason":"익절 (+10%)"},
    {"code":"004020","name":"현대제철","entry_date":"2026-03-31","entry_price":33650,"exit_date":"2026-04-08","exit_price":37550,"quantity":17,"return_pct":11.59,"profit":66300,"exit_reason":"익절 (+10%)"},
    {"code":"004020","name":"현대제철","entry_date":"2026-04-08","entry_price":34450,"exit_date":"2026-04-09","exit_price":39600,"quantity":17,"return_pct":14.95,"profit":87550,"exit_reason":"익절 (+10%)"},
    {"code":"005380","name":"현대차","entry_date":"2026-04-09","entry_price":508000,"exit_date":"2026-04-09","exit_price":489500,"quantity":1,"return_pct":-3.64,"profit":-18500,"exit_reason":"손절 (-3%)"},
    {"code":"005380","name":"현대차","entry_date":"2026-04-09","entry_price":508000,"exit_date":"2026-04-10","exit_price":489500,"quantity":1,"return_pct":-3.64,"profit":-18500,"exit_reason":"손절 (-3%)"},
    {"code":"010950","name":"S-Oil","entry_date":"2026-04-06","entry_price":111400,"exit_date":"2026-04-13","exit_price":123300,"quantity":5,"return_pct":10.68,"profit":59500,"exit_reason":"익절 (+10%)"},
    {"code":"445680","name":"큐리옥스바이오시스템즈","entry_date":"2026-04-13","entry_price":74300,"exit_date":"2026-04-13","exit_price":82500,"quantity":8,"return_pct":11.04,"profit":65600,"exit_reason":"익절 (+10%)"},
    {"code":"015760","name":"한국전력","entry_date":"2026-04-06","entry_price":40300,"exit_date":"2026-04-14","exit_price":44400,"quantity":14,"return_pct":10.17,"profit":57400,"exit_reason":"익절 (+10%)"},
    {"code":"000250","name":"삼천당제약","entry_date":"2026-04-13","entry_price":505000,"exit_date":"2026-04-15","exit_price":575000,"quantity":1,"return_pct":13.86,"profit":70000,"exit_reason":"익절 (+10%)"},
    {"code":"445680","name":"큐리옥스바이오시스템즈","entry_date":"2026-04-14","entry_price":82500,"exit_date":"2026-04-15","exit_price":93300,"quantity":7,"return_pct":13.09,"profit":75600,"exit_reason":"익절 (+10%)"},
    {"code":"174900","name":"앱클론","entry_date":"2026-04-13","entry_price":50300,"exit_date":"2026-04-16","exit_price":57800,"quantity":11,"return_pct":14.91,"profit":82500,"exit_reason":"익절 (+10%)"},
    {"code":"000250","name":"삼천당제약","entry_date":"2026-04-15","entry_price":520000,"exit_date":"2026-04-17","exit_price":489000,"quantity":1,"return_pct":-5.96,"profit":-31000,"exit_reason":"손절 (-3%)"},
    {"code":"000250","name":"삼천당제약","entry_date":"2026-04-17","entry_price":526000,"exit_date":"2026-04-17","exit_price":485500,"quantity":1,"return_pct":-7.7,"profit":-40500,"exit_reason":"손절 (-3%)"},
    {"code":"174900","name":"앱클론","entry_date":"2026-04-17","entry_price":50200,"exit_date":"2026-04-17","exit_price":55800,"quantity":11,"return_pct":11.16,"profit":61600,"exit_reason":"익절 (+10%)"}
  ],
  "stats": {
    "total_trades":17,"win_count":11,"loss_count":6,"win_rate":64.7,
    "total_profit":593200,"total_return":19.77,"total_return_simple":107.59,"avg_return":6.33,"mdd":-0.70
  }
};

function loadData() {
  return TRADE_DATA;
}

function buildTimeSeries(trades) {
  // Sort trades by exit_date
  const sorted = [...trades].sort((a, b) => a.exit_date.localeCompare(b.exit_date));

  // Collect all dates (entry and exit)
  const allDates = new Set();
  sorted.forEach(t => {
    allDates.add(t.entry_date);
    allDates.add(t.exit_date);
  });
  const dates = [...allDates].sort();

  // Daily profit accumulation (by exit_date)
  const dailyProfit = {};
  const dailyReturn = {};
  sorted.forEach(t => {
    const d = t.exit_date;
    dailyProfit[d] = (dailyProfit[d] || 0) + (t.profit || 0);
    dailyReturn[d] = (dailyReturn[d] || 0) + (t.return_pct || 0);
  });

  // Build cumulative series on exit dates only
  const exitDates = Object.keys(dailyProfit).sort();
  let cumProfit = 0;
  let cumReturn = 0;
  const equityData = [{ x: '시작', y: INITIAL_CAPITAL }];
  const returnData = [{ x: '시작', y: 0 }];
  const equityLabels = ['시작'];
  const returnLabels = ['시작'];

  // MDD tracking
  let peak = INITIAL_CAPITAL;
  let mdd = 0;
  let mddPeakIdx = 0;
  let mddTroughIdx = 0;
  const drawdownData = [0]; // drawdown % at each point

  exitDates.forEach((d, i) => {
    cumProfit += dailyProfit[d];
    cumReturn += dailyReturn[d];
    const label = d.slice(5); // MM-DD
    equityLabels.push(label);
    returnLabels.push(label);
    const equity = INITIAL_CAPITAL + cumProfit;
    equityData.push({ x: label, y: equity });
    returnData.push({ x: label, y: Math.round(cumReturn * 100) / 100 });

    if (equity > peak) peak = equity;
    const dd = peak > 0 ? (equity - peak) / peak * 100 : 0;
    drawdownData.push(Math.round(dd * 100) / 100);
    if (dd < mdd) {
      mdd = dd;
      mddTroughIdx = i + 1; // +1 because of '시작'
    }
  });

  return { equityLabels, equityData, returnLabels, returnData, exitDates, drawdownData, mdd, mddTroughIdx };
}

function createStockChart(canvasId, labels, data, config) {
  const ctx = document.getElementById(canvasId).getContext('2d');

  const lastVal = data[data.length - 1].y;
  const firstVal = data[0].y;
  const isPositive = lastVal >= firstVal;

  const lineColor = isPositive ? '#3fb950' : '#f85149';
  const fillStart = isPositive ? 'rgba(63,185,80,0.12)' : 'rgba(248,81,73,0.12)';

  const grad = ctx.createLinearGradient(0, 0, 0, ctx.canvas.parentElement.clientHeight || 280);
  grad.addColorStop(0, fillStart);
  grad.addColorStop(1, 'transparent');

  return new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: config.label,
        data: data.map(d => d.y),
        borderColor: lineColor,
        backgroundColor: grad,
        fill: true,
        tension: 0.3,
        borderWidth: 2,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointBackgroundColor: '#0d1117',
        pointBorderColor: lineColor,
        pointBorderWidth: 2,
        pointHitRadius: 10,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: 'index',
        intersect: false,
      },
      scales: {
        y: {
          grid: { color: '#21262d', lineWidth: 0.5 },
          border: { color: '#30363d' },
          ticks: {
            color: '#8b949e',
            font: { size: 11 },
            callback: config.yTickCallback,
            maxTicksLimit: 6,
          },
          ...(config.yMin !== undefined && { min: config.yMin }),
          ...(config.ySuggestedMax !== undefined && { suggestedMax: config.ySuggestedMax }),
        },
        x: {
          grid: { color: '#21262d44', lineWidth: 0.5 },
          border: { color: '#30363d' },
          ticks: {
            color: '#8b949e',
            font: { size: 10 },
            maxRotation: 0,
          }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2128',
          borderColor: '#30363d',
          borderWidth: 1,
          titleColor: '#f0f6fc',
          bodyColor: '#c9d1d9',
          titleFont: { size: 12, weight: '600' },
          bodyFont: { size: 12 },
          padding: 10,
          displayColors: false,
          callbacks: {
            label: config.tooltipCallback,
          }
        },
        annotation: config.zeroLine ? {
          annotations: {
            zeroLine: {
              type: 'line',
              yMin: 0,
              yMax: 0,
              borderColor: '#8b949e44',
              borderWidth: 1,
              borderDash: [4, 4],
            }
          }
        } : undefined,
      }
    }
  });
}

function createDrawdownChart(labels, ddData) {
  const ctx = document.getElementById('drawdownChart').getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, ctx.canvas.parentElement.clientHeight || 180);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(248,81,73,0.25)');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Drawdown (%)',
        data: ddData,
        borderColor: '#f85149',
        backgroundColor: grad,
        fill: true,
        tension: 0.3,
        borderWidth: 2,
        pointRadius: 4,
        pointHoverRadius: 6,
        pointBackgroundColor: '#0d1117',
        pointBorderColor: '#f85149',
        pointBorderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        y: {
          grid: { color: '#21262d', lineWidth: 0.5 },
          border: { color: '#30363d' },
          ticks: {
            color: '#8b949e', font: { size: 11 },
            callback: v => v.toFixed(1) + '%',
          },
          max: 0.5,
          suggestedMin: Math.min(...ddData) * 1.5,
        },
        x: {
          grid: { color: '#21262d44', lineWidth: 0.5 },
          border: { color: '#30363d' },
          ticks: { color: '#8b949e', font: { size: 10 }, maxRotation: 0 },
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2128', borderColor: '#30363d', borderWidth: 1,
          titleColor: '#f0f6fc', bodyColor: '#f85149',
          titleFont: { size: 12, weight: '600' }, bodyFont: { size: 12 },
          padding: 10, displayColors: false,
          callbacks: {
            label: ctx => 'Drawdown: ' + ctx.parsed.y.toFixed(2) + '%',
          }
        },
        annotation: {
          annotations: {
            zeroLine: {
              type: 'line', yMin: 0, yMax: 0,
              borderColor: '#3fb95066', borderWidth: 1, borderDash: [4, 4],
            }
          }
        }
      }
    }
  });
}

function renderKPIs(stats) {
  const kpiRow = document.getElementById('kpiRow');
  const totalReturn = stats.total_return_simple || stats.total_return || 0;
  const items = [
    { label: '총 거래', value: stats.total_trades + '건', cls: 'neutral' },
    { label: '승률', value: stats.win_rate.toFixed(1) + '%', cls: stats.win_rate >= 50 ? 'pos' : 'neg' },
    { label: '총 손익', value: (stats.total_profit >= 0 ? '+' : '') + (stats.total_profit / 10000).toFixed(1) + '만', cls: stats.total_profit >= 0 ? 'pos' : 'neg' },
    { label: '누적 수익률', value: (totalReturn >= 0 ? '+' : '') + totalReturn.toFixed(1) + '%', cls: totalReturn >= 0 ? 'pos' : 'neg' },
    { label: '평균 수익률', value: (stats.avg_return >= 0 ? '+' : '') + stats.avg_return.toFixed(1) + '%', cls: stats.avg_return >= 0 ? 'pos' : 'neg' },
    { label: 'MDD', value: (stats.mdd || 0).toFixed(2) + '%', cls: (stats.mdd || 0) > -5 ? 'pos' : (stats.mdd || 0) > -15 ? 'neutral' : 'neg' },
  ];
  kpiRow.innerHTML = items.map(k =>
    `<div class="kpi"><div class="kpi-label">${k.label}</div><div class="kpi-value ${k.cls}">${k.value}</div></div>`
  ).join('');
}

function renderTradeTable(trades) {
  const sorted = [...trades].sort((a, b) => a.exit_date.localeCompare(b.exit_date));
  const tbody = document.getElementById('tradeBody');
  tbody.innerHTML = sorted.map(t => {
    const cls = t.return_pct >= 0 ? 'win' : 'loss';
    const sign = t.return_pct >= 0 ? '+' : '';
    return `<tr>
      <td><strong>${t.name}</strong></td>
      <td>${t.entry_date.slice(5)}</td>
      <td>${t.exit_date.slice(5)}</td>
      <td style="text-align:right" class="${cls}">${sign}${t.return_pct.toFixed(1)}%</td>
      <td style="text-align:right" class="${cls}">${sign}${(t.profit/10000).toFixed(1)}만</td>
      <td style="font-size:10px;color:#8b949e">${t.exit_reason || ''}</td>
    </tr>`;
  }).join('');
}

function init() {
  const data = loadData();
  if (!data || !data.trades || data.trades.length === 0) {
    document.querySelector('.container').innerHTML += '<p style="color:#8b949e;text-align:center;padding:40px">거래 데이터가 없습니다.</p>';
    return;
  }

  const { trades, stats } = data;
  const ts = buildTimeSeries(trades);

  // Date range badge
  const firstDate = trades.reduce((a, b) => a.entry_date < b.entry_date ? a : b).entry_date;
  const lastDate = trades.reduce((a, b) => a.exit_date > b.exit_date ? a : b).exit_date;
  document.getElementById('dateRange').textContent = `${firstDate} ~ ${lastDate}`;

  // KPIs
  renderKPIs(stats);

  // Subtitles
  const finalEquity = INITIAL_CAPITAL + stats.total_profit;
  const eqSign = stats.total_profit >= 0 ? '+' : '';
  document.getElementById('equitySubtitle').textContent =
    `${(finalEquity/10000).toFixed(0)}만원 (${eqSign}${(stats.total_profit/10000).toFixed(1)}만)`;
  document.getElementById('equitySubtitle').style.color = stats.total_profit >= 0 ? '#3fb950' : '#f85149';

  const totalRet = stats.total_return_simple || stats.total_return || 0;
  const retSign = totalRet >= 0 ? '+' : '';
  document.getElementById('returnSubtitle').textContent = `${retSign}${totalRet.toFixed(1)}%`;
  document.getElementById('returnSubtitle').style.color = totalRet >= 0 ? '#3fb950' : '#f85149';

  // MDD subtitle
  document.getElementById('mddSubtitle').textContent = `${ts.mdd.toFixed(2)}%`;
  document.getElementById('mddSubtitle').style.color = '#f85149';

  // Chart 1: Equity Curve
  createStockChart('equityChart', ts.equityLabels, ts.equityData, {
    label: '자산 (원)',
    yTickCallback: v => (v / 10000).toFixed(0) + '만',
    tooltipCallback: ctx => ctx.parsed.y.toLocaleString() + '원',
    yMin: INITIAL_CAPITAL * 0.9,
    ySuggestedMax: (INITIAL_CAPITAL + stats.total_profit) * 1.05,
  });

  // Chart 2: Drawdown
  createDrawdownChart(ts.equityLabels, ts.drawdownData);

  // Chart 3: Cumulative Return
  createStockChart('returnChart', ts.returnLabels, ts.returnData, {
    label: '누적 수익률 (%)',
    yTickCallback: v => v.toFixed(0) + '%',
    tooltipCallback: ctx => (ctx.parsed.y >= 0 ? '+' : '') + ctx.parsed.y.toFixed(1) + '%',
    zeroLine: true,
  });

  // Trade table
  renderTradeTable(trades);
}

init();
</script>
</body>
</html>
