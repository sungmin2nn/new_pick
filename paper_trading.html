<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이퍼 트레이딩 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e4;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a2a4a;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { color: #00d9ff; font-size: 1.8em; }
        .header .subtitle { color: #8892b0; margin-top: 5px; font-size: 0.9em; }
        .header .nav-links a {
            color: #00ff88;
            text-decoration: none;
            margin-left: 20px;
        }
        .header .nav-links a:hover { text-decoration: underline; }

        /* Control Bar */
        .control-bar {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .control-bar input[type="date"] {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #2a2a4a;
            background: #16213e;
            color: #e4e4e4;
            font-size: 1em;
        }
        .control-bar button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 217, 255, 0.3); }
        .btn-secondary {
            background: #2a2a4a;
            color: #e4e4e4;
        }
        .btn-secondary:hover { background: #3a3a5a; }
        .btn-refresh {
            background: linear-gradient(135deg, #ffaa00, #ff6b6b);
            color: #1a1a2e;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2a4a;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00d9ff;
            margin-bottom: 8px;
        }
        .stat-value.positive { color: #00ff88; }
        .stat-value.negative { color: #ff6b6b; }
        .stat-label { color: #8892b0; font-size: 0.85em; }

        /* Section */
        .section {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #2a2a4a;
        }
        .section h2 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .section h2 .update-time {
            font-size: 0.7em;
            color: #8892b0;
            font-weight: normal;
        }

        /* Live Status Grid */
        .live-status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        .stock-status-card {
            background: rgba(15, 52, 96, 0.5);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #8892b0;
            transition: all 0.3s;
        }
        .stock-status-card.profit { border-left-color: #00ff88; background: rgba(0, 255, 136, 0.1); }
        .stock-status-card.loss { border-left-color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
        .stock-status-card.waiting { border-left-color: #ffaa00; }
        .stock-status-card .stock-name {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stock-status-card .stock-code { color: #8892b0; font-size: 0.9em; }
        .stock-status-card .stock-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 0.9em;
        }
        .stock-status-card .info-label { color: #8892b0; }
        .stock-status-card .info-value { text-align: right; }
        .stock-status-card .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }
        .status-badge.profit { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .status-badge.loss { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .status-badge.waiting { background: rgba(255, 170, 0, 0.2); color: #ffaa00; }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #2a2a4a;
        }
        th { background: #0f3460; color: #00d9ff; font-weight: 600; }
        tr:hover { background: rgba(0, 217, 255, 0.05); }
        .positive { color: #00ff88; }
        .negative { color: #ff6b6b; }

        /* Chart Container */
        .chart-container {
            height: 300px;
            position: relative;
            margin-top: 15px;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
        }
        .badge-profit { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .badge-loss { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .badge-close { background: rgba(0, 217, 255, 0.2); color: #00d9ff; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #00d9ff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .header .nav-links { margin-top: 15px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .control-bar { justify-content: center; }
        }

        /* No Data */
        .no-data {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div>
                <h1>📊 페이퍼 트레이딩 대시보드</h1>
                <div class="subtitle">대형주 역추세 전략 | 실시간 모니터링</div>
            </div>
            <nav class="nav-links">
                <a href="index.html">메인 대시보드</a>
                <a href="system_guide.html">시스템 가이드</a>
            </nav>
        </header>

        <!-- Control Bar -->
        <div class="control-bar">
            <input type="date" id="selectDate" />
            <button class="btn-secondary" onclick="loadHistoryData()">히스토리 조회</button>
            <button class="btn-primary" onclick="loadTodayData()">오늘 데이터</button>
            <button class="btn-refresh" onclick="triggerManualCheck()">🔄 수동 체크</button>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="tradingDays">-</div>
                <div class="stat-label">거래일</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalTrades">-</div>
                <div class="stat-label">총 거래</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="winRate">-</div>
                <div class="stat-label">승률</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalReturn">-</div>
                <div class="stat-label">누적 수익률</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="profitExits">-</div>
                <div class="stat-label">익절</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="lossExits">-</div>
                <div class="stat-label">손절</div>
            </div>
        </div>

        <!-- Live Status -->
        <div class="section">
            <h2>
                ⏱️ 실시간 상태
                <span class="update-time" id="statusUpdateTime">-</span>
            </h2>
            <div id="liveStatus" class="loading">데이터 로딩 중</div>
        </div>

        <!-- Performance Chart -->
        <div class="section">
            <h2>📈 성과 차트</h2>
            <div class="chart-container">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <!-- Recent Trades -->
        <div class="section">
            <h2>📋 최근 매매 내역</h2>
            <div id="recentTrades" class="loading">데이터 로딩 중</div>
        </div>

        <!-- Daily Results -->
        <div class="section">
            <h2>📅 일별 결과</h2>
            <div id="dailyResults" class="loading">데이터 로딩 중</div>
        </div>
    </div>

    <script>
        let performanceChart = null;

        // 오늘 날짜 설정
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('selectDate').value = today;
            loadTodayData();
        });

        // 오늘 데이터 로드
        async function loadTodayData() {
            await loadPaperTradingData();
            await loadLiveStatus();
        }

        // 히스토리 조회
        async function loadHistoryData() {
            const dateInput = document.getElementById('selectDate').value;
            if (!dateInput) {
                alert('날짜를 선택해주세요');
                return;
            }
            const dateStr = dateInput.replace(/-/g, '');
            await loadPaperTradingData(dateStr);
            await loadLiveStatus(dateStr);
        }

        // 수동 체크 트리거
        function triggerManualCheck() {
            const confirmed = confirm('GitHub Actions에서 수동 체크를 실행할까요?\\n(GitHub 로그인 필요)');
            if (confirmed) {
                window.open('https://github.com/sungmin2nn/new_pick/actions/workflows/paper-trading-check.yml', '_blank');
            }
        }

        // 메인 데이터 로드
        async function loadPaperTradingData(dateStr = null) {
            try {
                const response = await fetch('data/paper_trading/results.json?t=' + Date.now());
                if (response.ok) {
                    const results = await response.json();
                    displayStats(results);
                    displayRecentTrades(results, dateStr);
                    displayDailyResults(results);
                    displayPerformanceChart(results);
                } else {
                    displayNoData();
                }
            } catch (error) {
                console.log('Data load error:', error);
                displayNoData();
            }
        }

        // 실시간 상태 로드
        async function loadLiveStatus(dateStr = null) {
            const container = document.getElementById('liveStatus');
            const updateTime = document.getElementById('statusUpdateTime');

            try {
                const today = dateStr || new Date().toISOString().split('T')[0].replace(/-/g, '');

                // 상태 파일 로드 시도
                const statusResponse = await fetch(`data/paper_trading/status_${today}.json?t=${Date.now()}`);

                if (statusResponse.ok) {
                    const status = await statusResponse.json();
                    displayLiveStatus(status);
                    updateTime.textContent = `최근 업데이트: ${status.checked_at || '-'}`;
                    return;
                }

                // 상태 파일 없으면 candidates 파일 로드
                const candidatesResponse = await fetch(`data/paper_trading/candidates_${today}.json?t=${Date.now()}`);

                if (candidatesResponse.ok) {
                    const candidates = await candidatesResponse.json();
                    displayCandidatesAsStatus(candidates);
                    updateTime.textContent = `선정 시간: ${candidates.selected_at || '-'}`;
                    return;
                }

                container.innerHTML = '<div class="no-data">오늘 선정된 종목이 없습니다.</div>';
                updateTime.textContent = '-';

            } catch (error) {
                console.log('Live status load error:', error);
                container.innerHTML = '<div class="no-data">상태 데이터를 불러올 수 없습니다.</div>';
            }
        }

        // 실시간 상태 표시
        function displayLiveStatus(status) {
            const container = document.getElementById('liveStatus');
            const stocks = status.stocks || [];

            if (stocks.length === 0) {
                container.innerHTML = '<div class="no-data">선정된 종목이 없습니다.</div>';
                return;
            }

            const html = `
                <div class="live-status-grid">
                    ${stocks.map(s => {
                        const statusClass = s.status === 'profit_hit' ? 'profit' :
                                          s.status === 'loss_hit' ? 'loss' : 'waiting';
                        const statusLabel = s.status === 'profit_hit' ? '익절 도달' :
                                          s.status === 'loss_hit' ? '손절 도달' : '대기 중';
                        const currentPct = s.current_pct || 0;

                        return `
                            <div class="stock-status-card ${statusClass}">
                                <div class="stock-name">
                                    <span>${s.name} <span class="stock-code">(${s.code})</span></span>
                                    <span class="status-badge ${statusClass}">${statusLabel}</span>
                                </div>
                                <div class="stock-info">
                                    <span class="info-label">진입가</span>
                                    <span class="info-value">${s.entry_price?.toLocaleString() || '-'}원</span>
                                    <span class="info-label">현재가</span>
                                    <span class="info-value">${s.current_price?.toLocaleString() || '-'}원</span>
                                    <span class="info-label">현재 수익률</span>
                                    <span class="info-value ${currentPct >= 0 ? 'positive' : 'negative'}">${currentPct >= 0 ? '+' : ''}${currentPct.toFixed(2)}%</span>
                                    <span class="info-label">${s.hit_time ? '도달 시간' : '최대 수익'}</span>
                                    <span class="info-value">${s.hit_time || (s.max_profit_pct ? `+${s.max_profit_pct}%` : '-')}</span>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            container.innerHTML = html;
        }

        // candidates를 상태로 표시
        function displayCandidatesAsStatus(data) {
            const container = document.getElementById('liveStatus');
            const candidates = data.candidates || [];

            if (candidates.length === 0) {
                container.innerHTML = '<div class="no-data">선정된 종목이 없습니다.</div>';
                return;
            }

            const html = `
                <div class="live-status-grid">
                    ${candidates.map(c => `
                        <div class="stock-status-card waiting">
                            <div class="stock-name">
                                <span>${c.name} <span class="stock-code">(${c.code})</span></span>
                                <span class="status-badge waiting">장 시작 전</span>
                            </div>
                            <div class="stock-info">
                                <span class="info-label">전일 종가</span>
                                <span class="info-value">${c.price?.toLocaleString() || '-'}원</span>
                                <span class="info-label">전일 등락</span>
                                <span class="info-value ${c.change_pct >= 0 ? 'positive' : 'negative'}">${c.change_pct >= 0 ? '+' : ''}${c.change_pct?.toFixed(2) || 0}%</span>
                                <span class="info-label">선정 점수</span>
                                <span class="info-value">${c.score?.toFixed(1) || '-'}점</span>
                                <span class="info-label">거래대금</span>
                                <span class="info-value">${(c.trading_value / 100000000)?.toFixed(0) || '-'}억</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            container.innerHTML = html;
        }

        // 통계 표시
        function displayStats(data) {
            const days = data.daily_results || [];
            const totalTrades = days.reduce((sum, d) => sum + (d.total_trades || 0), 0);
            const totalWins = days.reduce((sum, d) => sum + (d.wins || 0), 0);
            const totalReturn = days.reduce((sum, d) => sum + (d.total_return || 0), 0);
            const profitExits = days.reduce((sum, d) => sum + (d.profit_exits || 0), 0);
            const lossExits = days.reduce((sum, d) => sum + (d.loss_exits || 0), 0);

            document.getElementById('tradingDays').textContent = days.length + '일';
            document.getElementById('totalTrades').textContent = totalTrades + '건';

            const winRate = totalTrades > 0 ? (totalWins / totalTrades * 100).toFixed(1) : 0;
            document.getElementById('winRate').textContent = winRate + '%';

            const returnEl = document.getElementById('totalReturn');
            returnEl.textContent = (totalReturn >= 0 ? '+' : '') + totalReturn.toFixed(2) + '%';
            returnEl.className = 'stat-value ' + (totalReturn >= 0 ? 'positive' : 'negative');

            document.getElementById('profitExits').textContent = profitExits + '건';
            document.getElementById('lossExits').textContent = lossExits + '건';
        }

        // 성과 차트
        function displayPerformanceChart(data) {
            const days = data.daily_results || [];

            if (days.length === 0) return;

            const labels = days.map(d => formatDate(d.date));
            let cumulative = 0;
            const cumulativeReturns = days.map(d => {
                cumulative += d.total_return || 0;
                return cumulative;
            });
            const dailyReturns = days.map(d => d.total_return || 0);

            const ctx = document.getElementById('performanceChart').getContext('2d');

            if (performanceChart) {
                performanceChart.destroy();
            }

            performanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '누적 수익률 (%)',
                            data: cumulativeReturns,
                            borderColor: '#00d9ff',
                            backgroundColor: 'rgba(0, 217, 255, 0.1)',
                            fill: true,
                            tension: 0.3,
                            yAxisID: 'y'
                        },
                        {
                            label: '일일 수익률 (%)',
                            data: dailyReturns,
                            borderColor: '#00ff88',
                            backgroundColor: 'rgba(0, 255, 136, 0.5)',
                            type: 'bar',
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            position: 'left',
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#8892b0' }
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            grid: { display: false },
                            ticks: { color: '#8892b0' }
                        },
                        x: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#8892b0', maxRotation: 45 }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#e4e4e4' }
                        }
                    }
                }
            });
        }

        // 최근 매매 내역
        function displayRecentTrades(data, filterDate = null) {
            const container = document.getElementById('recentTrades');
            const days = data.daily_results || [];

            let allTrades = [];
            const targetDays = filterDate
                ? days.filter(d => d.date === filterDate)
                : days.slice(-5);

            targetDays.forEach(day => {
                (day.results || []).forEach(trade => {
                    allTrades.push({ ...trade, date: day.date });
                });
            });

            if (allTrades.length === 0) {
                container.innerHTML = '<div class="no-data">해당 기간에 거래 내역이 없습니다.</div>';
                return;
            }

            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>날짜</th>
                            <th>종목</th>
                            <th>진입가</th>
                            <th>청산가</th>
                            <th>진입시간</th>
                            <th>청산시간</th>
                            <th>수익률</th>
                            <th>청산유형</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${allTrades.slice(-15).reverse().map(t => `
                            <tr>
                                <td>${formatDate(t.date)}</td>
                                <td>${t.name} (${t.code})</td>
                                <td>${t.entry_price?.toLocaleString()}원</td>
                                <td>${t.exit_price?.toLocaleString()}원</td>
                                <td>${t.entry_time || '-'}</td>
                                <td>${t.exit_time || '-'}</td>
                                <td class="${t.return_pct >= 0 ? 'positive' : 'negative'}">${t.return_pct >= 0 ? '+' : ''}${t.return_pct}%</td>
                                <td><span class="badge badge-${t.exit_type}">${getExitTypeLabel(t.exit_type)}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            container.innerHTML = html;
        }

        // 일별 결과
        function displayDailyResults(data) {
            const container = document.getElementById('dailyResults');
            const days = data.daily_results || [];

            if (days.length === 0) {
                container.innerHTML = '<div class="no-data">아직 일별 결과가 없습니다.</div>';
                return;
            }

            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>날짜</th>
                            <th>거래수</th>
                            <th>승률</th>
                            <th>수익률</th>
                            <th>누적</th>
                            <th>익절</th>
                            <th>손절</th>
                            <th>종가</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${days.slice(-20).reverse().map(d => `
                            <tr>
                                <td>${formatDate(d.date)}</td>
                                <td>${d.total_trades}건</td>
                                <td>${d.win_rate}%</td>
                                <td class="${d.total_return >= 0 ? 'positive' : 'negative'}">${d.total_return >= 0 ? '+' : ''}${d.total_return?.toFixed(2)}%</td>
                                <td class="${d.cumulative_return >= 0 ? 'positive' : 'negative'}">${d.cumulative_return >= 0 ? '+' : ''}${d.cumulative_return?.toFixed(2) || '-'}%</td>
                                <td>${d.profit_exits || 0}</td>
                                <td>${d.loss_exits || 0}</td>
                                <td>${d.close_exits || 0}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            container.innerHTML = html;
        }

        // No Data 표시
        function displayNoData() {
            document.getElementById('tradingDays').textContent = '0일';
            document.getElementById('totalTrades').textContent = '0건';
            document.getElementById('winRate').textContent = '0%';
            document.getElementById('totalReturn').textContent = '+0.00%';
            document.getElementById('profitExits').textContent = '0건';
            document.getElementById('lossExits').textContent = '0건';
            document.getElementById('liveStatus').innerHTML = '<div class="no-data">데이터가 없습니다. 장 종료 후 자동으로 업데이트됩니다.</div>';
            document.getElementById('recentTrades').innerHTML = '<div class="no-data">아직 거래 내역이 없습니다.</div>';
            document.getElementById('dailyResults').innerHTML = '<div class="no-data">아직 일별 결과가 없습니다.</div>';
        }

        // 날짜 포맷
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            if (dateStr.includes('-')) return dateStr;
            return dateStr.slice(0, 4) + '-' + dateStr.slice(4, 6) + '-' + dateStr.slice(6, 8);
        }

        // 청산 유형 라벨
        function getExitTypeLabel(type) {
            const labels = { 'profit': '익절', 'loss': '손절', 'close': '종가' };
            return labels[type] || type;
        }
    </script>
</body>
</html>
